name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 * * *'  # Her gün saat 09:00 UTC
  workflow_dispatch:      # Manuel tetikleme

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase (SELECT - activates project)
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://vwubvpjidodewzvtqjtf.supabase.co/rest/v1/workout_logs?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $RESPONSE"
          # 2xx veya 4xx (auth hatası bile olsa) = proje uyanık demek
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 500 ]; then
            echo "Project is alive."
          else
            echo "Unexpected status: $RESPONSE"
            exit 1
          fi

  # GitHub scheduled workflows disable themselves on inactive repos.
  # This job commits a tiny file to keep the repo "active".
  touch-repo:
    runs-on: ubuntu-latest
    needs: keepalive

    steps:
      - uses: actions/checkout@v4

      - name: Update keepalive timestamp
        run: |
          echo "Last keepalive: $(date -u)" > .github/keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git diff --cached --quiet || git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
