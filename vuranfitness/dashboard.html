<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superhero Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #f8fafc;
      --line: #334155;
      --accent: #22c55e;
      --card: #1e293b;
      --card2: #172033;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }
    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: rgba(17,24,39,.95);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .subtitle {
      color: var(--muted);
      margin: 0 0 16px;
      line-height: 1.5;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--accent);
      color: #04130a;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: #334155;
      color: white;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #0b1220;
      border: 1px solid var(--line);
      color: #cbd5e1;
      font-size: 12px;
      margin: 0 6px 6px 0;
    }
    .summary-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .summary-box {
      background: var(--card2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .summary-label {
      font-size: 12px;
      color: var(--muted);
    }
    .summary-value {
      font-size: 28px;
      font-weight: 800;
      margin-top: 6px;
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }
    .exercise-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .exercise-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .chart-wrap {
      margin-top: 12px;
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 58px 1fr 56px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .bar-track {
      height: 10px;
      background: #111827;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #1f2937;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    .empty {
      color: var(--muted);
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="app"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://vwubvpjidodewzvtqjtf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Pyhx-5-wLHw199bcT6URCA_O2Xu6QQY';
    const MASTER_PASSWORD = 'Nakama123!';
    const ALLOWED_USERS = ['nakama', 'boksimoron'];

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const state = {
      gatePassed: localStorage.getItem('superhero_gate_passed') === 'true',
      username: localStorage.getItem('superhero_username') || '',
      program: null,
      logs: [],
      loading: true
    };

    const app = document.getElementById('app');

    const TEMPLATE_SLOTS = [
      // ── Gün 1 ──
      { slotCode: 'G1_1', dayCode: '1', group: 'g1', family: 'chest_press',    setsReps: '4x5+',    warmupSets: 3, incrementKg: 2.5, rpe: 0,  isBodyweight: false, startFactor: 0.8,  trackEstimated1RM: true,  progression: 'last_set', checkSet: 4, threshold: 5 },
      { slotCode: 'G1_2', dayCode: '1', group: 'g2', family: 'shoulder_press',  setsReps: '3x10',    warmupSets: 2, incrementKg: 2.5, rpe: 0,  isBodyweight: false, startFactor: 0.6,  trackEstimated1RM: false, progression: 'last_set', checkSet: 3, threshold: 10 },
      { slotCode: 'G1_3', dayCode: '1', group: 'g2', family: 'hinge',           setsReps: '3x8',     warmupSets: 2, incrementKg: 5,   rpe: 0,  isBodyweight: false, startFactor: 0.6,  trackEstimated1RM: false, progression: 'last_set', checkSet: 3, threshold: 8 },
      { slotCode: 'G1_4', dayCode: '1', group: 'g3', family: 'vertical_pull',   setsReps: '3x10-14', warmupSets: 0, incrementKg: 5,   rpe: 8,  isBodyweight: false, startFactor: 0.65, trackEstimated1RM: false, progression: 'total_reps', threshold: 42 },
      { slotCode: 'G1_5', dayCode: '1', group: 'g3', family: 'leg_accessory',   setsReps: '3x10-14', warmupSets: 0, incrementKg: 5,   rpe: 9,  isBodyweight: false, startFactor: 0.65, trackEstimated1RM: false, progression: 'total_reps', threshold: 42 },
      { slotCode: 'G1_6', dayCode: '1', group: 'g4', family: 'abs',             setsReps: '3xmax',   warmupSets: 0, incrementKg: null, rpe: 9,  isBodyweight: true,  startFactor: null, trackEstimated1RM: false, progression: 'none' },
      // ── Gün 2 ──
      { slotCode: 'G2_1', dayCode: '2', group: 'g1', family: 'squat',           setsReps: '4x5+',    warmupSets: 3, incrementKg: 5,   rpe: 0,  isBodyweight: false, startFactor: 0.7,  trackEstimated1RM: true,  progression: 'last_set', checkSet: 4, threshold: 5 },
      { slotCode: 'G2_2', dayCode: '2', group: 'g2', family: 'chest_press',     setsReps: '3x10',    warmupSets: 2, incrementKg: 2.5, rpe: 0,  isBodyweight: false, startFactor: 0.6,  trackEstimated1RM: false, progression: 'last_set', checkSet: 3, threshold: 10 },
      { slotCode: 'G2_3', dayCode: '2', group: 'g2', family: 'vertical_pull',   setsReps: '3xmax',   warmupSets: 0, incrementKg: null, rpe: 9,  isBodyweight: true,  startFactor: null, trackEstimated1RM: false, progression: 'none' },
      { slotCode: 'G2_4', dayCode: '2', group: 'g3', family: 'lateral_raise',   setsReps: '3x10-14', warmupSets: 0, incrementKg: 5,   rpe: 9,  isBodyweight: false, startFactor: 0.6,  trackEstimated1RM: false, progression: 'total_reps', threshold: 42 },
      { slotCode: 'G2_5', dayCode: '2', group: 'g4', family: 'biceps',          setsReps: '3x8-12',  warmupSets: 0, incrementKg: 5,   rpe: 9,  isBodyweight: false, startFactor: 0.75, trackEstimated1RM: false, progression: 'total_reps', threshold: 36 },
      { slotCode: 'G2_6', dayCode: '2', group: 'g4', family: 'abs',             setsReps: '3xmax',   warmupSets: 0, incrementKg: null, rpe: 9,  isBodyweight: true,  startFactor: null, trackEstimated1RM: false, progression: 'none' },
      // ── Gün 3 ──
      { slotCode: 'G3_1', dayCode: '3', group: 'g1', family: 'shoulder_press',  setsReps: '4x5+',    warmupSets: 3, incrementKg: 2.5, rpe: 0,  isBodyweight: false, startFactor: 0.7,  trackEstimated1RM: true,  progression: 'last_set', checkSet: 4, threshold: 5 },
      { slotCode: 'G3_2', dayCode: '3', group: 'g2', family: 'squat',           setsReps: '3x10',    warmupSets: 2, incrementKg: 2.5, rpe: 0,  isBodyweight: false, startFactor: 0.6,  trackEstimated1RM: false, progression: 'last_set', checkSet: 3, threshold: 10 },
      { slotCode: 'G3_3', dayCode: '3', group: 'g2', family: 'row',             setsReps: '4x10',    warmupSets: 2, incrementKg: 2.5, rpe: 0,  isBodyweight: false, startFactor: 0.6,  trackEstimated1RM: false, progression: 'last_set', checkSet: 4, threshold: 10 },
      { slotCode: 'G3_4', dayCode: '3', group: 'g3', family: 'chest_fly',       setsReps: '3x10-14', warmupSets: 0, incrementKg: 5,   rpe: 8,  isBodyweight: false, startFactor: 0.65, trackEstimated1RM: false, progression: 'total_reps', threshold: 42 },
      { slotCode: 'G3_5', dayCode: '3', group: 'g4', family: 'triceps',         setsReps: '3x8-12',  warmupSets: 0, incrementKg: 5,   rpe: 9,  isBodyweight: false, startFactor: 0.75, trackEstimated1RM: false, progression: 'total_reps', threshold: 36 },
      { slotCode: 'G3_6', dayCode: '3', group: 'g4', family: 'abs',             setsReps: '3xmax',   warmupSets: 0, incrementKg: null, rpe: 9,  isBodyweight: true,  startFactor: null, trackEstimated1RM: false, progression: 'none' }
    ];

    function mround(value, multiple) {
      if (value == null || !Number.isFinite(value) || multiple === 0) return null;
      return Math.round(value / multiple) * multiple;
    }

    function setsCountFromScheme(scheme) {
      if (!scheme) return 3;
      if (scheme.startsWith('4x')) return 4;
      if (scheme.startsWith('3x')) return 3;
      return 3;
    }

    function decideNextWeight(slot, currentWeight, repsArray) {
      if (slot.progression === 'none' || slot.isBodyweight) return currentWeight;
      const reps = (repsArray || []).map(v => Number(v || 0));
      if (slot.progression === 'last_set') {
        const setIdx = (slot.checkSet || 1) - 1;
        const val = reps[setIdx] || 0;
        if (val >= (slot.threshold || 0)) {
          return mround(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5);
        }
        return mround(Number(currentWeight) * 0.9, 2.5);
      }
      if (slot.progression === 'total_reps') {
        const setCount = setsCountFromScheme(slot.setsReps);
        const total = reps.slice(0, setCount).reduce((a, b) => a + b, 0);
        if (total >= (slot.threshold || 0)) {
          return mround(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5);
        }
        return currentWeight;
      }
      return currentWeight;
    }

    function previousWeekWeight(program, slotCode, weekNo) {
      const selection = getSlotSelection(program, slotCode);
      if (!selection) return null;
      const slot = TEMPLATE_SLOTS.find(s => s.slotCode === slotCode);
      if (!slot || slot.isBodyweight) return null;
      let current = selection.initialWorkingWeight ?? null;
      if (current == null) return null;
      for (let w = 1; w < weekNo; w++) {
        const log = getLog(state.username, w, slot.dayCode, slotCode);
        const reps = log && Array.isArray(log.reps) ? log.reps : [];
        current = decideNextWeight(slot, current, reps);
      }
      return current;
    }

    function weekEstimated1RM(workingWeight, repsArray) {
      const clean = (repsArray || []).map(Number).filter(n => Number.isFinite(n) && n > 0);
      if (!workingWeight || !clean.length) return null;
      const maxReps = Math.max(...clean);
      return Math.round(((Number(workingWeight) * maxReps * 0.0333) + Number(workingWeight)) * 2) / 2;
    }

    function getSlotSelection(program, slotCode) {
      return program?.setup_data?.selections?.find(s => s.slotCode === slotCode);
    }

    function getLog(username, weekNo, dayCode, slotCode) {
      return state.logs.find(
        l => l.username === username && l.week_no === weekNo && l.workout_code === dayCode && l.slot_code === slotCode
      );
    }

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getDayDisplayName(code) {
      if (code === 'D1') return 'Dinlenme 1';
      if (code === 'D2') return 'Dinlenme 2';
      return `Gün ${code}`;
    }

    async function loadData() {
      const { data: program, error: programError } = await supabase
        .from('programs')
        .select('*')
        .eq('username', state.username)
        .maybeSingle();

      if (programError) throw programError;
      state.program = program || null;

      const { data: logs, error: logsError } = await supabase
        .from('workout_logs')
        .select('*')
        .eq('username', state.username)
        .order('week_no', { ascending: true });

      if (logsError) throw logsError;
      state.logs = logs || [];
    }

    function buildExerciseDashboardRows() {
      if (!state.program?.setup_data?.selections) return [];

      const selections = state.program.setup_data.selections.filter(s => ['1', '2', '3'].includes(s.dayCode));

      return selections.map(selection => {
        const slot = TEMPLATE_SLOTS.find(t => t.slotCode === selection.slotCode);
        if (!slot) return null;

        const weekly = [];
        for (let week = 1; week <= 12; week++) {
          const weight = previousWeekWeight(state.program, selection.slotCode, week);
          const log = getLog(state.username, week, slot.dayCode, selection.slotCode);
          const reps = log?.reps || [];
          const metric = slot.trackEstimated1RM
            ? weekEstimated1RM(weight, reps)
            : weight;

          weekly.push({
            week,
            weight,
            metric,
            completed: !!log
          });
        }

        return {
          slotCode: selection.slotCode,
          dayCode: selection.dayCode,
          exercise: selection.selectedExercise,
          initial: selection.initialWorkingWeight,
          setsReps: slot.setsReps,
          trackEstimated1RM: slot.trackEstimated1RM,
          weekly
        };
      }).filter(Boolean);
    }

    function renderBars(values) {
      const numeric = values.map(v => Number(v)).filter(v => Number.isFinite(v));
      const max = numeric.length ? Math.max(...numeric) : 0;

      return values.map((value, index) => {
        const num = Number(value);
        const width = max > 0 && Number.isFinite(num) ? Math.max(6, (num / max) * 100) : 0;

        return `
          <div class="bar-row">
            <div>H${index + 1}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${width}%"></div>
            </div>
            <div>${Number.isFinite(num) ? num : '-'}</div>
          </div>
        `;
      }).join('');
    }

    function renderDashboard() {
      if (!state.gatePassed || !ALLOWED_USERS.includes(state.username)) {
        window.location.href = 'index.html';
        return;
      }

      if (!state.program) {
        app.innerHTML = `
          <div class="card">
            <h1 class="title">Dashboard</h1>
            <p class="subtitle">Bu kullanıcı için henüz program kurulmamış.</p>
            <div class="top-actions">
              <button onclick="window.location.href='index.html'">Index'e Dön</button>
            </div>
          </div>
        `;
        return;
      }

      const rows = buildExerciseDashboardRows();
      const completedWorkouts = state.logs.length;
      const completedWeeks = new Set(state.logs.map(l => l.week_no)).size;
      const trackedExercises = rows.length;

      app.innerHTML = `
        <div class="card">
          <div class="row" style="justify-content:space-between;align-items:flex-start;">
            <div>
              <h1 class="title">Dashboard</h1>
              <p class="subtitle">
                ${escapeHtml(state.username)} için seçilen hareketlerin hafta hafta gelişimi.
              </p>
              <div class="pill">Kullanıcı: ${escapeHtml(state.username)}</div>
            </div>
            <div class="top-actions">
              <button class="secondary" id="backToIndex">Antrenman Ekranı</button>
              <button class="secondary" id="logoutBtn">Çıkış</button>
            </div>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">Takip Edilen Hareket</div>
            <div class="summary-value">${trackedExercises}</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">Tamamlanan Antrenman</div>
            <div class="summary-value">${completedWorkouts}</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">Kayıt Girilmiş Hafta</div>
            <div class="summary-value">${completedWeeks}</div>
          </div>
        </div>

        <div style="height:16px;"></div>

        <div class="grid">
          ${rows.map(row => `
            <div class="exercise-card">
              <div class="exercise-name">${escapeHtml(row.exercise)}</div>
              <div class="pill">${escapeHtml(getDayDisplayName(row.dayCode))}</div>
              <div class="pill">Başlangıç: ${row.initial ?? 'BW'}</div>
              <div class="pill">Hedef: ${escapeHtml(row.setsReps)}</div>
              <div class="muted">
                ${row.trackEstimated1RM ? 'Grafik değeri: tahmini 1RM' : 'Grafik değeri: çalışma kilosu'}
              </div>

              <div class="chart-wrap">
                ${renderBars(row.weekly.map(w => w.metric))}
              </div>

              <div class="table-wrap" style="margin-top:12px;">
                <table>
                  <thead>
                    <tr>
                      <th>Hafta</th>
                      <th>Bu hafta kilo</th>
                      <th>Gösterilen değer</th>
                      <th>Durum</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${row.weekly.map(w => `
                      <tr>
                        <td>${w.week}</td>
                        <td>${w.weight ?? '-'}</td>
                        <td>${w.metric ?? '-'}</td>
                        <td>${w.completed ? 'Kaydedildi' : '-'}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          `).join('')}
        </div>

        ${rows.length === 0 ? `<div class="card empty">Gösterilecek hareket bulunamadı.</div>` : ''}
      `;

      document.getElementById('backToIndex').onclick = () => {
        window.location.href = 'index.html';
      };

      document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('superhero_username');
        window.location.href = 'index.html';
      };
    }

    async function init() {
      try {
        if (!state.gatePassed || !state.username) {
          window.location.href = 'index.html';
          return;
        }

        await loadData();
        renderDashboard();
      } catch (err) {
        app.innerHTML = `
          <div class="card">
            <h1 class="title">Hata</h1>
            <p class="subtitle">${escapeHtml(err.message || 'Dashboard yüklenemedi.')}</p>
            <button onclick="window.location.href='index.html'">Index'e Dön</button>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
