<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitness Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #FFFBFE;
      --surface: #fff;
      --surface2: #EEF4EE;
      --border: rgba(0,0,0,.10);
      --text: #191C19;
      --muted: #404943;
      --accent: #1C6B4A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', -apple-system, sans-serif;
      min-height: 100dvh;
    }
    ::-webkit-scrollbar { display: none; } * { scrollbar-width: none; }
    .screen {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0 12px;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 16px;
    }
    .back-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--accent);
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }
    .h1 { font-size: 22px; font-weight: 900; }
    .caption { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    /* Toggle buttons */
    .toggle-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .ex-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1.5px solid;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      font-weight: 800;
      color: var(--text);
      transition: opacity 0.2s;
      line-height: 1;
      font-family: inherit;
    }
    .ex-toggle.off { opacity: 0.3; }
    .ex-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    /* Chart */
    .chart-container { position: relative; height: 240px; }
    /* History accordion */
    .week-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      font-family: inherit;
      transition: border-radius 0.15s;
    }
    .week-header.open {
      border-radius: 14px 14px 0 0;
      margin-bottom: 0;
      border-bottom-color: transparent;
    }
    .week-arrow { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
    .week-header.open .week-arrow { transform: rotate(180deg); }
    .week-body {
      display: none;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 8px 12px 12px;
      margin-bottom: 6px;
    }
    .week-body.open { display: block; }
    .day-section { margin-bottom: 10px; }
    .day-section:last-child { margin-bottom: 0; }
    .day-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.07em;
      padding: 3px 8px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 6px;
    }
    .ex-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0,0,0,.06);
      font-size: 13px;
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-name { flex: 1; font-weight: 700; }
    .reps-chips { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
    .rep-chip {
      background: rgba(28,107,74,.1);
      border: 1px solid rgba(28,107,74,.22);
      border-radius: 5px;
      padding: 1px 5px;
      font-size: 11px;
      color: #1C6B4A;
      font-weight: 700;
      white-space: nowrap;
    }
    .note-text { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; }
    .spinner { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 4px;
      margin-bottom: 14px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 6px;
      border-radius: 12px;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,.10);
    }
  </style>
</head>
<body>
  <div class="screen" id="root">
    <div class="spinner">Yükleniyor…</div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://vwubvpjidodewzvtqjtf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Pyhx-5-wLHw199bcT6URCA_O2Xu6QQY';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const state = {
      username: localStorage.getItem('vaft_user') || localStorage.getItem('superhero_username') || '',
      gatePassed: localStorage.getItem('vaft_gate') === 'true' || localStorage.getItem('superhero_gate_passed') === 'true',
      program: null,
      logs: []
    };

    const PALETTE = [
      '#1C6B4A','#B3261E','#0061A4','#7C5800','#6750A4',
      '#00695C','#AD1457','#1565C0','#558B2F','#4527A0',
      '#C62828','#0277BD','#E65100','#37474F','#2E7D32','#6D4C41'
    ];

    const FAMILY_SEGMENT = {
      chest_press: 'Göğüs', chest_fly: 'Göğüs',
      shoulder_press: 'Omuz', lateral_raise: 'Omuz',
      biceps: 'Kol', triceps: 'Kol',
      vertical_pull: 'Sırt', row: 'Sırt',
      squat: 'Bacak', hinge: 'Bacak', leg_accessory: 'Bacak', hip_adductor: 'Bacak',
    };

    const TEMPLATE_SLOTS = [
      { slotCode:'G1_1', dayCode:'1', family:'chest_press',    setsReps:'4x5+',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:4, threshold:5  },
      { slotCode:'G1_2', dayCode:'1', family:'shoulder_press', setsReps:'3x10',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:3, threshold:10 },
      { slotCode:'G1_3', dayCode:'1', family:'hinge',          setsReps:'3x8',     incrementKg:5,   isBodyweight:false, progression:'last_set',   checkSet:3, threshold:8  },
      { slotCode:'G1_4', dayCode:'1', family:'vertical_pull',  setsReps:'3x10-14', incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:42 },
      { slotCode:'G1_5', dayCode:'1', family:'leg_accessory',  setsReps:'3x10-14', incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:42 },
      { slotCode:'G1_6', dayCode:'1', family:'hip_adductor',   setsReps:'3x15',    incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:45 },
      { slotCode:'G2_1', dayCode:'2', family:'squat',          setsReps:'4x5+',    incrementKg:5,   isBodyweight:false, progression:'last_set',   checkSet:4, threshold:5  },
      { slotCode:'G2_2', dayCode:'2', family:'chest_press',    setsReps:'3x10',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:3, threshold:10 },
      { slotCode:'G2_3', dayCode:'2', family:'vertical_pull',  setsReps:'3xmax',   incrementKg:null,isBodyweight:true,  progression:'none' },
      { slotCode:'G2_4', dayCode:'2', family:'lateral_raise',  setsReps:'3x10-14', incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:42 },
      { slotCode:'G2_5', dayCode:'2', family:'biceps',         setsReps:'3x8-12',  incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:36 },
      { slotCode:'G2_6', dayCode:'2', family:'hip_adductor',   setsReps:'3x15',    incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:45 },
      { slotCode:'G3_1', dayCode:'3', family:'shoulder_press', setsReps:'4x5+',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:4, threshold:5  },
      { slotCode:'G3_2', dayCode:'3', family:'squat',          setsReps:'3x10',    incrementKg:5,   isBodyweight:false, progression:'last_set',   checkSet:3, threshold:10 },
      { slotCode:'G3_3', dayCode:'3', family:'row',            setsReps:'4x10',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:4, threshold:10 },
      { slotCode:'G3_4', dayCode:'3', family:'chest_fly',      setsReps:'3x10-14', incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:42 },
      { slotCode:'G3_5', dayCode:'3', family:'triceps',        setsReps:'3x8-12',  incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:36 },
      { slotCode:'G3_6', dayCode:'3', family:'hip_adductor',   setsReps:'3x15',    incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:45 },
    ];

    function mround(val, mult) {
      if (!Number.isFinite(val)) return null;
      return Math.ceil(val / 5) * 5;
    }
    function setsCount(scheme) { return scheme?.startsWith('4x') ? 4 : 3; }

    function decideNextWeight(slot, currentWeight, repsArray) {
      if (slot.progression === 'none' || slot.isBodyweight) return currentWeight;
      const reps = (repsArray || []).map(v => Number(v || 0));
      if (slot.progression === 'last_set') {
        const val = reps[(slot.checkSet || 1) - 1] || 0;
        const t = slot.threshold || 0;
        const met = slot.setsReps?.includes('+') ? val >= t : val === t;
        return met
          ? mround(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5)
          : mround(Number(currentWeight) * 0.9, 2.5);
      }
      if (slot.progression === 'total_reps') {
        const total = reps.slice(0, setsCount(slot.setsReps)).reduce((a, b) => a + b, 0);
        return total >= (slot.threshold || 0)
          ? mround(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5)
          : currentWeight;
      }
      return currentWeight;
    }

    function getLog(weekNo, dayCode, slotCode) {
      return state.logs.find(l =>
        l.week_no === weekNo && l.workout_code === dayCode && l.slot_code === slotCode
      );
    }

    function getSlotSelection(slotCode) {
      return state.program?.setup_data?.selections?.find(s => s.slotCode === slotCode);
    }

    // Compute weight used in week W for slot (only for logged weeks → null otherwise)
    function maxLoggedWeek() {
      if (!state.logs?.length) return 1;
      return Math.max(...state.logs.map(l => l.week_no || 1));
    }

    function computeWeightSeries(slotCode, totalWeeks) {
      const sel = getSlotSelection(slotCode);
      if (!sel) return Array(totalWeeks).fill(null);
      const slot = TEMPLATE_SLOTS.find(s => s.slotCode === slotCode);
      if (!slot || slot.isBodyweight) return Array(totalWeeks).fill(null);

      let current = sel.initialWorkingWeight ?? null;
      if (current == null) return Array(totalWeeks).fill(null);

      const series = [];
      for (let w = 1; w <= totalWeeks; w++) {
        const log = getLog(w, slot.dayCode, slotCode);
        if (log) {
          series.push(Number(current));
          current = decideNextWeight(slot, current, Array.isArray(log.reps) ? log.reps : []);
        } else {
          series.push(null);
        }
      }
      return series;
    }

    function getExerciseName(slotCode) {
      return getSlotSelection(slotCode)?.selectedExercise || slotCode;
    }

    // Tüm non-bodyweight slotları egzersiz adına göre grupla, renk ata
    function buildExerciseGroups(totalWeeks) {
      const groups = {}; // exName → { color, series, slotCodes }
      let colorIdx = 0;
      for (const slot of TEMPLATE_SLOTS) {
        if (slot.isBodyweight) continue;
        const exName = getExerciseName(slot.slotCode);
        if (!exName || exName === slot.slotCode) continue; // seçim yapılmamış slot
        const series = computeWeightSeries(slot.slotCode, totalWeeks);
        // Herhangi bir log var mı kontrol et
        const hasAny = series.some(v => v != null);
        if (!hasAny) continue;
        if (!groups[exName]) {
          const seg = FAMILY_SEGMENT[slot.family] || 'Diğer';
          groups[exName] = { color: PALETTE[colorIdx++ % PALETTE.length], series: Array(totalWeeks).fill(null), slotCodes: [], segment: seg };
        }
        groups[exName].slotCodes.push(slot.slotCode);
        // Aynı egzersiz birden fazla slotta varsa yüksek ağırlığı al
        for (let i = 0; i < totalWeeks; i++) {
          if (series[i] != null) {
            groups[exName].series[i] = groups[exName].series[i] == null
              ? series[i] : Math.max(groups[exName].series[i], series[i]);
          }
        }
      }
      return Object.entries(groups).map(([label, g]) => ({ label, ...g }));
    }

    // Epley 1RM tahmini: en iyi setten hesapla
    function computeBest1RM(slotCodes) {
      let best = null;
      for (const slotCode of slotCodes) {
        const slot = TEMPLATE_SLOTS.find(s => s.slotCode === slotCode);
        if (!slot) continue;
        for (const log of state.logs) {
          if (log.slot_code !== slotCode) continue;
          const w = getWeightAtWeek(slotCode, log.week_no);
          if (!w) continue;
          const reps = Array.isArray(log.reps) ? log.reps : [];
          for (const r of reps) {
            if (r > 0) {
              const orm = w * (1 + r / 30);
              if (best == null || orm > best) best = orm;
            }
          }
        }
      }
      return best != null ? Math.ceil(best / 5) * 5 : null;
    }

    function esc(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;').replaceAll('"', '&quot;');
    }

    let chart = null;
    let _exGroups = [];

    function renderChart() {
      if (!_exGroups.length) _exGroups = buildExerciseGroups(_totalWeeks);
      const labels = Array.from({ length: _totalWeeks }, (_, i) => `H${i + 1}`);
      const datasets = _exGroups.map(ex => ({
        label: ex.label,
        data: ex.series,
        borderColor: ex.color,
        backgroundColor: ex.color + '18',
        pointBackgroundColor: ex.color,
        pointBorderColor: ex.color,
        pointRadius: 5,
        pointHoverRadius: 7,
        borderWidth: 2.5,
        tension: 0.3,
        spanGaps: false,
      }));

      const canvas = document.getElementById('progressChart');
      if (chart) chart.destroy();
      chart = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#fff',
              borderColor: 'rgba(0,0,0,.12)',
              borderWidth: 1,
              titleColor: '#404943',
              bodyColor: '#191C19',
              padding: 10,
              boxShadow: '0 2px 8px rgba(0,0,0,.12)',
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y + ' kg' : '-'}`,
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(0,0,0,.06)' },
              ticks: { color: '#404943', font: { size: 11, family: 'Nunito' } },
            },
            y: {
              grid: { color: 'rgba(0,0,0,.06)' },
              ticks: { color: '#404943', font: { size: 11, family: 'Nunito' }, callback: v => v + ' kg' },
            }
          }
        }
      });
    }

    const DAY_COLORS = { '1': '#1C6B4A', '2': '#0061A4', '3': '#B3261E' };
    const DAY_NAMES  = { '1': 'GÜN A', '2': 'GÜN B', '3': 'GÜN C' };

    function buildHistory() {
      const weeks = {};
      for (const log of state.logs) {
        if (!weeks[log.week_no]) weeks[log.week_no] = {};
        if (!weeks[log.week_no][log.workout_code]) weeks[log.week_no][log.workout_code] = [];
        weeks[log.week_no][log.workout_code].push(log);
      }

      const sortedWeeks = Object.keys(weeks).map(Number).sort((a, b) => b - a);
      if (!sortedWeeks.length) return '<div style="color:var(--muted); text-align:center; padding:20px; font-size:13px;">Henüz kayıt yok.</div>';

      return sortedWeeks.map(week => {
        const days = weeks[week];
        const dayCount = Object.keys(days).length;
        const totalSets = Object.values(days).flat()
          .reduce((a, l) => a + (Array.isArray(l.reps) ? l.reps.length : 0), 0);

        const daysHtml = ['1', '2', '3'].map(dayCode => {
          const dayLogs = days[dayCode];
          if (!dayLogs) return '';
          const color = DAY_COLORS[dayCode];
          const incomplete = dayLogs.some(l => l.notes?.includes('Yarım bırakıldı'));

          const exRows = dayLogs.map(log => {
            const exName = getSlotSelection(log.slot_code)?.selectedExercise || log.slot_code;
            const reps = Array.isArray(log.reps) ? log.reps : [];
            const kg = getWeightAtWeek(log.slot_code, week);
            const kgHtml = kg != null
              ? `<span style="font-size:11px; font-weight:800; color:var(--muted); background:rgba(0,0,0,.06); border-radius:5px; padding:1px 6px; margin-right:4px; white-space:nowrap;">${kg} kg</span>`
              : '';
            return `
              <div class="ex-row">
                <div class="ex-name">${esc(exName)}</div>
                <div>
                  <div class="reps-chips" style="align-items:center;">
                    ${kgHtml}${reps.map(r => `<span class="rep-chip">${r}</span>`).join('')}
                  </div>
                  ${log.notes ? `<div class="note-text">💬 ${esc(log.notes)}</div>` : ''}
                </div>
              </div>`;
          }).join('');

          return `
            <div class="day-section">
              <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
                <div class="day-label" style="margin-bottom:0; background:${color}20; color:${color}; border:1px solid ${color}40;">
                  ${DAY_NAMES[dayCode]}
                </div>
                ${incomplete ? `<span style="font-size:10px; background:rgba(186,26,26,.1); color:#BA1A1A; border:1px solid rgba(186,26,26,.25); border-radius:6px; padding:2px 7px; font-weight:800;">yarım kaldı</span>` : ''}
              </div>
              ${exRows}
            </div>`;
        }).join('');

        return `
          <div>
            <button class="week-header" onclick="toggleWeek(${week})">
              <span>Hafta ${week}</span>
              <span style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:12px; color:var(--muted);">${dayCount} gün · ${totalSets} set</span>
                <span class="week-arrow">▼</span>
              </span>
            </button>
            <div class="week-body" id="week-${week}">
              ${daysHtml}
            </div>
          </div>`;
      }).join('');
    }

    // Precomputed weight series per slot: { slotCode: [w1, w2, ...] }
    let weightSeriesCache = {};
    let _totalWeeks = 1;

    function buildWeightCache() {
      _totalWeeks = Math.max(maxLoggedWeek(), 1);
      weightSeriesCache = {};
      for (const slot of TEMPLATE_SLOTS) {
        weightSeriesCache[slot.slotCode] = computeWeightSeries(slot.slotCode, _totalWeeks);
      }
    }

    function getWeightAtWeek(slotCode, weekNo) {
      const series = weightSeriesCache[slotCode];
      if (!series) return null;
      return series[weekNo - 1] ?? null;
    }

    let _activeTab = 'chart'; // 'chart' | 'orm' | 'history'

    function render() {
      buildWeightCache();
      _exGroups = buildExerciseGroups(_totalWeeks);
      const root = document.getElementById('root');

      const tabBar = `
        <div class="tab-bar">
          <button class="tab-btn ${_activeTab === 'chart' ? 'active' : ''}" onclick="setTab('chart')">Gelişim</button>
          <button class="tab-btn ${_activeTab === 'orm' ? 'active' : ''}" onclick="setTab('orm')">1RM</button>
          <button class="tab-btn ${_activeTab === 'history' ? 'active' : ''}" onclick="setTab('history')">Geçmiş</button>
        </div>`;

      let tabContent = '';

      const SEGMENTS = ['Göğüs', 'Omuz', 'Kol', 'Sırt', 'Bacak'];

      function segmentedExHtml(renderItem) {
        return SEGMENTS.map(seg => {
          const items = _exGroups
            .map((ex, i) => ({ ex, i }))
            .filter(({ ex }) => ex.segment === seg)
            .map(({ ex, i }) => renderItem(ex, i))
            .filter(Boolean).join('');
          if (!items) return '';
          return `
            <div style="margin-bottom:14px;">
              <div class="section-label" style="margin-bottom:8px;">${seg}</div>
              ${items}
            </div>`;
        }).join('');
      }

      if (_activeTab === 'chart') {
        const togglesHtml = SEGMENTS.map(seg => {
          const btns = _exGroups
            .map((ex, i) => ({ ex, i }))
            .filter(({ ex }) => ex.segment === seg)
            .map(({ ex, i }) => `
              <button class="ex-toggle" id="toggle-${i}"
                style="border-color:${ex.color}; color:${ex.color};"
                onclick="toggleExercise(${i})">
                <span class="ex-dot" style="background:${ex.color};"></span>
                ${esc(ex.label)}
              </button>`).join('');
          if (!btns) return '';
          return `
            <div style="margin-bottom:10px;">
              <div class="section-label" style="margin-bottom:6px;">${seg}</div>
              <div class="toggle-row" style="margin-bottom:0;">${btns}</div>
            </div>`;
        }).join('');
        tabContent = `
          <div class="card">
            <div class="section-label">GELİŞİM GRAFİĞİ</div>
            <div style="margin-bottom:12px;">${togglesHtml}</div>
            <div class="chart-container">
              <canvas id="progressChart"></canvas>
            </div>
          </div>`;

      } else if (_activeTab === 'orm') {
        const ormContent = segmentedExHtml((ex) => {
          const orm = computeBest1RM(ex.slotCodes);
          if (orm == null) return '';
          return `
            <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);">
              <div style="display:flex; align-items:center; gap:8px;">
                <span style="width:9px; height:9px; border-radius:50%; background:${ex.color}; flex-shrink:0; display:inline-block;"></span>
                <span style="font-size:14px; font-weight:700;">${esc(ex.label)}</span>
              </div>
              <span style="font-size:18px; font-weight:900; color:${ex.color};">${orm} <span style="font-size:13px; font-weight:700; color:var(--muted);">kg</span></span>
            </div>`;
        });
        tabContent = `
          <div class="card">
            <div class="section-label" style="margin-bottom:2px;">TAHMİNİ MAKSİMUM (1RM)</div>
            <div style="font-size:11px; color:var(--muted); margin-bottom:14px;">Epley formülü · en iyi setten · üst 5'e yuvarlandı</div>
            ${ormContent || '<div style="color:var(--muted);text-align:center;padding:20px;font-size:13px;">Henüz log yok.</div>'}
          </div>`;

      } else {
        tabContent = `
          <div class="card">
            <div class="section-label" style="margin-bottom:14px;">ANTRENMAN GEÇMİŞİ</div>
            ${buildHistory()}
          </div>`;
      }

      root.innerHTML = `
        <div class="header">
          <button class="back-btn" onclick="window.location.href='index.html'">← Geri</button>
          <div>
            <div class="h1">Dashboard</div>
            <div class="caption">${esc(state.username)}</div>
          </div>
        </div>
        ${tabBar}
        ${tabContent}`;

      if (_activeTab === 'chart') renderChart();
    }

    window.toggleExercise = function(i) {
      if (!chart) return;
      chart.data.datasets[i].hidden = !chart.data.datasets[i].hidden;
      chart.update();
      document.getElementById(`toggle-${i}`).classList.toggle('off', !!chart.data.datasets[i].hidden);
    };

    window.setTab = function(tab) {
      _activeTab = tab;
      render();
    };

    window.toggleWeek = function(week) {
      const body = document.getElementById(`week-${week}`);
      const btn = body.previousElementSibling;
      body.classList.toggle('open');
      btn.classList.toggle('open', body.classList.contains('open'));
    };

    async function init() {
      if (!state.gatePassed || !state.username) {
        window.location.href = 'index.html';
        return;
      }
      try {
        const [{ data: prog }, { data: logs }] = await Promise.all([
          supabase.from('programs').select('*').eq('username', state.username).maybeSingle(),
          supabase.from('workout_logs').select('*').eq('username', state.username).order('week_no'),
        ]);
        state.program = prog;
        state.logs = logs || [];
        render();
      } catch (err) {
        document.getElementById('root').innerHTML =
          `<div class="spinner">Hata: ${esc(err.message)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
