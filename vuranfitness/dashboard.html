<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitness Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #060d1f;
      --surface: #0f1929;
      --surface2: #182236;
      --border: #1e2d42;
      --text: #f1f5f9;
      --muted: #64748b;
      --accent: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Inter', sans-serif;
      min-height: 100dvh;
    }
    .screen {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .back-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .h1 { font-size: 22px; font-weight: 800; }
    .caption { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    /* Toggle buttons */
    .toggle-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .ex-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1.5px solid;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      transition: opacity 0.2s;
      line-height: 1;
    }
    .ex-toggle.off { opacity: 0.28; }
    .ex-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    /* Chart */
    .chart-container { position: relative; height: 240px; }
    /* History accordion */
    .week-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      transition: border-radius 0.15s;
    }
    .week-header.open {
      border-radius: 14px 14px 0 0;
      margin-bottom: 0;
      border-bottom-color: transparent;
    }
    .week-arrow { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
    .week-header.open .week-arrow { transform: rotate(180deg); }
    .week-body {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 8px 12px 12px;
      margin-bottom: 6px;
    }
    .week-body.open { display: block; }
    .day-section { margin-bottom: 10px; }
    .day-section:last-child { margin-bottom: 0; }
    .day-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      padding: 3px 8px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 6px;
    }
    .ex-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: 13px;
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-name { flex: 1; font-weight: 500; }
    .reps-chips { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
    .rep-chip {
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.2);
      border-radius: 5px;
      padding: 1px 5px;
      font-size: 11px;
      color: #86efac;
      white-space: nowrap;
    }
    .note-text { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; }
    .spinner { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <div class="screen" id="root">
    <div class="spinner">Yükleniyor…</div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://vwubvpjidodewzvtqjtf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Pyhx-5-wLHw199bcT6URCA_O2Xu6QQY';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const state = {
      username: localStorage.getItem('vaft_user') || localStorage.getItem('superhero_username') || '',
      gatePassed: localStorage.getItem('vaft_gate') === 'true' || localStorage.getItem('superhero_gate_passed') === 'true',
      program: null,
      logs: []
    };

    // 5 ana hareket: g1 grubu (3) + g2 grubu deadlift & row (2)
    const CHART_SLOTS = [
      { slotCode: 'G1_1', dayCode: '1', label: 'Chest Press',    color: '#22c55e' },
      { slotCode: 'G2_1', dayCode: '2', label: 'Squat',          color: '#facc15' },
      { slotCode: 'G3_1', dayCode: '3', label: 'Shoulder Press', color: '#60a5fa' },
      { slotCode: 'G1_3', dayCode: '1', label: 'Romanian DL',    color: '#fb923c' },
      { slotCode: 'G3_3', dayCode: '3', label: 'Barbell Row',    color: '#c084fc' },
    ];

    const TEMPLATE_SLOTS = [
      { slotCode:'G1_1', dayCode:'1', setsReps:'4x5+',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:4, threshold:5  },
      { slotCode:'G1_2', dayCode:'1', setsReps:'3x10',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:3, threshold:10 },
      { slotCode:'G1_3', dayCode:'1', setsReps:'3x8',     incrementKg:5,   isBodyweight:false, progression:'last_set',   checkSet:3, threshold:8  },
      { slotCode:'G1_4', dayCode:'1', setsReps:'3x10-14', incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:42 },
      { slotCode:'G1_5', dayCode:'1', setsReps:'3x10-14', incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:42 },
      { slotCode:'G1_6', dayCode:'1', setsReps:'3xmax',   incrementKg:null,isBodyweight:true,  progression:'none' },
      { slotCode:'G2_1', dayCode:'2', setsReps:'4x5+',    incrementKg:5,   isBodyweight:false, progression:'last_set',   checkSet:4, threshold:5  },
      { slotCode:'G2_2', dayCode:'2', setsReps:'3x10',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:3, threshold:10 },
      { slotCode:'G2_3', dayCode:'2', setsReps:'3xmax',   incrementKg:null,isBodyweight:true,  progression:'none' },
      { slotCode:'G2_4', dayCode:'2', setsReps:'3x10-14', incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:42 },
      { slotCode:'G2_5', dayCode:'2', setsReps:'3x8-12',  incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:36 },
      { slotCode:'G2_6', dayCode:'2', setsReps:'3xmax',   incrementKg:null,isBodyweight:true,  progression:'none' },
      { slotCode:'G3_1', dayCode:'3', setsReps:'4x5+',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:4, threshold:5  },
      { slotCode:'G3_2', dayCode:'3', setsReps:'3x10',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:3, threshold:10 },
      { slotCode:'G3_3', dayCode:'3', setsReps:'4x10',    incrementKg:2.5, isBodyweight:false, progression:'last_set',   checkSet:4, threshold:10 },
      { slotCode:'G3_4', dayCode:'3', setsReps:'3x10-14', incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:42 },
      { slotCode:'G3_5', dayCode:'3', setsReps:'3x8-12',  incrementKg:5,   isBodyweight:false, progression:'total_reps', threshold:36 },
      { slotCode:'G3_6', dayCode:'3', setsReps:'3xmax',   incrementKg:null,isBodyweight:true,  progression:'none' },
    ];

    function mround(val, mult) {
      if (!Number.isFinite(val) || !mult) return null;
      return Math.round(val / mult) * mult;
    }
    function setsCount(scheme) { return scheme?.startsWith('4x') ? 4 : 3; }

    function decideNextWeight(slot, currentWeight, repsArray) {
      if (slot.progression === 'none' || slot.isBodyweight) return currentWeight;
      const reps = (repsArray || []).map(v => Number(v || 0));
      if (slot.progression === 'last_set') {
        const val = reps[(slot.checkSet || 1) - 1] || 0;
        const t = slot.threshold || 0;
        const met = slot.setsReps?.includes('+') ? val >= t : val === t;
        return met
          ? mround(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5)
          : mround(Number(currentWeight) * 0.9, 2.5);
      }
      if (slot.progression === 'total_reps') {
        const total = reps.slice(0, setsCount(slot.setsReps)).reduce((a, b) => a + b, 0);
        return total >= (slot.threshold || 0)
          ? mround(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5)
          : currentWeight;
      }
      return currentWeight;
    }

    function getLog(weekNo, dayCode, slotCode) {
      return state.logs.find(l =>
        l.week_no === weekNo && l.workout_code === dayCode && l.slot_code === slotCode
      );
    }

    function getSlotSelection(slotCode) {
      return state.program?.setup_data?.selections?.find(s => s.slotCode === slotCode);
    }

    // Compute weight used in week W for slot (only for logged weeks → null otherwise)
    function computeWeightSeries(slotCode) {
      const sel = getSlotSelection(slotCode);
      if (!sel) return Array(12).fill(null);
      const slot = TEMPLATE_SLOTS.find(s => s.slotCode === slotCode);
      if (!slot || slot.isBodyweight) return Array(12).fill(null);

      let current = sel.initialWorkingWeight ?? null;
      if (current == null) return Array(12).fill(null);

      const series = [];
      for (let w = 1; w <= 12; w++) {
        const log = getLog(w, slot.dayCode, slotCode);
        if (log) {
          series.push(Number(current));
          current = decideNextWeight(slot, current, Array.isArray(log.reps) ? log.reps : []);
        } else {
          series.push(null);
        }
      }
      return series;
    }

    function getExerciseName(slotCode) {
      return getSlotSelection(slotCode)?.selectedExercise
        || CHART_SLOTS.find(s => s.slotCode === slotCode)?.label
        || slotCode;
    }

    function esc(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;').replaceAll('"', '&quot;');
    }

    let chart = null;

    function renderChart() {
      const labels = Array.from({ length: 12 }, (_, i) => `H${i + 1}`);
      const datasets = CHART_SLOTS.map(ex => ({
        label: getExerciseName(ex.slotCode),
        data: computeWeightSeries(ex.slotCode),
        borderColor: ex.color,
        backgroundColor: ex.color + '18',
        pointBackgroundColor: ex.color,
        pointBorderColor: ex.color,
        pointRadius: 5,
        pointHoverRadius: 7,
        borderWidth: 2.5,
        tension: 0.3,
        spanGaps: false,
      }));

      const canvas = document.getElementById('progressChart');
      if (chart) chart.destroy();
      chart = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#0f1929',
              borderColor: '#1e2d42',
              borderWidth: 1,
              titleColor: '#94a3b8',
              bodyColor: '#f1f5f9',
              padding: 10,
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y + ' kg' : '-'}`,
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,.05)' },
              ticks: { color: '#64748b', font: { size: 11 } },
            },
            y: {
              grid: { color: 'rgba(255,255,255,.05)' },
              ticks: { color: '#64748b', font: { size: 11 }, callback: v => v + ' kg' },
            }
          }
        }
      });
    }

    const DAY_COLORS = { '1': '#22c55e', '2': '#60a5fa', '3': '#fb923c' };
    const DAY_NAMES  = { '1': 'GÜN A', '2': 'GÜN B', '3': 'GÜN C' };

    function buildHistory() {
      const weeks = {};
      for (const log of state.logs) {
        if (!weeks[log.week_no]) weeks[log.week_no] = {};
        if (!weeks[log.week_no][log.workout_code]) weeks[log.week_no][log.workout_code] = [];
        weeks[log.week_no][log.workout_code].push(log);
      }

      const sortedWeeks = Object.keys(weeks).map(Number).sort((a, b) => b - a);
      if (!sortedWeeks.length) return '<div style="color:var(--muted); text-align:center; padding:20px; font-size:13px;">Henüz kayıt yok.</div>';

      return sortedWeeks.map(week => {
        const days = weeks[week];
        const dayCount = Object.keys(days).length;
        const totalSets = Object.values(days).flat()
          .reduce((a, l) => a + (Array.isArray(l.reps) ? l.reps.length : 0), 0);

        const daysHtml = ['1', '2', '3'].map(dayCode => {
          const dayLogs = days[dayCode];
          if (!dayLogs) return '';
          const color = DAY_COLORS[dayCode];
          const incomplete = dayLogs.some(l => l.notes?.includes('Yarım bırakıldı'));

          const exRows = dayLogs.map(log => {
            const exName = getSlotSelection(log.slot_code)?.selectedExercise || log.slot_code;
            const reps = Array.isArray(log.reps) ? log.reps : [];
            return `
              <div class="ex-row">
                <div class="ex-name">${esc(exName)}</div>
                <div>
                  <div class="reps-chips">
                    ${reps.map(r => `<span class="rep-chip">${r}</span>`).join('')}
                  </div>
                  ${log.notes ? `<div class="note-text">💬 ${esc(log.notes)}</div>` : ''}
                </div>
              </div>`;
          }).join('');

          return `
            <div class="day-section">
              <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
                <div class="day-label" style="margin-bottom:0; background:${color}20; color:${color}; border:1px solid ${color}40;">
                  ${DAY_NAMES[dayCode]}
                </div>
                ${incomplete ? `<span style="font-size:10px; background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.3); border-radius:6px; padding:2px 7px; font-weight:700;">yarım kaldı</span>` : ''}
              </div>
              ${exRows}
            </div>`;
        }).join('');

        return `
          <div>
            <button class="week-header" onclick="toggleWeek(${week})">
              <span>Hafta ${week}</span>
              <span style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:12px; color:var(--muted);">${dayCount} gün · ${totalSets} set</span>
                <span class="week-arrow">▼</span>
              </span>
            </button>
            <div class="week-body" id="week-${week}">
              ${daysHtml}
            </div>
          </div>`;
      }).join('');
    }

    function render() {
      const root = document.getElementById('root');

      const togglesHtml = CHART_SLOTS.map((ex, i) => `
        <button class="ex-toggle" id="toggle-${i}"
          style="border-color:${ex.color}; color:${ex.color};"
          onclick="toggleExercise(${i})">
          <span class="ex-dot" style="background:${ex.color};"></span>
          ${esc(getExerciseName(ex.slotCode))}
        </button>`).join('');

      root.innerHTML = `
        <div class="header">
          <button class="back-btn" onclick="window.location.href='index.html'">← Geri</button>
          <div>
            <div class="h1">Dashboard</div>
            <div class="caption">${esc(state.username)}</div>
          </div>
        </div>

        <div class="card">
          <div class="section-label">GELİŞİM GRAFİĞİ</div>
          <div class="toggle-row">${togglesHtml}</div>
          <div class="chart-container">
            <canvas id="progressChart"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="section-label" style="margin-bottom:14px;">ANTRENMAN GEÇMİŞİ</div>
          ${buildHistory()}
        </div>`;

      renderChart();
    }

    window.toggleExercise = function(i) {
      if (!chart) return;
      chart.data.datasets[i].hidden = !chart.data.datasets[i].hidden;
      chart.update();
      document.getElementById(`toggle-${i}`).classList.toggle('off', !!chart.data.datasets[i].hidden);
    };

    window.toggleWeek = function(week) {
      const body = document.getElementById(`week-${week}`);
      const btn = body.previousElementSibling;
      body.classList.toggle('open');
      btn.classList.toggle('open', body.classList.contains('open'));
    };

    async function init() {
      if (!state.gatePassed || !state.username) {
        window.location.href = 'index.html';
        return;
      }
      try {
        const [{ data: prog }, { data: logs }] = await Promise.all([
          supabase.from('programs').select('*').eq('username', state.username).maybeSingle(),
          supabase.from('workout_logs').select('*').eq('username', state.username).order('week_no'),
        ]);
        state.program = prog;
        state.logs = logs || [];
        render();
      } catch (err) {
        document.getElementById('root').innerHTML =
          `<div class="spinner">Hata: ${esc(err.message)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
