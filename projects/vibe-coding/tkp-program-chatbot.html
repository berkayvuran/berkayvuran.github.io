الرجعية خلفنا وتجاوزها من كل جوانبها.\nحان الوقت الآن لأن تعود الشيوعية مرة أخرى إلى المكانة التي تستحقها في نظر الطبقة العاملة والجماهير الكادحة الواسعة، بوصفها برنامج تحرر.\nوستكون هذه العودة ثمرة النضال الذي ستخوضه الأحزاب الشيوعية في العالم أجمع.\nوالحزب الشيوعي التركي يواجه في بلدنا هذه المهمة تحديداً.\nالثورة الاشتراكية في تركيا مسألة راهنة"},{"title":"مقدمة","text":"انتهت مغامرة التغريب والتقدم التي رافقت التحول الرأسمالي المتأخر للدولة العثمانية في القرن التاسع عشر، بعملية الاستعمار التي واجهتها لاحقاً بشكل ملموس. وكان لا بد من إحباط مخطط الاستعمار حتى يمكن إعادة فتح دفتر التغريب والتقدم. وبفضل حرب الاستقلال التي خيضت ضد الإمبريالية والتي أحبطت هذا المخطط، في ظرف تاريخي حدّدته ثورة أكتوبر العظمى عام 1917 وبدعم من السلطة الثورية لأول بلد اشتراكي، أصبح أهم اندفاعة إلى الأمام للثورة البرجوازية التركية، أي تأسيس الجمهورية التركية، ممكناً. لكن وجود الجمهورية التركية، التي تجسدت في ظروف خاصة جداً، ظل موضع جدل دائم بالنسبة للإمبريالية. وقد طبعت هذه العلاقة المتوترة مع المراكز الإمبريالية تاريخ جمهورية 1923.\nتاريخ الجمهورية هو نتاج الانعكاسات التاريخية للطبقة المؤسسة. فالبرجوازية التركية الفتية، التي رسّخت سلطتها بالاندفاعة الثورية لعام 1923، تجنبت تنظيم العلمانية بوصفها حركة تنوير مجتمعي، وخافت خوفاً مميتاً من العروق التقدمية التي كان يمكن أن تفتح الطريق أمام تنوير مجتمعي. وتماشياً مع ذلك، فإن حكام تركيا الذين تصرفوا بتردد في تصفية الرجعية الدينية، لن يترددوا حين يحين الوقت، وتماشياً مع توجهات الإمبريالية في العالم أجمع، في استخدام الرجعية الدينية عبر يد الدولة ضد الحركات اليسارية والثورية الصاعدة.\nإن رأسمالية تركيا، التي لم تتردد لحظة واحدة في إظهار وجهها القمعي تجاه الطبقة العاملة منذ بداية الطريق، لم تتوانَ أيضاً في ترسيخ نزعاتها الاستبدادية كتقليد.\nوفيما كانت تركيا تعيش تحولاً رأسمالياً، لم تمسّ طبقة رأس المال التركية الإقطاعية الكردية، وفضّلت التحالف مع حكام الأكراد. واتبع نظام رأس المال، برفضه لوجود الأكراد كلياً، خطاً تمييزياً تاريخياً ضد فقراء الأكراد وكادحيهم، وفيما كان يرعى المصالح الطبقية لحكام الأكراد، لم يتردد في اغتصاب أبسط الحقوق الإنسانية لجميع الأكراد باستثناء هذه الأقلية الصغيرة. ونتيجة للسياسة الكردية التي اتبعتها، شقّت طبقة رأس المال صف الطبقة العاملة التركية. وقد جرّت البرجوازية التركية البلاد إلى حافة حرب أهلية بالقومية التي ضختها لإثارة العداء بين الكادحين الأكراد والأتراك.\nكما أن هجرة الأرمن والروم وما رافقها من مأساة نتجت عن عملية التأمم، جزء لا يتجزأ من التحول الرأسمالي في تركيا. وتشكل هذه العملية، التي تضمنت أيضاً نقل رأس المال من البرجوازية غير المسلمة إلى البرجوازية التركية الجديدة، مثالاً ملموساً على أن الرأسمالية جعلت الشعوب أعداء بعضها بعضاً.\nإن جمهورية 1923، التي قبلت أن تكون الحصن الأمامي للخط المعادي للشيوعية الذي أُقيم ضد الاتحاد السوفياتي خلال الحرب الباردة، وعرّفت نفسها بهذا الشكل في إطار تقسيم العمل داخل النظام الرأسمالي العالمي، كانت في الواقع تسرّع العملية التي أعدّت لنهايتها هي نفسها.\nومع انحلال الاشتراكية، أُعيد تقييم جمهورية 1923 من قبل النظام الرأسمالي الإمبريالي والبرجوازية التركية، وأُريد بعد هذا التقييم أن تصبح تركيا تابعة كلياً وبشكل كامل للإمبريالية، وأن تُزال كل العوائق أمام تحديد النظام الاقتصادي بديناميات السوق، وأن تُرسَّخ الرجعية الدينية بشكل دائم في الحياة السياسية والاجتماعية.\nكان هذا التحول الجذري يعني نهاية جمهورية 1923. وبينما كانت طبقة رأس المال التركية تتولى الدور المنوط بها في تقسيم العمل داخل النظام الرأسمالي الدولي، لم تكن توافق على مهمة فحسب، بل كانت توافق أيضاً على عملية اقتصادية واجتماعية وسياسية ستعدّ لنهاية الجمهورية. وقد هيأت هذه العملية تركيا لانهيار الجمهورية. أما اليسار، القوة الوحيدة القادرة على مقاومة هذا التحول، فقد قُمع وأُخضع أولاً بانقلاب 12 آذار (مارس)، وبشكل رئيسي بانقلاب 12 أيلول (سبتمبر). وفيما كانت كل المكتسبات التقدمية للجمهورية في تركيا تُزال واحدة تلو الأخرى، هوجم اليسار، القوة الوحيدة المتسقة القادرة على الدفاع عن هذه المكتسبات. حُكم على الجمهورية بالموت بشل اليسار.\nتخلت تركيا كلياً عن الاستقلال والعلمانية حتى كادعاء أو كمظهر، وانتهت جمهورية 1923، بشكل لا رجعة فيه، خلال حكم حزب العدالة والتنمية الذي أُقيم لتنفيذ الضربات الأخيرة لعملية الثورة المضادة. من هذه النقطة فصاعداً، لا فرصة نجاح لحركة تتحرك بمرجعية 1923 في تركيا. فكما لا مقابل اليوم لفهم للعلمانية يستنسخ الماضي، كذلك لا يمكن بناء بلد مستقل بمعايير قديمة.\nلا يمكن البحث عن حل لمشكلات تركيا الاقتصادية والاجتماعية والسياسية في خيار غير الاشتراكية. فالاشتراكية هي الشرط المسبق لترسيخ العلمانية في مجتمع تركيا وعيشها كعملية تنوير بشكل ملموس، وللاستقلال الاقتصادي والسياسي والعسكري والثقافي، ولحل مشكلات الكادحين الأكراد، ولتحرر المرأة، ولإقامة بنية سياسية تقوم على أساس مشاركة الشعب الكادح ورقابته.\nفي هذا السياق، لا يمكن أن يستند نضال التنوير ولا نضال مناهضة الإمبريالية إلى استراتيجيات تنتجها المنظومة نفسها، ولا أن يوضعا في إطار إصلاحي يقوم على التوافق والتعاون بين الطبقات. والطبقة الوحيدة القادرة على حمل كلا النضالين، اللذين يجب أن يُخاضا بمضمون ثوري، هي الطبقة العاملة.\nفي الظروف التي حددتها نهاية جمهورية 1923، يتوجب على الطبقة العاملة التركية أن تتحرك بهدف الجمهورية الاشتراكية، وأن تخوض في هذا الاتجاه نضالاً تنويرياً ووطنياً ومعادياً للإمبريالية.\nولا يمكن حل مشكلات تركيا المتراكمة إلا بهذه الجمهورية التي ستُقام بعد انتصار الثورة الاشتراكية. لا سبيل لتحسين ظروف عيش الجماهير الفقيرة في تركيا، ولتلبية احتياجاتها الأساسية كالتعليم والصحة والسكن بشكل إنساني ومتساوٍ، سوى نظام اجتماعي اشتراكي يُقام بمصادرة ملكية وسائل الإنتاج باسم الطبقة العاملة. وبوصفهم العناصر المؤسِّسة المتساوية للجمهورية الاشتراكية، يستطيع الكادحون من كل الأمم، الأتراك والأكراد، أن يطوروا إرادة مشتركة في النضال الذي سيخوضونه من أجل هذه الجمهورية الجديدة، وتتشكل الشروط المسبقة لوحدة أخوية في هذا النضال نفسه. ولا يمكن أن تتصالح البرجوازية مع العلمانية في هذه الجغرافيا؛ ولذلك لا يمكن خوض نضال التنوير دون اتخاذ موقف ضد البرجوازية. إن تنظيف الرجعية الدينية، التي نجحت خلال عملية طويلة الأمد في التسلل إلى كل نقطة من الحياة السياسية والاجتماعية في تركيا وأعلنت انتصارها أخيراً في حكم حزب العدالة والتنمية، من كل نقطة تسللت إليها، ممكن بالتنوير غير المشروط للاشتراكية وبفهم للعلمانية مرتبط بذلك.\nالثورة الاشتراكية في تركيا مسألة راهنة.\nإن كون الرأسمالية في تركيا على درجة من التطور تحدد كل العلاقات والبنى الاجتماعية، وإمكانية ربط كل المشكلات الرئيسية التي تعيشها البلاد بالرأسمالية، والوجود المادي للطبقة العاملة التركية، هي الأسس الموضوعية للثورة الاشتراكية التركية. وستحمل ثورة تركيا طابعاً اشتراكياً. والطبقة العاملة التركية، بوصفها القوة الطليعية لهذه الثورة، تشكل وحدة مع الكادحين من مختلف الأصول القومية والإثنية، ويجب مراعاة هذه الوحدة عند تنظيم الطبقة العاملة.\nالاشتراكية ستُكسَب بالنضال الحزبي\nخرجت الطبقة العاملة التركية، بصرف النظر عن الاندفاعات الجزئية السابقة، إلى مسرح السياسة أساساً في الستينيات، وبدأت منذ ذلك التاريخ تلقي بثقلها في صراع الطبقات، وأظهرت نفسها كقوة اجتماعية. وفي هذه الفترة التي اتسع فيها التنظيم النقابي والسياسي، اتجه العمال من حين لآخر بشكل جماهيري نحو اليسار. وتزامن مع الأعوام نفسها تجذر الأفكار الوطنية والتنويرية والثورية بين المثقفين والطلاب.\nألحقت رأسمالية تركيا، بانقلابي 12 آذار و12 أيلول العسكريين، ضرراً بالغاً باليسار وبالفكر التقدمي عموماً. وكانت طبقة رأس المال تظن، بهجوم فيزيائي وأيديولوجي شديد، أنها ستنهي اليسار في تركيا كلياً في الثمانينيات.\nلكن البرجوازية، رغم إلحاقها ضرراً بالغاً باليسار أيديولوجياً وفيزيائياً، لم تستطع القضاء على الحركة الشيوعية. والتقليد الحزبي المتجسد اليوم في الحزب الشيوعي التركي هو أوضح دليل على فشل مخطط رأس المال لإبادة اليسار. علاوة على ذلك، فإن انسداد سياسة النظام في تركيا رغم النجاح الذي حققه حزب العدالة والتنمية لصالح طبقة رأس المال، وعدم تبني الجماهير الواسعة للنظام الجديد الذي يُحاول بناؤه ودخولها في حالة بحث، والإمكانات التي ظهرت في هذا السياق لأن يصبح اليسار بديلاً مرة أخرى، كلها أمور تشهد على فشل البرجوازية.\nعلاوة على ذلك، لا يمكن تناول انسداد سياسة النظام في تركيا بمعزل عن الأزمة الجذرية المستمرة للإمبريالية على مستوى العالم. فالإمبريالية، بسبب العلاقات العميقة الممتدة على سنوات طويلة وبنيتها السياسية التي شُكلت من الألف إلى الياء ضد الشيوعية خلال الحرب الباردة، ظاهرة داخلية تصف طابع رأسمالية تركيا. وقد أعادت هذه الظاهرة إنتاج نفسها في ظروف مواتية في عهد حزب العدالة والتنمية على شكل ادعاءات تتعلق بالمنطقة برؤية إمبراطورية، ولم تتردد تركيا حزب العدالة والتنمية، وهي تحاول الترقي من كونها عنصراً باهتاً بلا شخصية للإمبريالية إلى أن تصبح عقل المراكز الإمبريالية وشريكها في المنطقة، في إغراق الداخل والخارج بالدماء وارتكاب جرائم لا حصر لها. وقد أدت الأزمة متعددة الأبعاد التي تعيشها الإمبريالية على الصعيد العالمي إلى إغلاق حقبة في علاقات تركيا حزب العدالة والتنمية بالإمبريالية. فقد انتهت الحقبة التي طبعها التوازي بين برنامج حزب العدالة والتنمية، كحزب إسلامي وسوقي ومتعاون، واحتياجات الولايات المتحدة الإقليمية، وانتهت العملية التي بدأت في السياسة الخارجية بدخول حزب العدالة والتنمية بشكل مؤثر اقتصادياً وسياسياً وأيديولوجياً إلى الجغرافيا العثمانية القديمة تماشياً مع برنامجه الخاص، واستمرت بادعاء تقديم إمكانات جديدة للولايات المتحدة التي تعيش انسداداً خطيراً في سياساتها في الجغرافيا الإسلامية، انتهت بإفلاس سياسة حزب العدالة والتنمية الإقليمية. وكلما تجاوزت مغامرات رأسمالية تركيا الحدود الموضوعية للبرجوازية التركية وبنيتها السياسية، تعمقت أزمة النظام، وستفتح الفراغات النظامية التي ستنشأ داخل النظام الطريق أمام الديناميات الثورية.\nكان لا مفر من أن تتسبب الأزمة العميقة التي يعيشها الشرق الأوسط في حركات سكانية كبرى. وتغيرت بنية الطبقة العاملة التركية بمشاركة الكادحين الذين اضطروا للهجرة إلى تركيا بسبب الظروف التي خلقتها الأزمة والحرب، لكن ضرورة أن يناضل العمال من مختلف الأصول القومية معاً ضد العدو المشترك، البرجوازية، لم تتغير أبداً.\nلم تستطع رأسمالية تركيا، طوال هذه الحقبة الرجعية أيضاً، رغم كل مساعيها، محو التراكم التنويري والوطني في بلادنا. إن نزول الملايين إلى الشارع خلال مقاومة حزيران دليل على أن الجماهير لم تفقد قدرتها على الحركة، وأن البشرية لا يمكن أن يستوعبها نظام رأس المال، وأن التراكم التقدمي له مقابل اجتماعي.\nلليسار في تركيا تاريخ طويل من النضال. هذا التاريخ، بنجاحاته وإخفاقاته، بانتصاراته وهزائمه، هو تاريخنا. إن الحزب الشيوعي التركي، الذي تأسس في 10 أيلول (سبتمبر) 1920، يتبنى مجمل الحركات الماركسية والثورية التي يمتد ماضيها في تركيا إلى بدايات القرن، ومجمل نضالات الطبقة العاملة.\nإن الحقبة الرجعية والمظلمة، التي شملت أيضاً انحلال الاشتراكية الواقعية، رغم أنها وجهت ضربات قاسية لليسار والكادحين والمثقفين في العالم أجمع وفي تركيا، لم تستطع إنهاء بحث الشعوب عن التنظيم، ولم تجفف الأمل، ولم تكسر عزيمة النضال. ومع ذلك، فإن التخريب الذي عاشه اليسار في هذه العملية لا يمكن الاستهانة به. فقد أثّر بعمق في يسار تركيا، بشكل خاص، الهجومُ الأيديولوجي العالمي للإمبريالية الذي تزامن مع ظلام ما بعد الانقلاب العسكري في 12 أيلول 1980 في تركيا، وانحلال الاتحاد السوفياتي، وتراجع التقليد الماركسي اللينيني عموماً. وعملية إعادة بناء الحزب الشيوعي التركي هي رد إحياء على هذه الحقبة.\nإن التقليد السياسي الذي يواصل اليوم طريقه باسم الحزب الشيوعي التركي، مستنداً إلى تراكم تنظيمي غير منقطع، أعاد بناء الحزب بالإرادة التي تجسدت في التسعينيات في حزب تركيا الاشتراكية وحزب السلطة الاشتراكية. وتحولت عملية إعادة البناء بعد عام 2001، التي بدأت باعتماد اسم TKP، إلى مرحلة نضج الحزب، واستُمر في هذا الإطار بإصرار في محاولات اللقاء بالجماهير.\nفي الفترة التي كانت الحركة الشيوعية تحاول فيها التحول إلى حركة مجتمعية، تعرضت تركيا لهجوم رجعي عنيف. فقد قامت الإمبريالية بجوارنا باحتلالات عسكرية مكشوفة، وخُصخصت في بلادنا كل المؤسسات العامة تقريباً، وأُدخلت الدولة بكل سلطاتها تحت الرقابة المباشرة لرأس المال، وحل قانون الجماعة محل قانون المواطنة وتُركت العلمانية، وانهارت جمهورية 1923 بشكل لا رجعة فيه، وبدأ بناء نظام جديد ورجعي في بلادنا، ودُفعت بلادنا إلى حافة حرب أهلية. وتراجع تنظيم الكادحين على كل المستويات وضاق كمياً تنظيم الطبقات الكادحة، وكاد المنظور الطبقي يختفي في المجال النقابي.\nأدى الهجوم الرجعي العنيف إلى ظهور نزعات ليبرالية وقومية داخل اليسار. وقد حاولت الانحرافات الليبرالية والقومية إضعاف مقاومة اليسار الذي كان يقاوم الهجوم الرجعي الكبير المدعوم من الإمبريالية في تركيا.\nإن التاريخ القريب لحزبنا هو، في هذه الظروف بالذات، تاريخ مقاومة الكوادر الماركسية والعمال الطليعيين والمثقفين الشرفاء والشباب الثوري ضد الهجوم الرجعي المدعوم من الإمبريالية. هذا التاريخ هو عملية إعادة تنظيم حزب شيوعي في كل الظروف.\nثمة حزب طليعي في تركيا قادر على حمل الثورة الاشتراكية إلى النصر.\nالحزب الشيوعي التركي هو القوة الطليعية والواعية والمنظمة للطبقة العاملة.\nيخوض الحزب الشيوعي التركي، بوصفه عنصراً فاعلاً ومحترماً في الحركة العمالية الدولية، نضالاً فعالاً أيضاً من أجل تخليص الصفوف الشيوعية من التوفيقية الطبقية.\nالمهمة الآن هي بناء حركة طبقة عاملة وضمان تحول حزب أكثر تنظيماً إلى حركة مجتمعية.\nإن الأزمة التي يعيشها النظام الرأسمالي الدولي في العالم، ورأسمالية تركيا في بلادنا، تدفع الجماهير الواسعة إلى البحث خارج النظام. فالبرجوازية، في العالم أجمع وفي بلادنا، لا تستطيع أن ترسم إطاراً أيديولوجياً سياسياً جديداً يقنع الجماهير، ولا تستطيع أن تقدم للناس مستقبلاً، ولا أن تُظهر أملاً ومخرجاً.\nفي هذه الظروف، من الممكن موضوعياً أن تظهر في تركيا حركات جماهيرية، وأن تتشكل على الأرضية نفسها حركة طبقية حضرية وتنويرية ومناضلة وثورية، بشكل أكثر إمكاناً بكثير مما كان عليه الأمر في الماضي القريب.\nإن الحزب الشيوعي التركي عازم على توظيف الإمكانات الموضوعية في بلادنا بمنظور ثوري عبر التحول إلى حركة مجتمعية.\nإما أن ينظم الحزب الشيوعي التركي هذه الاندفاعة التاريخية وتجد الاشتراكية دعماً مجتمعياً كبديل حقيقي، وإما أن تحكم القوى الرجعية المدعومة من الإمبريالية على بلادنا بظلام عميق.\nإن الحزب الشيوعي التركي يدعو العمال والمثقفين التقدميين والوطنيين وكل من هم من أنصار العلمانية والتنوير إلى نضال المساواة والحرية بهذا المنظور وهذا الوعي.\nالاشتراكية هي الخيار التحرري الحقيقي الوحيد أمام البشرية. الاشتراكية ضرورة لتحرر البشرية في العالم وتركيا اليوم.\nإن الحزب الشيوعي التركي يدعو كل كادحينا وشبابنا، بصرف النظر عن اللغة الأم التي يتحدثون بها، ودون تمييز على أساس الهوية الجندرية أو الميل الجنسي، إلى التحرك بموجب هذه الضرورة، وعدم الخضوع للهمجية، والانخراط في النضال المنظم من أجل تحررنا، والانضمام إلى حزبنا الذي هو عقل تركيا وضميرها وأملها.\nالاشتراكية ستُكسَب في تركيا بالنضال الحزبي.\nبرنامج الاشتراكية"},{"title":"I. التعريفات الأساسية والهدف — أ. طبيعة الحزب الشيوعي التركي وهويته","text":"1. الحزب الشيوعي التركي هو أداة النضال السياسي للطبقة العاملة، القوة الطليعية للثورة الاشتراكية."},{"title":"I. التعريفات الأساسية والهدف — أ. طبيعة الحزب الشيوعي التركي وهويته","text":"2. يتعامل الحزب الشيوعي التركي مع الطبقات الاجتماعية الأخرى وفقاً للمنظور التاريخي ومصالح الطبقة العاملة."},{"title":"I. التعريفات الأساسية والهدف — أ. طبيعة الحزب الشيوعي التركي وهويته","text":"3. الحزب الشيوعي التركي هو حزب الشيوعيين الذين يقبلون، أياً كان أصلهم الطبقي، أن هذا المنظور وهذه المصالح هي العنصر الحاسم في النضال السياسي."},{"title":"I. التعريفات الأساسية والهدف — أ. طبيعة الحزب الشيوعي التركي وهويته","text":"4. طبقتنا العاملة كل واحد يتألف من الأتراك والأكراد وسائر العناصر القومية والإثنية. يتخذ الحزب الشيوعي التركي هذه الوحدة أساساً، ويمثل الوحدة السياسية والتنظيمية للطبقة العاملة ضد كل أشكال التمييز."},{"title":"I. التعريفات الأساسية والهدف — أ. طبيعة الحزب الشيوعي التركي وهويته","text":"5. يتخذ الحزب الشيوعي التركي من الماركسية اللينينية ذات الطابع العالمي مرشداً له في كل أعماله، ويتحرك بوعي أن إعادة إنتاج هذه النظرية في تركيا، كما في كل بلد، ضرورة حتمية."},{"title":"I. التعريفات الأساسية والهدف — أ. طبيعة الحزب الشيوعي التركي وهويته","text":"6. الهدف الذي يشكل أساس وجود الحزب الشيوعي التركي هو خوض نضال السلطة الاشتراكية في تركيا وبناء الاشتراكية. والحزب الشيوعي التركي في الوقت نفسه جزء من الحركة الشيوعية العالمية."},{"title":"I. التعريفات الأساسية والهدف — أ. طبيعة الحزب الشيوعي التركي وهويته","text":"7. يمزج الحزب الشيوعي التركي التراكم التاريخي للحركة الثورية الدولية بالديناميات الخاصة بأرض تركيا، ويناضل ضد المقاربات النمطية والدوغمائية والقومية التي تتجاهل هذا التوليف في نضال الاشتراكية."},{"title":"I. التعريفات الأساسية والهدف — ب. هدف الحزب الشيوعي التركي","text":"1. هدف الحزب الشيوعي التركي هو الثورة الاشتراكية وبناء الاشتراكية."},{"title":"I. التعريفات الأساسية والهدف — ب. هدف الحزب الشيوعي التركي","text":"2. أ. نقطة انطلاق عملية بناء الاشتراكية هي ثورة سياسية. والقوة الطليعية لهذه الثورة السياسية، سياسياً وأيديولوجياً، هي الطبقة العاملة.\nب. إن السلطة الاشتراكية، التي هي نقطة انطلاق البناء الاشتراكي، ستنشأ نتيجة لهذه الثورة السياسية.\nج. ستكون السلطة الاشتراكية ثمرة النضالات الجماهيرية للطبقة العاملة والقوى الاجتماعية الواقعة في مجال تأثيرها السياسي.\nد. الهدف النهائي للسلطة الاشتراكية هو خلق عالم بلا طبقات ولا استغلال، جنباً إلى جنب مع المجتمعات الاشتراكية الأخرى."},{"title":"I. التعريفات الأساسية والهدف — ب. هدف الحزب الشيوعي التركي","text":"3. برنامج الحزب الشيوعي التركي هو برنامج حقبة الثورة التي ستتحقق بقيادة الطبقة العاملة. وفي حقبة النضال في ظل ظروف الرأسمالية، تشير كل الانفتاحات السياسية للحزب إلى اتجاه منظور السلطة الاشتراكية الذي هو الشرط الحتمي لتحقيق هذا البرنامج. إن المهمة الأساسية لهذه الحقبة هي تسييس الطبقة العاملة وتثقيفها ضمن نضال منظم وجعلها مركز سلطة. يدعم الحزب الشيوعي التركي وينظم النضال الذي يخوضه العمال والكادحون من أجل مطالبهم الاقتصادية والاجتماعية، بربطه بنضال السلطة الاشتراكية وبإظهار أن هذه المطالب لا يمكن تلبيتها إلا جزئياً أو لا يمكن تلبيتها إطلاقاً في ظل ظروف الرأسمالية.\nانطلاقاً من هذه المهمة، يقوم الحزب الشيوعي التركي، قبل الثورة الاشتراكية، بما يلي:\nأولاً. يسعى لصد كل الهجمات السياسية والأيديولوجية للبرجوازية؛\nثانياً. يقف في وجه المهام التي تقع أو ستقع على عاتق تركيا داخل النظام الرأسمالي العالمي؛\nثالثاً. يعمل على تنمية الوعي الوطني لدى جماهير العمال والكادحين ضد الهجمات الاقتصادية والسياسية والثقافية للإمبريالية؛\nرابعاً. يقود تعزيز التنوير الطبقي العمالي من أجل تراجع الرجعية الدينية سياسياً وأيديولوجياً؛\nخامساً. يروّج لأخوة الشعوب لمنع تجذر الأيديولوجيات القومية والفاشية داخل الطبقة العاملة؛\nسادساً. يراعي مصالح ديناميات الثورة العالمية؛\nسابعاً. يبذل جهداً لتثقيف الطبقة العاملة بوعي أممي؛\nثامناً. يقود زيادة الحساسية المجتمعية تجاه كل التناقضات والمشكلات الناتجة عن الاستغلال الرأسمالي، وتوجيه ردود الفعل نحو قناة النضال؛\nتاسعاً. يطور أدوات أيديولوجية وسياسية لفضح الرأسمالية بكل أبعادها؛\nعاشراً. يقود تحقيق الانسجام والوحدة والتنسيق بين القوى المناصرة للاشتراكية؛\nحادي عشر. يناضل ضد كل أنواع الاضطهاد القومي ويحرص على إرساء هذا النضال على أسس طبقية وعلى خلق شراكة بين الديناميات القومية والطبقية؛\nثاني عشر. يسخّر إمكاناته من أجل إزالة العوائق القانونية أمام نضال الاشتراكية، وتعطيل كل الممارسات المعادية للديمقراطية، وإبطال مفعول كل تشريع يقيد تنظيم الطبقات الكادحة."},{"title":"II. برنامج السلطة الاشتراكية — أ. البنية السياسية","text":"1. تُنظَّم السلطة كديمقراطية اشتراكية."},{"title":"II. برنامج السلطة الاشتراكية — أ. البنية السياسية","text":"2. أ) الديمقراطية الاشتراكية ممكنة بانتشار السلطة في كل نسيج الحياة الاجتماعية، وفي مقدمتها عملية الإنتاج. في الديمقراطية الاشتراكية، تكون الطبقة العاملة في موقع الحكم عبر تنظيماتها المجتمعية. تمتد أجهزة السلطة من المصانع والورش والمكاتب والمزارع والمدارس والثكنات إلى الأعلى.\nب) يشجع الحزب الشيوعي التركي ويكفل خلق أجهزة سلطة محلية تُشرك كل قطاعات المجتمع في الحكم، وتطوير كفاءة هذه الأجهزة."},{"title":"II. برنامج السلطة الاشتراكية — أ. البنية السياسية","text":"3. أ) كل التنظيمات التي تشكل مستويات الإدارة من الأسفل إلى الأعلى، تحدد إدارتها بانتخابات حرة.\nللناخبين حق «استدعاء» ممثليهم المنتخبين في كل الأجهزة قبل انتهاء فترة مهامهم.\nيُنظَّم استخدام هذا الحق ويُكفل بالقوانين.\nب) لكل مواطن بلغ السادسة عشرة حق الانتخاب والترشح لكل مستويات الإدارة.\nج) في السلطة الاشتراكية، الجهاز الأعلى في التشريع وتشكيل الحكومة ومراقبة التنفيذ هو المجلس.\nد) يعمل المجلس بارتباط مع أجهزة السلطة المحلية ويشكل معها كلاً واحداً.\nه) للتنظيمات المحلية الحق والمسؤولية في عزل المسؤولين المنتخبين أو المعينين من مجالات مسؤوليتها عند الحاجة.\nو) التنظيمات المحلية التي تُقام في كل وحدات المجتمع ومجالات النشاط الاجتماعي هي أجهزة اتخاذ قرار وتنفيذ ضمن وحداتها ومجالاتها في إطار القوانين. تتيح التنظيمات المحلية للفرد إمكانية التدخل في الحياة الاجتماعية بدءاً من أصغر وحدة يعيش فيها، وتوفر البيئة المناسبة للتطور الشامل للإنسان الاشتراكي، وتكفل وجود الجماهير في علاقة تواصل وتفاعل ورقابة مستمرة مع آليات اتخاذ القرار والتنفيذ السياسية والقانونية (كل أجهزة الدولة والمجلس).\nز) يتخذ الحزب الشيوعي التركي تدابير خاصة كي لا ينقطع الممثلون المنتخبون في المجلس والمستويات الإدارية الأخرى عن فروع الإنتاج أو الخدمة التي ينتمون إليها. ويأخذ دوماً في الحسبان أن الديمقراطية الاشتراكية لن تكون ممكنة إلا بجعل الروابط بين الإنتاج وآليات اتخاذ القرار مباشرة."},{"title":"II. برنامج السلطة الاشتراكية — أ. البنية السياسية","text":"4. أ) تُتخذ تدابير لمنع انفصال آليات الإدارة والمسؤولين فيها عن الطبقة العاملة واغترابهم عن مصالح المجتمع.\nب) تُقام آليات تواصل خاضعة للرقابة المجتمعية تضمن اطلاع الأشخاص ذوي المسؤولية الإدارية في تنظيم الدولة بانتظام على احتياجات ومشكلات كل التنظيمات المجتمعية.\nج) ستكون الإمكانات التي تُوفَّر للمسؤولين كي يؤدوا مهامهم بشفافية يمكن متابعتها ومراقبتها مجتمعياً. ولا بد أن تكون هذه الإمكانات بعيدة عن الطابع الشخصي، وأن تحافظ دائماً على يقظة وعي العمل الجماعي لدى المسؤولين."},{"title":"II. برنامج السلطة الاشتراكية — أ. البنية السياسية","text":"5. الأتراك والأكراد عنصران مؤسسان متساويان لتركيا الاشتراكية. تُتخذ التدابير من أجل التصفية الكاملة للممارسات والمقاربات التمييزية والشوفينية التي كانت السمة الغالبة لتركيا الرأسمالية."},{"title":"II. برنامج السلطة الاشتراكية — أ. البنية السياسية","text":"6. يطور الحزب الشيوعي التركي، مراعياً هدف شمول الدولة لكل مواطن، وهو ما تقتضيه الديمقراطية الاشتراكية، سياسات تضمن أن يكون جهاز الدولة فعالاً ومنتجاً؛ ويدافع الحزب عن أن التمييز بين الدولة والمجتمع سيُلغى بهذا الشكل. ومع الأخذ في الحسبان أن الدولة ستضمحل في نهاية المطاف، وفي هذا الاتجاه، ومع زوال الأرضية التي تقوم عليها الطبقات والأيديولوجيات المستغِلة، ستُصفّى الوظائف القمعية للدولة."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"1. حريات التعبير والدعاية والتنظيم لا غنى عنها لبناء المجتمع الاشتراكي وتطوره."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"2. الأفكار التي تدافع بشكل صريح أو ضمني عن استغلال الإنسان للإنسان، والمحرضة على الحرب، والمستغِلة للدين، والعنصرية والفاشية، لا يمكنها الاستفادة من حريتي الدعاية والتنظيم لأنها تشكل عائقاً أمام التطور الحر للمجتمع."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"3. يُحظَر الاتجار بالبشر والدعارة والقمار وتجارة المخدرات لأنها تشكل عائقاً أمام تطور المجتمع الاشتراكي وتؤدي إلى الانحلال الأخلاقي والاغتراب."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"4. لا يمكن بأي شكل من الأشكال أن يكون الأصل القومي أو الإثني سبباً للامتياز أو الإقصاء أو الاضطهاد."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"5. تُتاح الإمكانات لصون اللغات والثقافات الحية وتطويرها."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"6. تُتخذ تدابير اقتصادية وسياسية وأيديولوجية وثقافية لمنع أن يؤدي الاختلاف الجندري إلى التمييز."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"7. تُلغى بنى العشائر كلياً، ويُبذَل جهد لمحو آثارها في المجالين الثقافي والأيديولوجي محواً تاماً."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"8. من أجل تطبيق الحريات الأساسية في الحياة، توضع إمكانات التواصل المكتوب والمرئي وعقد الاجتماعات وتنظيم المظاهرات في خدمة كل التنظيمات المجتمعية."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"9. تُكفَل حرية التنقل، وحرمة المسكن، وسرية الاتصالات."},{"title":"II. برنامج السلطة الاشتراكية — ب. الحريات الأساسية","text":"10. أ) يُشكَّل جهاز العدالة بدءاً من أصغر وحدة محلية بمشاركة أجهزة السلطة المجتمعية.\nيتولى المهام في المحاكم مواطنون تحددهم هذه الأجهزة وكذلك قضاة مهنيون. تُكفَل سيادة القانون.\nب) بما أن جزءاً مهماً من الجرائم ذو منشأ اجتماعي، تتضمن قوانين العقوبات والتنفيذ سياسات تهدف إلى منح الفرد الوعي والقدرات اللازمة لأخذ مكانه في المجتمع الاشتراكي، دون إغفال ضرورة حماية المجتمع من الجريمة.\nج) تحمي الدولة حق الدفاع منذ لحظة بدء الاتهام.\nد) تُنظَّم أجهزة الأمن الداخلي بما يتوافق مع مثل الاشتراكية العليا وبشكل مفتوح لرقابة الشعب الكادح.\nه) لا يجوز ممارسة أي ضغط جسدي أو معنوي على الأشخاص المحتجزين أو المسجونين. لا يجوز تعذيب أي شخص تحت أي ظرف أو حال.\nو) لا يمكن بأي حال من الأحوال إصدار حكم بالإعدام."},{"title":"ج. البنية الاقتصادية","text":"1. يتّبع الحزب الشيوعي التركي سياسة اقتصادية تهدف، ضمن برنامج محدد، إلى الإلغاء الكامل للملكية الخاصة لوسائل الإنتاج، التي هي المصدر الأساسي لعدم المساواة في المجتمع."},{"title":"ج. البنية الاقتصادية","text":"2. أ) كل وسائل الإنتاج، بما فيها الأرض، والموارد الطبيعية والثروات الجوفية، ملكية عامة.\nب) خلال عملية تصفية الأشكال الأخرى للملكية غير المملوكة للعامة في وسائل الإنتاج، تُتخذ التدابير اللازمة لضمان استمرارية الإنتاج ولجعل المبادرة السياسية والأيديولوجية للكادحين القوة الأساسية لهذه التصفية.\nج) خلال المرحلة الانتقالية التي ستتعايش فيها أشكال الملكية المختلفة، تُمنح العناصر الاشتراكية في الاقتصاد وضعاً متميزاً وتُحمى في مواجهة العناصر الأخرى، عبر القوانين والسياسات اليومية للسلطة السياسية."},{"title":"ج. البنية الاقتصادية","text":"3. الهدف الأساسي للاقتصاد الاشتراكي هو أن يعيش المجتمع بأسره في رفاهية، وأن تتحسن ظروف معيشة المواطنين يوماً بعد يوم."},{"title":"ج. البنية الاقتصادية","text":"4. تُفتَح كل الأنشطة الاقتصادية للرقابة المجتمعية، وتُتخذ تدابير إدارية وأيديولوجية واقتصادية وقانونية فعالة ضد ظواهر مثل تبديد الموارد المجتمعية والرشوة وإساءة استخدام السلطة والتسيب والكسل."},{"title":"ج. البنية الاقتصادية","text":"5. تُؤمَّم البنوك وشركات التأمين وسائر المؤسسات المالية، وتُصفَّى منها ما هو غير ضروري لتطور الاقتصاد الاشتراكي."},{"title":"ج. البنية الاقتصادية","text":"6. تُدار التجارة الخارجية عن طريق الدولة فقط."},{"title":"ج. البنية الاقتصادية","text":"7. أ) التطور الاقتصادي عملية قابلة للتخطيط في ظل سلطة الطبقة العاملة. والعنصر الذي سيضمن، خلال عملية تصفية التناقضات الطبقية، الانسجام المتناغم بين كل عناصر الاقتصاد وتحقق الإنتاج لصالح المجتمع، هو التخطيط المركزي.\nب) يتحقق التخطيط في الحياة بدءاً من القاعدة، مع تطور مبادرة الكادحين وديمقراطية آليات اتخاذ القرار في عملية الإنتاج."},{"title":"ج. البنية الاقتصادية","text":"8. يولي التخطيط الاشتراكي الأولوية لاستخدام التراكم العلمي والتكنولوجي لصالح المجتمع وتطويره."},{"title":"ج. البنية الاقتصادية","text":"9. أ) في التصنيع والتنمية، تُنظَّم اندفاعة تستند إلى الموارد التي تملكها تركيا بمستوى كافٍ (المعادن، الأرض، الطاقة، القوى العاملة المؤهلة)، ويوضع حد لتبعية اقتصاد البلاد للخارج.\nب) لا يعني بقاء الاقتصاد الاشتراكي معتمداً على قوته الذاتية انغلاقه على نفسه. فاستقلال الاقتصاد يتحقق بطابعه الطبقي وبخروجه من كونه جزءاً من العالم الإمبريالي. تُنظَّم العلاقات الاقتصادية الخارجية، التي تراعي الاستقلال والمصالح الطبقية في البلاد، بشكل يخدم تطور الاقتصاد الاشتراكي.\nج) تُعتبر باطلة وتُفسَخ من طرف واحد كل الاتفاقيات المبرمة مع البلدان الإمبريالية التي أدخلت كادحي بلادنا تحت عبء ديون هائل وجعلت البلاد تابعة.\nد) يُبذَل جهد لتحقيق عملية اندماج اقتصادي دائمة ومنسجمة ومتوافقة مع روح الأممية مع البلدان الاشتراكية الأخرى."},{"title":"ج. البنية الاقتصادية","text":"10. كل الثروة المنتجة في البنية الاقتصادية الاشتراكية تعود إلى الكادحين كأجور، بعد اقتطاع المقدار اللازم للاحتياجات الجماعية للمجتمع. وسيستمر مبدأ «من كل حسب قدرته، ولكل حسب عمله» سارياً في المراحل الأولى من الطريق نحو المجتمع اللاطبقي في تحديد الأجور. ومع ذلك، ستُطوَّر سياسات تراعي أن يبرز تدريجياً مبدأ «لكل حسب حاجته»، وهو الهدف الحقيقي."},{"title":"ج. البنية الاقتصادية","text":"11. تقليص ساعات العمل من أهم أدوات خلق الإنسان الجديد ومن الأهداف الأساسية للمجتمع الاشتراكي."},{"title":"ج. البنية الاقتصادية","text":"12. تقليل استخدام العمل الجسدي إلى الحد الأدنى، وتحريك الإمكانات الذهنية الإنتاجية لكل البشر، هدف أساسي آخر للمجتمع الاشتراكي. باستخدام تقنيات متقدمة في الإنتاج الزراعي والصناعي، تُنقَل الأعمال التي تُنجَز في ظروف لا تليق بالإنسان، على وجه الأولوية، إلى الآلات."},{"title":"ج. البنية الاقتصادية","text":"13. تُكفَل في الاقتصاد الاشتراكي ضمانة العمل وحق العمل لكل المواطنين القادرين على العمل والبالغين سناً مناسبة. ولا يمكن للدولة أن تُلغي هذين الحقين الأساسيين تحت أي ظرف."},{"title":"ج. البنية الاقتصادية","text":"14. من هم في وضع عدم القدرة على العمل، والمسنون والمتقاعدون، تحت ضمان الدولة الاشتراكية. تُكفَل لهؤلاء المواطنين مستوى معيشة إنساني وإمكانات متساوية."},{"title":"ج. البنية الاقتصادية","text":"15. النقابات إحدى أدوات مشاركة الطبقة العاملة في الحكم وترسيخ أسس الاشتراكية وحمايتها خلال عملية البناء الاشتراكي.\nأ) يُكفَل حق التنظيم النقابي والإضراب بالقوانين بشكل يشمل كل الكادحين.\nب) للنقابات وأجهزة السلطة في أماكن العمل صلاحية تحسين ظروف العمل، وتوسيع إمكانات الراحة والثقافة والرياضة للعمال."},{"title":"ج. البنية الاقتصادية","text":"16. أ) يُخاض نضال سياسي وأيديولوجي لتجميع كادحي الزراعة كفلاحين أحرار في مزارع جماعية، وكبروليتاريين زراعيين في منشآت الدولة. تُشجَّع المزارع الجماعية على إيجاد أشكال منسجمة مع الملكية العامة وغير متناقضة معها.\nب) بينما يُراعى انسجام الأشكال الجماعية المختلفة في الإنتاج الزراعي، يُبذَل جهد للتوجه نحو أشكال أكثر تطوراً.\nج) يُناضَل ضد كل دينامية تغذي أيديولوجيا الملكية الخاصة للأرض.\nد) يوضع حد للتبعية الخارجية في الإنتاج الزراعي."},{"title":"ج. البنية الاقتصادية","text":"17. يحرص الحزب الشيوعي التركي على أن تكون السياسات الاقتصادية منسجمة مع هدف تقليص الفوارق بين المدن والأرياف."},{"title":"ج. البنية الاقتصادية","text":"18. تُتخذ تدابير ضد كل أشكال الاغتراب التي تنشأ في عملية الإنتاج، وخاصة اغتراب العامل عن الآلة واغتراب العامل عن المنتج."},{"title":"ج. البنية الاقتصادية — د. السياسة الخارجية والدفاع","text":"1. يُخرَج من كل التنظيمات العسكرية والاقتصادية والمالية والثقافية والسياسية للإمبريالية. وتُعتبَر باطلة كل الاتفاقيات والالتزامات المخالفة لمصالح البلاد الناشئة عن العلاقات والروابط السابقة مع هذه التنظيمات."},{"title":"ج. البنية الاقتصادية — د. السياسة الخارجية والدفاع","text":"2. يُشارَك في كل المنظمات الدولية التي تضمن المشاركة المتساوية، وتحمي المصالح المتبادلة، وتخدم السلام. ويُبذَل جهد فعال لتخدم هذه المنظمات أهداف تحسين العلاقات الدولية، وتضييق مجال حركة البلدان الإمبريالية، ومناهضة الرجعية الدولية."},{"title":"ج. البنية الاقتصادية — د. السياسة الخارجية والدفاع","text":"3. يُذهَب إلى التضامن مع كل السلطات الاشتراكية والثورية. وتُبدى مواقف مبادِرة وداعمة من أجل تشكيل وتعزيز التحالفات الإقليمية/الدولية التي تُضعف قوة الإمبريالية ونفوذها."},{"title":"ج. البنية الاقتصادية — د. السياسة الخارجية والدفاع","text":"4. أ) تُتخذ التدابير اللازمة لتطور الوعي الأممي في المجتمع واستمراريته.\nب) يُطوَّر التضامن مع الحركات الثورية والشيوعية في البلدان الرأسمالية.\nج) الأشخاص الذين اضطروا لمغادرة بلدانهم بسبب آرائهم الشيوعية أو الاشتراكية أو المعادية للإمبريالية أو المعادية للفاشية أو المناهضة للحرب، هم تحت ضمان مجتمعنا الاشتراكي وقوانينه."},{"title":"ج. البنية الاقتصادية — د. السياسة الخارجية والدفاع","text":"5. أ) العنصر الأساسي لدفاع البلاد هو القوات المسلحة.\nب) القوات المسلحة في خدمة المجتمع الاشتراكي. يُمنَع اغتراب القوات المسلحة عن المجتمع. تتولى القوات المسلحة في أوقات السلم مهاماً في عملية الإنتاج.\nج) الخدمة العسكرية إلزامية لكل المواطنين، نساءً ورجالاً. تُحدَّد مدة الخدمة العسكرية وفقاً لحالة العلاقات الدولية.\nد) تتكيف القوات المسلحة، بتنظيم يواكب مقتضيات العصر، مع التطورات التكنولوجية. تُتخذ كل التدابير للحفاظ على قوة دفاع البلاد. يُطوَّر الطابع الوطني لصناعة السلاح ويُصان بدقة.\nه) الجهاز الوحيد الذي يقرر إعلان حالة الحرب هو المجلس.\nو) في مواجهة عدوان إمبريالي، تُحرَّك كل إمكانات البلاد السياسية والتنظيمية والاقتصادية والبشرية، وتتحول الحرب، بمشاركة الشعب كله، إلى حرب ثورية ووطنية.\nز) تُرسَّخ داخل القوات المسلحة معايير ديمقراطية في العلاقات بين الرتب، ويُضمَن النظام الهرمي بمساعدة عمليات التربية الثقافية والأيديولوجية. يُربَّى الأفراد الدائمون في القوات المسلحة ليس فقط في المجال العسكري، بل كأفراد يحتاجهم المجتمع الاشتراكي.\nح) لأفراد القوات المسلحة كل الحقوق السياسية والاجتماعية الممنوحة لسائر المواطنين، بما فيها حق الانتخاب والترشح.\nط) يُصان الطابع الأممي للقوات المسلحة ويُعزَّز.\nي) تُلبَّى احتياجات الأمن الداخلي عبر ميليشيات شعبية تُنشأ ضمن القوات المسلحة."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"1. خلق الإنسان الجديد هو في آن معاً مؤشر على بناء الاشتراكية، ونتيجة له، وأداة له. الإنسان الجديد كل واحد بوجوده الأيديولوجي والثقافي والجسدي. والمجتمع والدولة مسؤولان عن التطور المنسجم والصحي لهذا الكل."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"2. يتعامل الحزب الشيوعي التركي مع مجالات مثل التعليم والإعلام الجماهيري والحياة السياسية والثقافية والصحة والأنشطة الرياضية، لا كل على حدة، بل ككل واحد، من أجل أن يتمكن الأفراد من التعبير عن أنفسهم مجتمعياً، وأن يترعرعوا كأشخاص يملكون وعياً جماعياً ويؤمنون بمساواة وأخوة البشر وكل الأمم."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"3. يُقام نظام ضمان اجتماعي يشمل كل المواطنين ويغطي كل الاحتياجات الإنسانية."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"4. أ) يُعاد تنظيم التعليم كخدمة عامة تُقدَّم مجاناً في كل مراحله، لصالح المجتمع. تُؤمَّم كل مؤسسات التعليم الخاص.\nب) يتحول التعليم إلى نشاط ذي مضمون علمي يُظهر قدرات الإنسان وطاقته الإبداعية ويطورها.\nج) التعليم باللغة الأم مكفول من الدولة الاشتراكية. من بين أهداف النظام التعليمي أن تتعرف شعوب البلاد والمنطقة عن كثب على لغات وثقافات بعضها بعضاً.\nد) تُحدَّد سياسة تعليم اللغات الأجنبية بما يخدم هدف الاستفادة القصوى من التراكم الثقافي والعلمي للبشرية وتعزيز الأخوة بين الشعوب.\nه) يُكفَل لكل شخص إمكانية التعلم في المجال الذي يريده، مع مراعاة احتياجات المجتمع أيضاً.\nو) في سياسات التعليم، لكل عناصر المؤسسات التعليمية رأي. يشارك المعلمون والطلاب وأولياء الأمور وعمال الخدمات في المؤسسات التعليمية، عبر تنظيمات منفصلة ومشتركة، في صياغة سياسات التعليم.\nز) انطلاقاً من أن الإنسان الجديد هو أيضاً «إنسان مناضل» في مسيرته نحو المجتمع اللاطبقي، يساعد التعليم علمياً وأخلاقياً النضالَ من أجل عالم بلا طبقات ولا استغلال.\nح) يُحظَر عمل/تشغيل الأطفال والشباب دون سن الثامنة عشرة في أعمال لا تشكل جزءاً من عمليتهم التعليمية.\nط) من أهم مهام المجتمع الاشتراكي ألا يبقى مواطن واحد أمياً. كما تُوفَّر كل الإمكانات لتطوير معارف الناس ومهاراتهم دون أي تحديد للسن."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"5. تُؤمَّم كل المستشفيات والمؤسسات الصحية الخاصة. كل الخدمات الصحية، بما فيها نفقات الأدوية والعلاج، مجانية وتتحملها الدولة. يُناضَل من أجل إزالة كل عامل يضر بصحة الإنسان، وتُعمَّم ممارسات الطب الوقائي والخدمة الصحية المتدرجة."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"6. للناس الحق في العيش في أماكن يعيدون فيها إنتاج أنفسهم معنوياً وجسدياً. تماشياً مع هذا الحق، يُوفَّر لكل شخص سكن يناسب احتياجاته. تُتخذ كل التدابير اللازمة لضمان أن تكون المساكن متينة بما يكفي لعدم التأثر بالزلازل والفيضانات وسائر الكوارث الطبيعية. يُوفَّر التدفئة والكهرباء والماء في المساكن مجاناً."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"7. تُحدَّد أسعار السلع والخدمات المتاحة لاستخدام المجتمع مع مراعاة أهداف تسريع التطور الفكري للمجتمع، وتغيير عادات الاستهلاك بما يساعد نضال خلق الإنسان الجديد."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"8. من الأجزاء المهمة لنضال خلق الإنسان الجديد إزالة الفوارق والتناقضات التي نشأت عبر التاريخ بين المرأة والرجل من حيث النشاط الاجتماعي وتكافؤ الفرص والأدوار الاجتماعية.\nأ) يناضل الحزب الشيوعي التركي من أجل أن تتحول حقوق المرأة المكفولة بالقوانين إلى مكسب حقيقي ودائم في كل مجالات الحياة، ويقف في وجه إسناد الجنسانية أدواراً أيديولوجية مهينة للمرأة، وضد كل أشكال التمييز ضد المرأة.\nب) يُخاض النضال اللازم لتصفية تقسيم العمل القائم على أساس الاختلاف الجندري، وهو سبب اعتماد المرأة على أعمال المنزل ورعاية الأطفال، بكل أبعاده المجتمعية والأيديولوجية. تُنقَل الأعباء التي تنوء بها المرأة في المجتمع الرأسمالي، كالطبخ والتنظيف ورعاية الأطفال، إلى المجتمع بأسره عبر تسخير الإمكانات الجماعية. وفي هذا الاتجاه، تُعمَّم دور الحضانة والمطاعم الجماعية والمغاسل بوصفها جزءاً مهماً من التحضر المخطط.\nج) تُخلَق كل الإمكانات التنظيمية لمشاركة المرأة الفعالة في الحياة السياسية والثقافية.\nد) يناضل الحزب الشيوعي التركي من أجل تحرير الأسرة من الوظائف الاقتصادية والأيديولوجية التي تحملتها في ظل الرأسمالية، وتحولها إلى روابط طوعية قائمة على الحب."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"9. رعاية الأطفال وتغذيتهم ونموهم كأفراد أصحاء وتعليمهم، تحت ضمان الدولة الاشتراكية."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"10. يُشجَّع الشباب على المشاركة، بدءاً من أبكر سن ممكنة، في كل الحياة الاجتماعية وعمليات اتخاذ القرار السياسي والإنتاج الثقافي والفني والعلمي. تُوفَّر لهم الإمكانات ليكون لهم حقوق ومسؤوليات متساوية مع سائر المواطنين في المؤسسات التعليمية أو الرياضية التي ينتمون إليها وفي محيطهم المحلي. سيُطلق المجتمع الاشتراكي العنانَ للطاقة الإبداعية للشباب التي يقمعها المجتمع الرأسمالي، وسيحرر الشباب في كل مجال."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"11. تُخلَق كل الظروف المادية والمعنوية اللازمة كي يعيش المسنون، الذين أبعدتهم الرأسمالية عن كل نشاط اجتماعي وتركتهم بلا أهل وبلا سند، كمواطنين متساوين ومُعتنى بهم ومُشجَّعين على المشاركة في الحياة العامة في المجتمع الجديد."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"12. تُخلَق الظروف اللازمة لمشاركة ذوي الإعاقة في عمليات التعليم والإنتاج والحياة الاجتماعية."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"13. الفن أحد المجالات المهمة التي تساهم في تحقيق الإنسان الجديد لذاته بحرية.\nأ) يقود الحزب الشيوعي التركي المبادرات التي تهدف إلى تحرر الإبداع الفني.\nب) من أهداف الحزب الشيوعي التركي الأساسية أن يتحول الفن إلى مجتمعي في بيئة حرة، وأن يتنظم عمال الفن، وأن تُزال كل العوائق التي تمنع وصول الفن إلى الناس. وفي هذا الاتجاه؛\nأولاً. يُراعى أن يستخدم عمال الفن الإمكانات المجتمعية المخصصة لهم بشكل منظم وجماعي.\nثانياً. من الأساسي ألا تكون الدولة عائقاً بل داعماً لتطور أشكال وتقنيات إبداعية جديدة ومختلفة في الإنتاج الفني.\nثالثاً. تُزال كل أشكال الرقابة على الأعمال الفنية.\nرابعاً. يُمنَع تحول الفن إلى سلعة.\nخامساً. يُعمَل على أن يتوقف الإنتاج الفني عن كونه اهتمام أقلية، وأن يصبح نشاطاً مجتمعياً واسعاً.\nسادساً. يخوض الحزب الشيوعي التركي نضالاً أيديولوجياً كي لا تقع الأعمال الفنية في تناقض مع احتياجات المجتمع الاشتراكي والإنسان الجديد.\nج) يُصان الإرث الثقافي والتاريخي ويُفتَح أمام وصول كل الشعب إليه."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"14. العلم والنشاط العلمي من العناوين الأساسية في ترسيخ المجتمع الاشتراكي وخلق الإنسان الجديد. فمع انتهاء الظروف التي يمكن فيها تطوير العلم والتكنولوجيا فقط بقدر ما تخدم زيادة الاستغلال أو تسمح بزيادته، وتسليعهما، واغترابهما عن الجماهير الواسعة، سيصبح من الممكن أن يُدار النشاط العلمي وفقاً للمصالح الشاملة للمجتمع. وستُكفَل مشاركة العلماء بشكل منظم في تحديد الموارد المخصصة للأبحاث العلمية وفي قرارات توزيعها. والمكاسب والمنتجات الناتجة عن الأعمال التي يقوم بها العلماء هي ملك مشترك للبشرية جمعاء."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"15. أ) سيحل محل الرياضة التي جرى تسليعها وتحويلها إلى نشاط احترافي في المجتمع الرأسمالي، تنظيم مجتمعي تُتاح فيه إمكانات ممارسة الرياضة لكل الناس من كل الأعمار والأجناس والمهن والمناطق.\nب) يُستهدَف أن تقوم الرياضة على أساس الصحة والترفيه والتضامن، لا المنافسة المدمرة والمعادية، وأن تطور ذلك.\nج) بدلاً من حصر الرياضة في أماكن خاصة، تُعمَّم على أماكن العمل والمدارس وكل الوحدات السكنية. يُشجَّع خروج الجماهير الواسعة من موقع المتفرج السلبي."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"16. أ) لكل شخص حرية المعتقد. لا يمكن لأي مؤسسة أن تمارس ضغطاً معنوياً على الناس.\nب) يُمنَع تسييس الدين. لا يرد ذكر المعتقدات الدينية للناس في أي وثيقة رسمية.\nج) يُتناوَل الدين في المؤسسات التعليمية كموضوع بحث في العلوم الاجتماعية.\nد) الحزب الشيوعي التركي طليعة النضالات السياسية والأيديولوجية التي ستُخاض لإحلال المكتسبات العلمية للبشرية محل كل ضروب الإيمان الميتافيزيقي."},{"title":"ج. البنية الاقتصادية — هـ. خلق الإنسان الجديد","text":"17. أ) تُصان القيم البيئية والثقافية من قبل الدولة بعد تخليصها من كونها سلعاً تجارية، وتُفتَح لاستخدام المجتمع بأسره. تُطبَّق عقوبات مشددة ضد تخريب السواحل والغابات والثروات الطبيعية والتاريخية.\nب) في سياسات وتطبيقات التصنيع والتحضر الاشتراكي، تُراعى على سبيل الأولوية حماية البيئة وصحة الإنسان. تُكفَل مشاركة المجتمع بأسره والمجتمعات المعنية بشكل منظم في تحديد السياسة البيئية والتطبيقات الملموسة.\nج) تُتخذ التدابير من أجل إزالة أوجه عدم المساواة الناشئة عن التفوق النسبي للمدن على الأرياف من النواحي الاقتصادية والاجتماعية والثقافية.\nد) يُفعَّل النقل الجماعي في المدن ويتحول إلى خدمة عامة مجانية. في النقل داخل المدن وبينها، يُقلَّص الثقل الذي اكتسبته الطرق البرية في المجتمع الرأسمالي، وتُعمَّم أشكال نقل أكثر أماناً وكفاءة.\nه) من مسؤولية الدولة الاشتراكية تخصيص الموارد اللازمة لمنع الآثار المدمرة للكوارث الطبيعية، وإجراء الدراسات العلمية في هذا الاتجاه. وهذه الدراسات مفتوحة لعلم الشعب ومشاركته ورقابته."}]</script>

<script>
(function(){
  "use strict";

  var CHUNKS = {
    tr: JSON.parse(document.getElementById('data-tr').textContent),
    en: JSON.parse(document.getElementById('data-en').textContent),
    ar: JSON.parse(document.getElementById('data-ar').textContent)
  };

  var STOPWORDS = {
    tr: ['ve','bir','bu','da','de','ile','için','gibi','ya','ki','o','çok','en','her',
      'ancak','ama','veya','ise','olan','olarak','olur','oldu','değil','mi','mu','mü','mı',
      'ben','sen','biz','siz','onlar','ne','nasıl','neden','niçin','kim','hangi',
      'bütün','tüm','daha','kendi','şey','şu','tarafından','içinde','üzere','doğru','göre','karşı'],
    en: ['the','a','an','of','to','in','on','and','or','is','are','was','were','be','been','being',
      'this','that','these','those','for','with','as','by','at','from','it','its','their','they',
      'not','but','which','who','what','how','why','will','shall','can','could','should','would'],
    ar: ['من','في','على','إلى','عن','مع','هذا','هذه','ذلك','التي','الذي','و','أو','لا','ما','كل',
      'أن','إن','كان','يكون','هو','هي','هم','بين','بعد','قبل','عند','كما','قد','لم','لن']
  };

  var STRINGS = {
    tr: {
      dir: 'ltr', htmlLang: 'tr',
      heroTitle: 'TKP Programı Chatbot',
      heroDesc: 'Türkiye Komünist Partisi\'nin programı üzerinde soru sorabileceğin bir arama motoru. Sorunla en alakalı madde/bölümü, programın kendi metninden birebir alıntılayarak gösterir. <strong>Sağ alttaki 💬 butonuna tıklayarak sohbeti başlatabilirsin.</strong>',
      disclaimer: '<strong>Nasıl çalışır:</strong> Bu chatbot hiçbir LLM\'e veya dış servise istek atmaz. Kaynak metin sayfaya gömülüdür ve arama tamamen tarayıcında, TF-IDF + kosinüs benzerliği ile çalışan bir JavaScript algoritmasıyla yapılır. Bu bir yapay zeka değil, bir anahtar kelime eşleştiricisidir — cevaplar üretilmez, yalnızca programın en alakalı orijinal pasajı bulunup gösterilir.',
      footnote: 'Kaynak: <a href="https://www.tkp.org.tr/temel-metinler/program-2/" target="_blank" rel="noopener noreferrer">TKP Programı</a>',
      panelTitle: 'TKP Programı Chatbot',
      placeholder: 'Örn: kadın hakları, dış politika, eğitim...',
      send: 'Sor',
      greeting: 'Merhaba! TKP\'nin programı hakkında bir konu ya da anahtar kelime yaz, sana programın ilgili maddesini göstereyim. Örneğin: "kadın", "eğitim", "dış politika".',
      notFound: 'Bu konuyla ilgili programda doğrudan bir madde bulamadım. Farklı kelimelerle ya da daha genel bir terimle tekrar sorabilir misin?',
      otherResults: 'İlgili diğer maddeler:',
      similarity: 'Benzerlik',
      suggestions: ['Kadın hakları', 'Dış politika', 'Eğitim sistemi', 'Ekonomik yapı', 'Kürt sorunu', 'Sanat ve kültür']
    },
    en: {
      dir: 'ltr', htmlLang: 'en',
      heroTitle: 'TKP Program Chatbot',
      heroDesc: 'A search tool over the program of the Communist Party of Turkey (TKP). It quotes the most relevant article or section directly from the program\'s own text. <strong>Click the 💬 button in the bottom-right corner to start chatting.</strong>',
      disclaimer: '<strong>How it works:</strong> This chatbot never calls any LLM or external service. The source text is embedded in the page, and search runs entirely in your browser via a JavaScript TF-IDF + cosine-similarity algorithm. This is not AI — it is a keyword matcher: no answers are generated, only the most relevant original passage from the program is found and shown.',
      footnote: 'Source: <a href="https://www.tkp.org.tr/temel-metinler/program-2/" target="_blank" rel="noopener noreferrer">TKP Program</a>',
      panelTitle: 'TKP Program Chatbot',
      placeholder: 'e.g. women\'s rights, foreign policy, education...',
      send: 'Ask',
      greeting: 'Hello! Type a topic or keyword about TKP\'s program and I\'ll show you the relevant article. For example: "women", "education", "foreign policy".',
      notFound: 'I couldn\'t find a direct match in the program for this topic. Could you try different or more general keywords?',
      otherResults: 'Other related articles:',
      similarity: 'Similarity',
      suggestions: ['Women\'s rights', 'Foreign policy', 'Education system', 'Economic structure', 'Kurdish question', 'Art and culture']
    },
    ar: {
      dir: 'rtl', htmlLang: 'ar',
      heroTitle: 'روبوت محادثة برنامج الحزب الشيوعي التركي',
      heroDesc: 'أداة بحث في برنامج الحزب الشيوعي التركي (TKP). يقتبس المادة أو القسم الأكثر صلة مباشرة من نص البرنامج نفسه. <strong>انقر على زر 💬 في الأسفل لبدء المحادثة.</strong>',
      disclaimer: '<strong>كيف يعمل:</strong> لا يرسل هذا الروبوت أي طلب إلى نموذج لغوي كبير أو أي خدمة خارجية. النص المصدر مضمّن في الصفحة، والبحث يعمل بالكامل داخل متصفحك عبر خوارزمية جافاسكريبت تعتمد على TF-IDF وتشابه جيب التمام. هذا ليس ذكاءً اصطناعياً بل مطابقة كلمات مفتاحية — لا تُنشأ أي إجابات، بل يتم فقط إيجاد وعرض المقطع الأصلي الأكثر صلة من البرنامج.',
      footnote: 'المصدر: <a href="https://www.tkp.org.tr/temel-metinler/program-2/" target="_blank" rel="noopener noreferrer">برنامج الحزب الشيوعي التركي</a>',
      panelTitle: 'روبوت محادثة البرنامج',
      placeholder: 'مثال: حقوق المرأة، السياسة الخارجية، التعليم...',
      send: 'اسأل',
      greeting: 'مرحباً! اكتب موضوعاً أو كلمة مفتاحية حول برنامج الحزب الشيوعي التركي وسأعرض لك المادة ذات الصلة. مثال: "المرأة"، "التعليم"، "السياسة الخارجية".',
      notFound: 'لم أجد مادة مطابقة مباشرة في البرنامج حول هذا الموضوع. هل يمكنك المحاولة بكلمات مختلفة أو أكثر عمومية؟',
      otherResults: 'مواد أخرى ذات صلة:',
      similarity: 'نسبة التطابق',
      suggestions: ['حقوق المرأة', 'السياسة الخارجية', 'نظام التعليم', 'البنية الاقتصادية', 'المسألة الكردية', 'الفن والثقافة']
    }
  };

  function normalize(str){
    return str.toLowerCase('tr').replace(/i̇/g, 'i')
      .replace(/[^\p{L}\p{N}\s]/gu, ' ')
      .replace(/\s+/g, ' ').trim();
  }

  function makeTokenizer(lang){
    var stop = {};
    STOPWORDS[lang].forEach(function(w){ stop[w] = true; });
    return function(str){
      return normalize(str).split(' ').filter(function(t){ return t.length > 2 && !stop[t]; });
    };
  }

  var models = {};
  function buildModel(lang){
    var tokenize = makeTokenizer(lang);
    var chunks = CHUNKS[lang];
    var docs = chunks.map(function(c){ return tokenize(c.title + ' ' + c.text); });
    var N = docs.length;
    var df = {};
    docs.forEach(function(tokens){
      var seen = {};
      tokens.forEach(function(t){ if (!seen[t]){ seen[t]=true; df[t]=(df[t]||0)+1; } });
    });
    var idf = {};
    Object.keys(df).forEach(function(t){ idf[t] = Math.log((N+1)/(df[t]+1)) + 1; });

    function tfVector(tokens){
      var tf = {};
      tokens.forEach(function(t){ tf[t]=(tf[t]||0)+1; });
      var vec = {};
      Object.keys(tf).forEach(function(t){ vec[t] = (tf[t]/tokens.length) * (idf[t] || Math.log(N+1)); });
      return vec;
    }
    var docVectors = docs.map(tfVector);
    var docNorms = docVectors.map(function(v){
      var s=0; Object.keys(v).forEach(function(k){ s += v[k]*v[k]; }); return Math.sqrt(s) || 1e-9;
    });

    return { tokenize: tokenize, tfVector: tfVector, docVectors: docVectors, docNorms: docNorms, chunks: chunks };
  }

  ['tr','en','ar'].forEach(function(lang){ models[lang] = buildModel(lang); });

  function cosineSim(qVec, qNorm, dVec, dNorm){
    var dot=0; var keys=Object.keys(qVec);
    for (var i=0;i<keys.length;i++){ var k=keys[i]; if (dVec[k]) dot += qVec[k]*dVec[k]; }
    return dot/(qNorm*dNorm);
  }

  function search(lang, query, topK){
    var model = models[lang];
    var qTokens = model.tokenize(query);
    if (qTokens.length === 0) return [];
    var qVec = model.tfVector(qTokens);
    var qNorm=0; Object.keys(qVec).forEach(function(k){ qNorm += qVec[k]*qVec[k]; });
    qNorm = Math.sqrt(qNorm) || 1e-9;
    var scored = model.docVectors.map(function(dVec,i){ return { idx:i, score: cosineSim(qVec,qNorm,dVec,model.docNorms[i]) }; });
    scored.sort(function(a,b){ return b.score-a.score; });
    return scored.slice(0, topK).filter(function(s){ return s.score>0; });
  }

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; });
  }

  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('queryInput');
  var sendBtn = document.getElementById('sendBtn');
  var suggestionsEl = document.getElementById('suggestions');
  var fabBtn = document.getElementById('fabBtn');
  var chatPanel = document.getElementById('chatPanel');
  var panelClose = document.getElementById('panelClose');
  var themeToggle = document.getElementById('themeToggle');
  var langSwitch = document.getElementById('langSwitch');

  var state = { lang: 'tr', greeted: false };

  function addMessage(role, html){
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = html;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function respond(query){
    var S = STRINGS[state.lang];
    var chunks = CHUNKS[state.lang];
    var results = search(state.lang, query, 3);
    if (results.length === 0){
      addMessage('bot', S.notFound);
      return;
    }
    var best = results[0];
    var chunk = chunks[best.idx];
    var html = '<span class="src-title">' + escapeHtml(chunk.title) + '</span>' + escapeHtml(chunk.text);
    html += '<span class="score">' + S.similarity + ': %' + Math.round(best.score * 100) + '</span>';
    addMessage('bot', html);
    if (results.length > 1){
      var others = results.slice(1).map(function(r){
        var c = chunks[r.idx];
        return '<span class="src-title">' + escapeHtml(c.title) + '</span>' + escapeHtml(c.text.slice(0, 220)) + (c.text.length > 220 ? '…' : '');
      }).join('<br><br>');
      addMessage('bot', S.otherResults + '<br><br>' + others);
    }
  }

  function handleSend(){
    var q = inputEl.value.trim();
    if (!q) return;
    addMessage('user', escapeHtml(q));
    inputEl.value = '';
    setTimeout(function(){ respond(q); }, 150);
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', function(e){ if (e.key === 'Enter') handleSend(); });

  function renderSuggestions(){
    suggestionsEl.innerHTML = '';
    STRINGS[state.lang].suggestions.forEach(function(s){
      var chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = s;
      chip.addEventListener('click', function(){ inputEl.value = s; handleSend(); });
      suggestionsEl.appendChild(chip);
    });
  }

  function applyLanguage(lang){
    state.lang = lang;
    state.greeted = false;
    var S = STRINGS[lang];
    document.documentElement.setAttribute('lang', S.htmlLang);
    document.body.setAttribute('dir', S.dir);
    document.getElementById('heroTitle').textContent = S.heroTitle;
    document.getElementById('heroDesc').innerHTML = S.heroDesc;
    document.getElementById('disclaimerText').innerHTML = S.disclaimer;
    document.getElementById('footnoteText').innerHTML = S.footnote;
    document.getElementById('panelTitle').textContent = S.panelTitle;
    inputEl.placeholder = S.placeholder;
    sendBtn.textContent = S.send;
    messagesEl.innerHTML = '';
    renderSuggestions();
    langSwitch.querySelectorAll('.lang-btn').forEach(function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });
    if (chatPanel.classList.contains('open')){
      state.greeted = true;
      addMessage('bot', S.greeting);
    }
  }

  langSwitch.addEventListener('click', function(e){
    var btn = e.target.closest('.lang-btn');
    if (!btn) return;
    applyLanguage(btn.getAttribute('data-lang'));
  });

  themeToggle.addEventListener('click', function(){
    var root = document.documentElement;
    var cur = root.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    themeToggle.textContent = next === 'dark' ? '🌙' : '☀️';
  });

  function openPanel(){
    chatPanel.classList.add('open');
    if (!state.greeted){
      state.greeted = true;
      addMessage('bot', STRINGS[state.lang].greeting);
    }
    inputEl.focus();
  }
  function closePanel(){ chatPanel.classList.remove('open'); }

  fabBtn.addEventListener('click', function(){
    chatPanel.classList.contains('open') ? closePanel() : openPanel();
  });
  panelClose.addEventListener('click', closePanel);

  applyLanguage('tr');
})();
</script>

</body>
</html>
