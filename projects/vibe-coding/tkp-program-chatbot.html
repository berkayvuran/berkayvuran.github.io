s, the economic, ideological and political offensive was accompanied by direct physical intervention. Military coups and fascist dictatorships supported or planned by imperialism caused leftists and progressives in these countries to be subjected to unprecedented violence. Working-class movements were suppressed and pushed back by force.\nIn this period, religious reaction, systematically fed and cultivated during the Cold War, was also sent directly to the front in many geographies as an effective weapon against socialism.\nThe international working-class movement, above all the Communist Party of the Soviet Union, and other progressive and revolutionary dynamics, failed to display the ideological and political creativity and boldness needed to withstand this great offensive, and remained on the defensive and retreated. This retreat, combined with great errors, deficiencies and betrayals, led to the dissolution of the socialist system at the end of the '80s.\nWith this dissolution, imperialism, which now faced almost no obstacle before it, moved into every sphere vacated by socialism. Under these conditions, the world capitalist system, claiming that the end of history had arrived, set out to clean up whatever remained of socialism and to erase socialism from history.\nEverything connected with or reminiscent of socialism was rejected. In a world left over from socialism, imperialism grew even more aggressive. Under the name of \"globalization\" the imperialist system spread rapidly; countries that had moved in a relatively independent sphere due to the existence of the socialist pole were integrated into the system, and the ways in which backward countries were tied to the system were restructured; while a handful of collaborators were enriched in the true sense of the word, very broad sections of society were pushed into poverty. In this process imperialism did not refrain from war and the use of force, raining bombs on many countries and sending soldiers. That concepts such as democracy and freedom were used as justifications legitimizing this violence was itself a sign of the ideological defeat of the world left.\nMillions who concluded that they could not escape the mire of poverty in their own countries, or who were displaced by war, were forced to migrate to developed countries to work in what amounted to a condition of slavery. International capital offered millions of working people no choice other than to be exploited, or to leave their homeland, in the countries it transformed out of a need for cheap labor. Capitalism did not hesitate to graft onto the system the relations of production that preceded it, in order to earn more, and to impose more backward forms of life on humanity.\nWith socialism withdrawn from the stage, the United States (US), which had sat in the leadership seat of the imperialist system since the end of the Second World War, imposed, without hesitating to use force, the order it designed to sustain its leadership on every geography, above all the Middle East. It took very little time for it to become clear that the claim that the possibility of a hot war had diminished after the dissolution of the Soviet Union was a great lie. In the period from the dissolution of socialism to today, the world has not passed a single day without conflict, without bloodshed. The US, using its unrivaled military power, tried to bind the other developed capitalist countries to this order operating under its own hegemony.\nAgain within this same framework, the integration into this new order was secured of underdeveloped countries and of countries that had carved out a sphere of action for themselves by taking advantage of the balance between the two systems under the conditions in which socialism existed. Claiming that the end of nation-state structures had arrived, the room for maneuver of national governments was restricted and the chains of dependency were strengthened.\nOn the ideological front of this whole political and military operation, liberalism, in both its right-wing and left-wing versions, played the leading role. The left-wing version of liberalism successfully carried out the task of whitewashing imperialism in the eyes of the working class and of the social strata to which the left addressed itself throughout the world.\nOf course the process would not proceed so smoothly; the wheel of history would not always turn backward.\nDespite all the steps it took and the positions it won in order to escape its own crisis, the international capitalist system could not overcome its structural crisis and continued to accumulate problems. The US and its allies, wishing to fill all the vacuums that emerged in the world left over from socialism by strengthening their own hegemony, encountered points of resistance with varying sources in different countries and geographies, and could not overcome them.\nThe Russian Federation, which passed through a process of capitalist restoration after the counter-revolution, became, despite its economic weaknesses, a crisis dynamic in its own right and a part of the imperialist rivalry, owing to the historical legacy it rested upon and its broad military, political and ideological capacities. When Russia's rise within the imperialist system was accompanied by the People's Republic of China's advance, backing its great economic power with political and military moves, the crisis of imperialism deepened along multiple dimensions. As both countries acted as disruptive elements within the world capitalist system, the economic and political crises experienced in the imperialist centers developed together, mutually affecting and reinforcing one another. In the same process, the results of the presidential election held under crisis conditions in the US, the leading country of imperialism, carried the crisis to an unprecedented depth within the country's own borders, while the heavy wounds suffered by the European Union dealt severe blows to Europe's imperialist centers.\nAs the system reached a breaking point, and imperialist plans in different geographies became unworkable and failed, the limits of imperialism's power were revealed to humanity. The crisis and the dead-end of capitalism became impossible to conceal in the eyes of the whole world.\nUnder these crisis conditions imperialism is trying to do what it knows best, and is intensifying its offensive against the working class worldwide. Once again trying to overcome the crisis produced by its own internal dynamics by making working people pay the bill, the system is moving to raise rates of exploitation and continuing to destroy the productive forces.\nThe imperialist rivalry and struggle for domination is intensifying in order to resolve the resource and market problems that the crisis has made acute. The possibility that the developed capitalist countries at the center of the system, now including the Russian Federation and the People's Republic of China as well, will carry their rivalry into a destructive war among themselves grows greater by the day. As the contradictions deepen, the material foundations for today's regional conflicts to turn into large-scale wars grow stronger.\nWhile capitalism experiences a crisis throughout the whole world, under conditions determined by imperialism, the countries lower in the hierarchy are affected more by this struggle, and the suffering of the working people of these countries as a result of the crisis is correspondingly greater.\nThe rivalry growing within imperialism, the sharpening contradictions and the growing possibility of hot conflict create favorable conditions for the strengthening of counter-revolutionary currents, ideologically and politically, and the bourgeoisie makes a special effort to clear the way for such currents. As religious reaction, every kind of nationalism, militarism and fascism rise throughout the world, regimes are becoming more authoritarian and repressive.\nUnder these crisis conditions, class struggles continue in every corner of the world; the left, though not yet to the extent desired, is able to hold on to certain positions, such as Cuba's insistence on socialism. The tradition of resistance against imperialism and against all the reactionary ideologies produced by capitalism is reviving in many countries.\nThe crisis that capitalism has entered as a whole is opening gaps in the bourgeoisie's ideological hegemony; imperialism cannot market its liberal theses, and the rising reactionary ideologies cannot encompass humanity as a whole.\nCapitalism cannot offer humanity a vision of the future; it cannot give hope to the broad masses struggling with poverty, hunger and war, while all the lies the bourgeoisie has used for decades are going, one by one, to the dustbin of history. It has been a long time since it became clear that the fables of globalization and integration meant nothing other than imperialism binding other countries and nations to the system. Moreover, capitalism's relationship with reaction, fascism, militarism and authoritarian, repressive regimes is becoming concretely visible. As the capitalist class's ideological fortresses collapse, its inability to produce a new, systematic, comprehensive and persuasive alternative is opening up a great vacuum in its hegemony.\nUnder these conditions it is inevitable that the broad sections subjected to exploitation will search for alternatives outside the system.\nThe one and only alternative capable of answering this search throughout the world is socialism. Just as at the beginning of the previous century, socialism is the only ideological current capable of offering humanity hope for the future, capable of proposing a new order through which people can free themselves from this barbarism.\nIn this sense socialism has never aged, has never lost its validity; it has remained new, and today, under conditions in which capitalism is tumbling into crisis in every sphere, it has once again seized the potential to be, in the eyes of the masses, a real alternative way out.\nWhat has happened has shown how right the communists were in what they said about this order and about escaping from this order."},{"title":"INTRODUCTION","text":"The 20th century was not lived in vain, and humanity in general, and the working class in particular, was equipped with the lessons drawn from the 20th century. It was seen that capitalism, even at its best, is a kind of barbarism, and a unique experience was accumulated, one that sheds light on the future, drawn both from the practice of really existing socialism and from the historical struggle waged by the international working-class movement throughout the world.\nThe deep crisis in which the world capitalist system finds itself offers, without exception, enormous opportunities to the working-class movement in every geography. By making use of these opportunities it is possible to leave this reactionary period behind us and to overcome it in every respect.\nNow is exactly the time for communism to return once more, in the eyes of the working class and the broad masses of working people, to the place it deserves as a program of liberation.\nThis return will be the product of the struggle that communist parties will wage throughout the world.\nThe Communist Party of Turkey faces precisely this task in our country.\nSocialist revolution is on the agenda in Turkey"},{"title":"INTRODUCTION","text":"The adventure of Westernization and progress that the Ottoman State undertook alongside a belated capitalization in the 19th century came to an end with the colonization operation it subsequently and concretely confronted. In order to reopen the book of Westernization and progress, it would be necessary to thwart the plan of colonization. The repulsion of this plan through the war of liberation waged against imperialism made possible, in a conjuncture determined by the Great October Revolution of 1917 and with the support of the revolutionary power of the first socialist country, the most important forward leap of the Turkish bourgeois revolution: the founding of the Republic of Turkey. However, the existence of the Republic of Turkey, which came into being under quite special conditions, was always contested from the standpoint of imperialism. This tense relationship entered into with the imperialist centers left its mark on the history of the 1923 Republic.\nThe history of the Republic is the product of the historical reflexes of the founding class. Turkey's young bourgeoisie, which consolidated its power through the revolutionary leap of 1923, avoided organizing secularism as a move toward social enlightenment, and was mortally afraid of the progressive currents that a social enlightenment might set free. Consistent with this, Turkey's rulers, who behaved timidly in dismantling religious reaction, would not, when the time came, hesitate to use religious reaction, in line with imperialism's orientations throughout the world, against the rising left and revolutionary movements, through the agency of the state.\nTurkish capitalism, which showed its repressive face toward the working class from the very outset without a moment's hesitation, likewise never wavered in making its authoritarian tendencies a tradition.\nWhile a capitalist transformation was taking place in Turkey, Turkey's capitalist class did not touch Kurdish feudalism, and preferred to form an alliance with the Kurdish ruling strata. The order of capital, while wholly denying Kurdish existence, historically pursued a discriminatory line against Kurdish poor and working people, and, while looking after the class interests of the Kurdish ruling strata, did not hesitate to strip all Kurds outside this small minority of their most basic human rights. As a result of the Kurdish policy it pursued, the capitalist class divided the Turkish working class. The Turkish bourgeoisie brought the country to the brink of a civil war through the nationalism it pumped up to set Kurdish and Turkish working people against one another.\nThe migration of Armenians and Greeks, and the tragedy created by the accompanying process of nation-building, are also an inseparable part of the capitalist transformation in Turkey. This process, which also involved the transfer of capital from the non-Muslim bourgeoisie to the new Turkish bourgeoisie, is a concrete example of capitalism turning peoples into enemies of one another.\nThe 1923 Republic, which during the Cold War accepted the role of forward outpost of the anti-communist front built against the Soviet Union, and defined itself in these terms within the framework of the division of labor in the world capitalist system, was in fact also accelerating the process that would prepare its own end.\nWith the dissolution of socialism, the 1923 Republic would be reassessed by the imperialist capitalist system and by the Turkish bourgeoisie; following this reassessment, it would be demanded of Turkey that it become fully dependent on imperialism, that all obstacles to the economic system being determined by market dynamics be removed, and that religious reaction be permanently embedded within political and social life.\nThis radical transformation meant the end of the 1923 Republic. As Turkey's capitalist class took up the role assigned to it within the division of labor inside the international capitalist system, it gave its assent not merely to a task but to an economic, social and political process that would prepare the end of the republic. This process prepared Turkey for the collapse of the republic. The left, the sole force capable of resisting this transformation, was also suppressed and placed under pressure, first by the coup of March 12, but chiefly by the coup of September 12. As all the progressive gains of the republic in Turkey were removed one by one, the left, the only consistent force capable of defending these gains, was attacked. The republic was condemned to death by crippling the left.\nTurkey abandoned independence and secularism entirely, even as mere claims, even as appearances, and the 1923 Republic came to an irreversible end during the rule of the AKP, which was established precisely to carry out the finishing moves of the counter-revolutionary process. From this point on, a movement acting with reference to 1923 has no chance of success in Turkey. Just as an understanding of secularism that harks back to the past no longer has any purchase in Turkey, it is likewise no longer possible to build an independent country by the old criteria.\nThe solution to Turkey's economic, social and political problems cannot be sought in any option outside socialism. Concretely, socialism is the precondition for embedding secularism in Turkish society and living it as a process of enlightenment, for economic, political, military and cultural independence, for the resolution of the problems of Kurdish working people, for the liberation of women, and for the formation of a political structure founded on the participation and oversight of the working people.\nIn this context, neither the struggle for enlightenment nor the struggle against imperialism can rest on strategies produced within the system, nor can they be placed within a reformist framework based on compromise and cooperation between classes. The only class capable of carrying forward both struggles, which must be waged with revolutionary content, is the working class.\nUnder the conditions determined by the end of the 1923 Republic, the Turkish working class must act with the goal of a socialist republic, and in this direction must wage an enlightenment-oriented, patriotic and anti-imperialist struggle.\nOnly this republic, to be established following the victory of the socialist revolution, can resolve Turkey's accumulated problems. There is no way to improve the living conditions of the poor masses in Turkey, to meet their most basic needs such as education, health and housing humanely and equally, other than through a socialist social order to be established by seizing, on behalf of the working class, ownership of the means of production. As the equal founding elements of the socialist republic, working people of all nations—Turkish, Kurdish—can develop a common will only in the struggle they will wage for this new republic, and the preconditions for a fraternal union can likewise take shape only within this struggle. It is not possible for the bourgeoisie to make peace with secularism in this geography; therefore the struggle for enlightenment cannot be waged without taking a stand against the bourgeoisie. Cleansing religious reaction—which over a long, drawn-out process managed to infiltrate every point of political and social life in Turkey and finally declared its victory under AKP rule—from every point it has infiltrated is possible only through socialism's uncompromising commitment to enlightenment and the understanding of secularism connected with it.\nSocialist revolution is on the agenda in Turkey.\nThe fact that capitalism in Turkey has reached a level of development sufficient to determine all social relations and structures, that the majority of the principal problems experienced can be connected to capitalism, and the material existence of the Turkish working class, are the objective foundations of the Turkish socialist revolution. The Turkish revolution will bear a socialist character. As the leading force of this revolution, the Turkish working class forms a single whole together with working people of different national and ethnic origins, and this wholeness must be observed when the working class organizes.\nSocialism will be won through party-based struggle\nThe Turkish working class, leaving aside earlier partial breakthroughs, essentially entered the political stage in the 1960s, began from that date to weigh heavily on the class struggle, and showed itself as a social force. In this period, in which trade-union and political organization expanded, workers turned to the left en masse from time to time. It was in these same years that patriotic, enlightenment-minded and revolutionary ideas took root among intellectuals and students.\nTurkish capitalism, through the military coups of March 12 and September 12, did enormous damage to the left and to progressive thought in general. Through heavy physical and ideological assault, the capitalist class thought in the 1980s that it would finish off the left in Turkey completely.\nBut although the bourgeoisie inflicted great damage on the left, both ideologically and physically, it could not eliminate the communist movement. The party tradition embodied today in the Communist Party of Turkey is the clearest proof that capital's plan to annihilate the left failed. Moreover, the fact that, despite the success the AKP achieved for the capitalist class, order politics in Turkey has become blocked, that broad masses have not embraced the new regime being built and are in a state of searching, and that in this context opportunities have arisen for the left to become an alternative once again—all this attests to the bourgeoisie's failure.\nMoreover, the blockage of order politics in Turkey cannot be considered independently of the deep-rooted crisis of imperialism proceeding worldwide. Owing to relations deepened over long years and to a political structure built from top to bottom against communism during the Cold War period, imperialism is an intrinsic phenomenon that describes the character of Turkish capitalism. This phenomenon reproduced itself, under the favorable conditions of AKP rule, in the form of claims regarding the region made with an imperial vision; AKP's Turkey, in trying to be promoted from an inconspicuous, characterless element of imperialism to becoming the mind and partner of the imperialist centers in the region, did not hesitate to drench both inside and outside in blood, and to commit countless crimes. The multidimensional global crisis experienced by imperialism brought about the closing of one chapter in the relations between AKP-ruled Turkey and imperialism. As an Islamist, market-oriented and collaborationist party, the AKP saw the period marked by the parallel between its own program and the regional needs of the US come to a close; and the process, which began with AKP making an economically, politically and ideologically effective entry into the old Ottoman geography in line with its own program in foreign policy, and continued with the claim of providing new opportunities to a US experiencing serious blockage in its policies in the Islamic geography, came to an end with the bankruptcy of AKP's regional policy. As the adventures of Turkish capitalism strain the objective limits of the Turkish bourgeoisie and its political structure, the crisis of the system will deepen, and the systemic vacuums that will form within the order will open the way for revolutionary dynamics.\nIt was inevitable that the deep crisis experienced in the Middle East would cause large population movements. The structure of the Turkish working class changed with the participation of working people forced to migrate to Turkey under the conditions created by the crisis and the war, but the need for workers of different national origins to struggle together against their common enemy, the bourgeoisie, never changed.\nThroughout this period of reaction as well, Turkish capitalism, despite all its efforts, could not destroy the enlightenment-oriented and patriotic accumulation in our country. The pouring of millions into the streets during the June Resistance is a sign that the masses have not lost their capacity for action, that humanity cannot be contained by the order of capital, and that the progressive accumulation has a real social counterpart.\nThe left's struggle in Turkey has a long history. This history, with its successes and failures, its victories and defeats, is our history. The Communist Party of Turkey, founded on September 10, 1920, owns the whole of the Marxist and revolutionary movements and the working-class struggles reaching back to the beginning of the century in Turkey.\nAlthough the reactionary and dark period, which also encompassed the dissolution of really existing socialism, dealt heavy blows to the left, to working people and to intellectuals throughout the world and in Turkey, the search of peoples for organization could not be finished off, hope could not be dried up, and the will to struggle could not be broken. Nevertheless, the damage the left suffered in this process should not be underestimated either. In particular, imperialism's worldwide ideological offensive, which coincided with the darkness that followed the September 12, 1980 military coup in Turkey, together with the dissolution of the Soviet Union and the general retreat of the Marxist-Leninist tradition, deeply affected the Turkish left. The process of rebuilding the Communist Party of Turkey is a response of revival to this period.\nThe political tradition that continues on its way today under the name of the Communist Party of Turkey rebuilt the party by relying on an uninterrupted organizational accumulation, with the will that showed itself in the Socialist Party of Turkey and the Socialist Power Party in the 1990s. The process of reconstruction that began after 2001 with the adoption of the name TKP turned into a phase of the party's maturation, and within this framework efforts to meet with the masses were pursued with persistence.\nDuring the period in which the communist movement was trying to become a social force, Turkey was subjected to a heavy reactionary assault. Imperialism engaged in open military occupations right next to us; in our country almost all public enterprises were privatized, the state with all its powers was placed under the direct control of capital, the law of citizenship was replaced by the law of religious community, secularism was abandoned, the 1923 Republic was destroyed in an irreversible manner, the construction of a new and reactionary regime in our country began, and our country was brought to the brink of civil war. The organization of working people was pushed back on every level, and the organization of the working classes narrowed quantitatively; in the trade-union sphere the class perspective almost disappeared.\nThe violent reactionary assault led to the appearance of liberal and nationalist tendencies within the left. Liberal and nationalist deviations tried to weaken the resistance of the left, which was resisting the great imperialism-backed reactionary assault in Turkey.\nThe recent history of our party is, precisely under these conditions, the resistance of Marxist cadres, leading workers, honorable intellectuals and revolutionary youth against the imperialism-backed reactionary assault. This history is the process by which a communist party reorganizes itself under every condition.\nThere is a vanguard party in Turkey that will carry the socialist revolution to victory.\nThe Communist Party of Turkey is the vanguard, conscious and organized force of the working class.\nThe Communist Party of Turkey, as an active and respected element of the international working-class movement, is also waging an effective struggle to purge the communist ranks of class conciliationism.\nThe task now is to build a working-class movement and to ensure that a more organized party becomes a social force.\nThe crisis experienced by the international capitalist system in the world, and by Turkish capitalism in our country, is pushing broad masses toward a search outside the existing order. The bourgeoisie, both worldwide and in our country, cannot draw up a new ideological-political framework capable of persuading the masses, cannot offer people a future, cannot show them hope or a way out.\nUnder these conditions it is objectively far more possible than in the recent past for mass movements to emerge in Turkey, and for an urban, enlightenment-minded, militant, revolutionary class movement to take shape on the same ground.\nThe Communist Party of Turkey is resolved to evaluate the objective opportunities in our country by becoming a social force with a revolutionary perspective.\nEither the Communist Party of Turkey will organize this historic move and socialism will find social support as a real alternative, or imperialism-backed reactionary forces will condemn our country to a deep darkness.\nThe Communist Party of Turkey calls on workers, progressive intellectuals, patriots, and everyone who stands for secularism and enlightenment to join the struggle for equality and freedom with this perspective and this consciousness.\nSocialism is the only real path of liberation before humanity. Socialism is a necessity for the liberation of humanity in today's world and in Turkey.\nThe Communist Party of Turkey calls on all our working people and our youth, regardless of which mother tongue they speak, regardless of gender identity or sexual orientation, to act in line with this necessity, not to bow down to barbarism, to join the organized struggle for our liberation, and to join our party, which is the mind, the conscience and the hope of Turkey.\nSocialism will be won in Turkey through party-based struggle.\nProgram of Socialism"},{"title":"I. Basic definitions and aim — A. The nature and identity of the TKP","text":"1. The TKP is the instrument of political struggle of the working class, the leading force of the socialist revolution."},{"title":"I. Basic definitions and aim — A. The nature and identity of the TKP","text":"2. The TKP approaches other social classes in line with the historical perspective and interests of the working class."},{"title":"I. Basic definitions and aim — A. The nature and identity of the TKP","text":"3. The TKP is the party of communists, whatever their class background, who accept that this perspective and these interests are the determining element of political struggle."},{"title":"I. Basic definitions and aim — A. The nature and identity of the TKP","text":"4. Our working class is a whole composed of Turks, Kurds and other national and ethnic elements. The TKP takes this wholeness as its basis and represents the political and organizational unity of the working class against every kind of discrimination."},{"title":"I. Basic definitions and aim — A. The nature and identity of the TKP","text":"5. While the TKP takes Marxism-Leninism, which has a universal character, as its guide in all its work, it acts with the awareness that, as in every country, this teaching must also be reproduced anew in Turkey, and that this is a necessity."},{"title":"I. Basic definitions and aim — A. The nature and identity of the TKP","text":"6. The purpose underlying the existence of the TKP is to wage the struggle for socialist power in Turkey and to build socialism. The TKP is at the same time a part of the world communist movement."},{"title":"I. Basic definitions and aim — A. The nature and identity of the TKP","text":"7. The TKP blends the historical accumulation of the international revolutionary movement with the specific dynamics of Turkish soil, and struggles against formulaic, dogmatic and nationalist approaches that ignore this synthesis in the struggle for socialism."},{"title":"I. Basic definitions and aim — B. The aim of the TKP","text":"1. The aim of the TKP is socialist revolution and the building of socialism."},{"title":"I. Basic definitions and aim — B. The aim of the TKP","text":"2. a. The starting point of the process of building socialism is a political revolution. The leading force of this political revolution, politically and ideologically, is the working class.\nb. Socialist power, the starting point for socialist construction, will emerge as the result of this political revolution.\nc. Socialist power will be the work of the mass struggles of the working class and of the social forces within its political sphere of influence.\nd. The ultimate goal of socialist power is, together with other socialist societies, the creation of a classless and exploitation-free world."},{"title":"I. Basic definitions and aim — B. The aim of the TKP","text":"3. The TKP program is the program of the period of revolution to be carried out under the leadership of the working class. In the period of struggle under the conditions of capitalism, all the political initiatives of the party point in the direction of the perspective of socialist power, which is the necessary condition for putting this program into practice. The fundamental task of this period is to politicize, educate and turn the working class, within organized struggle, into a focus of power. The TKP supports and organizes the struggle waged by the working class and working people for their economic and social rights and demands by linking it to the struggle for socialist power, and in a manner that reveals that under the conditions of capitalism these demands can be met only partially, or not at all.\nProceeding from this task, before the socialist revolution the TKP:\ni. tries to repel every kind of political and ideological assault by the bourgeoisie;\nii. stands against the missions that fall and will fall to Turkey within the world capitalist system;\niii. works to develop patriotic consciousness among the working class and working masses against the economic, political and cultural assaults of imperialism;\niv. leads the strengthening of working-class enlightenment so that religious reaction is pushed back politically and ideologically;\nv. propagates the brotherhood of peoples in order to prevent nationalist and fascist ideologies from gaining a foothold within the working class;\nvi. looks after the interests of the international dynamics of revolution;\nvii. makes efforts to educate the working class with internationalist consciousness;\nviii. leads efforts to increase social sensitivity to all the contradictions and problems produced by capitalist exploitation, and to channel reactions into the channel of struggle;\nix. develops ideological and political instruments for exposing capitalism in all its dimensions;\nx. leads efforts to secure the harmony, unity and coordination of the forces of socialism;\nxi. struggles against every kind of national oppression, and takes care that this struggle is grounded in class foundations and that a partnership between national and class dynamics is created;\nxii. mobilizes its resources for the removal of the legal obstacles before the struggle for socialism, for rendering all anti-democratic practices ineffective, and for neutralizing every kind of regulation that restricts the organization of the working classes."},{"title":"II. The Program of Socialist Power — A. Political Structure","text":"1. Power is organized as a socialist democracy."},{"title":"II. The Program of Socialist Power — A. Political Structure","text":"2. a) Socialist democracy is possible through the spread of power into the entire fabric of social life, above all into the process of production. In socialist democracy the working class is in government through its social organizations. Organs of power extend upward starting from factories, workshops, offices, farms, schools and barracks.\nb) The TKP encourages and guarantees the creation of local organs of power that will bring all sections of society into government, and the development of the competence of these organs."},{"title":"II. The Program of Socialist Power — A. Political Structure","text":"3. a) All organizations that constitute the levels of government from the bottom up determine their own leaderships through free elections.\nVoters have the right to \"recall\" the representatives they have elected to all organs before their term of office is completed.\nThe exercise of this right is regulated and guaranteed by law.\nb) Every citizen who has turned 16 has the right to vote and to be elected to all levels of government.\nc) In socialist power, the highest organ in matters of legislation, forming the government and overseeing the executive is the Assembly.\nd) The Assembly works in connection with the local organs of power and forms a single whole with them.\ne) Local organizations have the right and the responsibility to remove, when necessary, the administrators elected or appointed from their areas of responsibility.\nf) Local organizations established in every unit of society and in every field of social activity are organs of decision-making and implementation, within the framework of the law, within their own units and fields. Local organizations offer the individual the opportunity to intervene in social life starting from the smallest unit in which he or she personally lives, provide the appropriate environment for the full development of the socialist individual, and guarantee that the masses remain in a continuous relationship of communication, interaction and oversight with the political and legal decision-making and implementation mechanisms (all state organs and the Assembly).\ng) The TKP takes special measures so that representatives elected to the Assembly and to other governing levels do not become detached from the branches of production or service to which they belong. It always takes into account that socialist democracy will be possible by making the links between production and decision-making mechanisms unmediated."},{"title":"II. The Program of Socialist Power — A. Political Structure","text":"4. a) Measures are taken to prevent the mechanisms of government and the officials within them from becoming detached from the working class and estranged from the interests of society.\nb) Socially supervised mechanisms of communication are established that will ensure that persons with administrative responsibility within the state organization are regularly informed of the needs and problems of all social organizations.\nc) The means provided to administrators so that they can carry out their duties will be of a transparency that can be socially monitored and supervised. It is essential that these means be free of personalization and of a nature that always keeps administrators' consciousness of collective work alive."},{"title":"II. The Program of Socialist Power — A. Political Structure","text":"5. Turks and Kurds are the equal founding elements of socialist Turkey. Measures are taken for the complete elimination of the discriminatory, chauvinist practices and approaches that are the dominant feature of capitalist Turkey."},{"title":"II. The Program of Socialist Power — A. Political Structure","text":"6. The TKP, bearing in mind the goal, required by socialist democracy, of the state encompassing every citizen, develops policies that will make the mechanism of the state effective and productive; it holds that the division between state and society will thereby be eliminated. Given that the state will ultimately wither away, and in line with this, together with the disappearance of the ground of existence of exploiting classes and ideologies, the repressive functions of the state will be dismantled."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"1. Freedoms of expression, propaganda and organization are indispensable for the founding and maturation of socialist society."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"2. Ideas that openly or indirectly advocate the exploitation of human beings by human beings, that incite war, that exploit religion, and that are racist and fascist, cannot benefit from freedoms of propaganda and organization, because they constitute an obstacle to the free development of society."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"3. Human trafficking, prostitution, gambling and drug trafficking, which constitute obstacles to the development of socialist society and lead to moral decay and alienation, are banned."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"4. National and ethnic origin can under no circumstances be a cause of privilege, exclusion or oppression."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"5. The preservation and development of living languages and cultures is made possible."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"6. Economic, political, ideological and cultural measures are taken against gender difference giving rise to discrimination."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"7. Tribal structures are entirely abolished, and efforts are made to fully erase the traces of these structures in the cultural and ideological spheres."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"8. In order to put basic freedoms into practice, the means of written and visual communication, and the possibilities of assembly and demonstration, are placed at the service of all social organizations."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"9. Freedom of travel, inviolability of the home, and confidentiality of correspondence are ensured."},{"title":"II. The Program of Socialist Power — B. Basic Freedoms","text":"10. a) The mechanism of justice is formed, starting from the smallest locality, with the participation of the organs of social power.\nBoth citizens designated by these organs and professional judges serve on the courts. The rule of law is ensured.\nb) Since a significant portion of crimes originate in society, penal and enforcement laws contain policies aimed at providing the individual with the consciousness and abilities needed to take his or her place in socialist society, without disregarding the need to protect society against crime.\nc) The right of defense is protected by the state from the moment an accusation begins.\nd) Internal security organizations are arranged in a manner consistent with the ideals of socialism and open to the oversight of the working people.\ne) No physical or psychological pressure may be applied to persons in detention or in prison. No one, under any condition or circumstance, may be subjected to torture.\nf) Under no circumstances may the death penalty be imposed."},{"title":"C. Economic Structure","text":"1. The TKP pursues an economic policy aimed at completely abolishing, within the framework of a defined program, private ownership of the means of production, which is the fundamental source of inequalities in society."},{"title":"C. Economic Structure","text":"2. a) All means of production, including land, natural resources and mineral wealth, are public property.\nb) In the process of eliminating forms other than public ownership of the means of production, the necessary measures are taken to ensure the continuity of production and to make the political and ideological initiative of working people the principal force of this elimination.\nc) During the transitional period in which different forms of ownership will coexist, the socialist elements of the economy are given a privileged position and protected against the others, through laws and through the day-to-day policies of the political power."},{"title":"C. Economic Structure","text":"3. The fundamental aim of the socialist economy is for the whole of society to live in prosperity, and for citizens' living conditions to be improved with each passing day."},{"title":"C. Economic Structure","text":"4. All economic activities are made open to social oversight, and effective administrative, ideological, economic and legal measures are taken against phenomena such as the waste of social resources, bribery, abuse of authority, indiscipline and idleness."},{"title":"C. Economic Structure","text":"5. Banks, insurance companies and all other financial institutions are nationalized, and those unnecessary for the development of the socialist economy are wound down."},{"title":"C. Economic Structure","text":"6. Foreign trade is conducted solely by the state."},{"title":"C. Economic Structure","text":"7. a) Economic development is a process that can be planned under working-class power. In the process of eliminating class contradictions, the element that will ensure the harmonious unity of all elements of the economy and the realization of production for the benefit of society is central planning.\nb) Planning is put into practice together with the development, starting from the base, of the initiative of working people and the democratization of the decision-making mechanisms in the production process."},{"title":"C. Economic Structure","text":"8. Socialist planning gives priority to the use and development of the scientific and technological accumulation for the benefit of society."},{"title":"C. Economic Structure","text":"9. a) In industrialization and development, a breakthrough will be organized based on the resources Turkey possesses to a sufficient degree (mines, land, energy, skilled labor power), and the external dependency of the country's economy will be ended.\nb) The socialist economy standing on its own strength does not mean it turns in on itself. The independence of the economy is secured by its class character and by ceasing to be a part of the imperialist world. External economic relations, conducted with independence and the country's class interests in mind, are arranged so as to serve the development of the socialist economy.\nc) All agreements made with imperialist countries that place a heavy debt burden on the working people of our country and render the country dependent are invalid and are unilaterally annulled.\nd) Efforts are made to realize a lasting, harmonious process of economic integration with other socialist countries, in keeping with the spirit of internationalism."},{"title":"C. Economic Structure","text":"10. In the socialist economic structure, after the amount needed for the collective needs of society is set aside, all the wealth produced returns to working people as wages. The principle \"from each according to their ability, to each according to their labor\" in determining wages will retain its validity in the initial stages of the road to a classless society. At the same time, policies will be developed that keep in view the increasing prominence of the true goal, the principle of \"to each according to their need.\""},{"title":"C. Economic Structure","text":"11. The shortening of working time is one of the most important instruments in the creation of the new human being and one of the fundamental goals of socialist society."},{"title":"C. Economic Structure","text":"12. Minimizing the use of physical labor and mobilizing the mental productive potential of all human beings is another fundamental goal of socialist society. By using advanced techniques in agricultural and industrial production, jobs carried out, above all, under conditions unbecoming to human beings are, as a priority, taken over by machines."},{"title":"C. Economic Structure","text":"13. In the socialist economy, job security and the right to work are provided to all citizens of working age and capacity. Under no circumstances may the state abolish these two fundamental rights."},{"title":"C. Economic Structure","text":"14. Those unable to work, the elderly and pensioners are under the guarantee of the socialist state. A humane standard of living and equal opportunities are provided to these citizens."},{"title":"C. Economic Structure","text":"15. Trade unions are one of the instruments through which the working class participates in government, consolidates and protects the foundations of socialism, in the process of building socialism.\na) The right to unionize and the right to strike are guaranteed by law in a manner covering all working people.\nb) Trade unions and the organs of power in workplaces are authorized to improve working conditions and to expand workers' opportunities for rest, culture and sport."},{"title":"C. Economic Structure","text":"16. a) Political and ideological struggle is waged to bring agricultural working people together as free farmers in collective farms and as agricultural proletarians in state enterprises. Collective farms are made to find forms compatible with, and not contradictory to, public ownership.\nb) While the harmony of different collective forms in agricultural production is observed, efforts are made to move toward more advanced forms.\nc) Struggle is waged against every kind of dynamic that nourishes a private-property ideology with respect to land.\nd) External dependency in agricultural production is brought to an end."},{"title":"C. Economic Structure","text":"17. The TKP takes care that economic policies are consistent with the goal of reducing the divide between cities and rural areas."},{"title":"C. Economic Structure","text":"18. Measures are taken against every kind of alienation arising in the process of production, in particular worker-machine and worker-product alienation."},{"title":"C. Economic Structure — D. Foreign Policy and Defense","text":"1. Withdrawal is made from all of imperialism's military, economic, financial, cultural and political organizations. All agreements and obligations contrary to the country's interests arising from past relations and ties with these organizations are invalid."},{"title":"C. Economic Structure — D. Foreign Policy and Defense","text":"2. Participation is maintained in all international organizations that ensure equal participation, protect mutual interests and serve peace. An effective effort is made so that these organizations serve the goals of improving international relations, narrowing the room for maneuver of imperialist countries, and combating international reaction."},{"title":"C. Economic Structure — D. Foreign Policy and Defense","text":"3. Solidarity is extended to all socialist and revolutionary governments. Entrepreneurial and supportive attitudes are displayed for the formation and strengthening of regional/international alliances that push back the power and influence of imperialism."},{"title":"C. Economic Structure — D. Foreign Policy and Defense","text":"4. a) Measures needed for the development and permanence of internationalist consciousness in society are taken.\nb) Solidarity is developed with revolutionary and communist movements in capitalist countries.\nc) Persons forced to leave their own countries because of their communist, socialist, anti-imperialist, anti-fascist or anti-war views are under the guarantee of our socialist society and its laws."},{"title":"C. Economic Structure — D. Foreign Policy and Defense","text":"5. a) The country's fundamental element of defense is the armed forces.\nb) The armed forces are at the service of socialist society. The alienation of the armed forces from society is prevented. In times of peace the armed forces take on tasks in the process of production.\nc) Military service is compulsory for all citizens, women and men alike. The length of military service is determined according to the state of international relations.\nd) The armed forces, through an organization appropriate to the requirements of the age, keep pace with technological developments. Every kind of measure is taken to maintain the country's defense capacity. The national character of the arms industry is developed and carefully protected.\ne) The only organ that will decide on a state of war is the Assembly.\nf) In the face of an imperialist attack, the whole political, organizational, economic and human potential of the country is mobilized, and the war is turned, with the participation of the whole people, into a revolutionary and patriotic war.\ng) Democratic norms are established in superior-subordinate relations within the armed forces; hierarchical order is secured with the help of cultural and ideological education processes. The permanent personnel of the armed forces are trained not merely in military matters but as the kind of individuals socialist society needs.\nh) Members of the armed forces have all the political and social rights granted to other citizens, including the right to vote and to be elected.\ni) The internationalist character of the armed forces is preserved and strengthened.\nj) Internal security needs are met by people's militias formed within the armed forces."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"1. The creation of the new human being is at once an indicator, a result and an instrument of the building of socialism. The new human being is a whole in his or her ideological, cultural and physical existence. Society and the state are responsible for the harmonious and healthy development of this whole."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"2. The TKP treats fields such as education, mass communication, political and cultural life, health, and sporting activities not separately but as a single whole, so that individuals can express themselves socially and be raised as people with a collective consciousness who believe in the equality and brotherhood of all human beings and all nations."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"3. A social security system is established that covers all citizens and includes every kind of human need."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"4. a) Education, at all its stages, is reorganized in the interests of society as a free public service. All private educational institutions are nationalized.\nb) Education is transformed into a scientifically grounded activity that brings out and develops human beings' abilities and creative power.\nc) Education in the mother tongue is under the guarantee of the socialist state. Among the aims of the education system is that the peoples living in the country and the region come to know one another's languages and cultures more closely.\nd) Foreign-language education policy is determined in line with the goal of benefiting to the maximum extent from humanity's cultural and scientific accumulation and of strengthening brotherhood among peoples.\ne) Everyone being able to study in the field they wish is ensured, while also taking into account the needs of society.\nf) In education policy, all the constituent elements of educational institutions have a say. Teachers, students, parents and the service workers of educational institutions take part in shaping education policy through both separate and joint organizations.\ng) Proceeding from the fact that the new human being, on the road to a classless society, is at the same time a \"struggling human being,\" education assists, scientifically and morally, the struggle waged for a classless, exploitation-free world.\nh) It is forbidden for children and young people under the age of 18 to work, or to be made to work, in jobs that are not part of their educational process.\ni) That not a single citizen remains who cannot read or write is one of the most fundamental tasks of socialist society. In addition, every kind of opportunity is provided, without any age limitation, for people to develop their knowledge and skills."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"5. All private hospitals and health institutions are nationalized. All health services, including the costs of medicine and treatment, are free and are covered by the state. Struggle is waged for the elimination of every kind of factor harmful to human health, and preventive medicine and tiered health-service practices are made widespread."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"6. People have the right to live in places where they can reproduce themselves morally and physically. In line with this right, housing appropriate to need is provided to everyone. Every kind of measure needed is taken so that housing has the solidity to withstand earthquakes, floods and other natural events without being affected. Heating, electricity and water in housing are provided free of charge."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"7. The prices of goods and services made available for society's use are determined also taking into account the goals of accelerating society's intellectual development and of changing consumption habits in a way that will assist the struggle for the creation of the new human being."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"8. An important part of the struggle for the creation of the new human being is the elimination of the distinctions and contradictions that have arisen historically between women and men in terms of social activity, equality of opportunity and social roles.\na) The TKP struggles for women's rights guaranteed by law to become a real and lasting achievement in every sphere of life, and stands against sexuality taking on roles that demean women and against every kind of discrimination directed at women.\nb) The struggle needed is waged for the elimination, in all its social and ideological aspects, of the division of labor based on gender difference that is the cause of women's dependency on housework and childcare. The burdens that fall upon women in capitalist society, such as cooking, cleaning and childcare, are assumed by society as a whole through the mobilization of collective facilities. In line with this, nurseries, canteens and laundries, which are an important part of planned urbanization, are made widespread.\nc) Every kind of organizational opportunity is created for women to participate effectively in political and cultural life.\nd) The TKP struggles for the family to be freed from the economic and ideological functions it assumes under conditions of capitalism, and to be transformed into voluntary unions founded on love."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"9. The care, nutrition, healthy development and education of children are under the guarantee of the socialist state."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"10. Young people are encouraged, from as early an age as possible, to participate in the whole of social life, in political decision-making processes, and in cultural, artistic and scientific production. The means are provided for them to have equal rights and responsibilities with other citizens within the educational or sporting institutions of which they are a part and within their localities. Socialist society will release the creative energy of a youth kept under pressure in capitalist society, and will liberate youth in every sphere."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"11. All the material and moral conditions necessary are created so that the elderly, whom capitalism, by removing them from every kind of social activity, leaves without support and companionship, can live as citizens of the new society, equal, cared for, and encouraged to participate in public life."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"12. Conditions are created for people with disabilities to participate in education, production processes and social life."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"13. Art is one of the important fields that will contribute to the free self-realization of the new human being.\na) The TKP leads initiatives aimed at the liberation of artistic creativity.\nb) It is among the TKP's fundamental aims that art become social in a free environment, that art workers organize, and that all obstacles preventing art from reaching people be removed. In this direction:\ni. It is ensured that art workers make use, in an organized and collective manner, of the social resources allocated to them.\nii. It is essential that the state not obstruct but support the development of new and different forms and techniques of creation in artistic production.\niii. Every kind of censorship directed at works of art is abolished.\niv. The commodification of art is prevented.\nv. Efforts are made so that artistic production ceases to be the pursuit of a minority and becomes a widespread social pursuit.\nvi. The TKP wages ideological struggle so that artistic works do not come into contradiction with the needs of socialist society and of the new human being.\nc) Cultural and historical heritage is preserved and opened to the access of the whole people."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"14. Science and scientific activity are among the fundamental headings in the maturation of socialist society and the creation of the new human being. With the ending of the conditions under which science and technology can be developed, or are allowed to develop, only insofar as they increase exploitation or permit an increase in exploitation, and under which they are commodified and alienated from the broad masses, it will become possible for scientific activity to be carried out in line with the overall interests of society. The determination of the resources allocated to scientific work and participation in decisions on their distribution will be ensured for scientists in an organized manner. The gains and products arising from the work carried out by scientists are the common property of all humanity."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"15. a) In place of sport, which is commercialized and turned into a professional activity in capitalist society, there will come a social organization in which opportunities to engage in sport are offered to all people of every age, gender, occupation and region.\nb) It is aimed that sport should be based on, and develop, health, enjoyment and solidarity rather than a destructive, enmity-creating competition.\nc) Rather than being confined to special venues, sport is made widespread in workplaces, schools and all residential areas. The broad masses are encouraged to move out of the position of passive spectators."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"16. a) Everyone has freedom of belief. No institution may exert moral pressure on people.\nb) The politicization of religion is prevented. People's religious beliefs are not recorded in any official document.\nc) Religion is treated in educational institutions as a subject of study for the social sciences.\nd) The TKP is the leader of the political-ideological struggles to be waged so that humanity's scientific achievements take the place of every kind of metaphysical belief."},{"title":"C. Economic Structure — E. The Creation of the New Human Being","text":"17. a) Environmental and cultural values are rescued from being commercial commodities and are protected by the state and opened to the use of the whole of society. Heavy sanctions are applied against the destruction of coastlines, forests, and natural and historical riches.\nb) In the policies and practices of socialist industrialization and urbanization, the protection of the environment and human health is given priority. It is ensured that the whole of society and the communities concerned take part, in an organized manner, in the determination of environmental policy and in concrete practices.\nc) Measures are taken to eliminate the inequalities arising from the relative advantage of cities over rural areas from an economic, social and cultural point of view.\nd) Public transportation is implemented in cities and turned into a free public service. Within cities and between cities, the weight that highways have gained in capitalist society in transportation is reduced, and safer and more efficient forms of transportation are made widespread.\ne) It is the responsibility of the socialist state to allocate the resources necessary to eliminate the destructive effects of natural disasters and to carry out scientific work in this direction. This work is open to the knowledge, participation and oversight of the people."}]</script>
<script id="data-ar" type="application/json">[{"title":"مقدمة","text":"منذ اللحظة التي بدأ فيها الإنسان استغلال الإنسان، صار التاريخ كله تاريخ صراعات طبقية، ويحدد اتجاه التاريخ أيّ طبقة ترجّح كفتها في هذا الصراع.\nلا يمكن للبشرية أن تتجاوز الرأسمالية إلا بقيادة الطبقة العاملة، وبذلك يمكن لعجلة التاريخ أن تدور إلى الأمام. إن الرأسمالية التي تحمل في بنيتها الديناميات التي تعدّ لنهايتها بنفسها، ستوضع في قبرها وتُدفن في التاريخ على يد حفار قبرها الذي خلقته بنفسها، أي البروليتاريا. إن انتصار الطبقة العاملة في كل بلد على حدة سيمهد الطريق لإلغائها هي نفسها كما هو حال كل الطبقات، والثورة التي تنتشر في العالم أجمع ستبدأ، مع تأسيس مجتمعات بلا طبقات ولا استغلال، تاريخ البشرية بالمعنى الحقيقي للكلمة.\nفي بداية القرن العشرين، خطت البشرية خطوة عملاقة إلى الأمام نحو عالم بلا طبقات ولا استغلال، بثورة أكتوبر العظمى التي استولت فيها الطبقة العاملة على السلطة. ومع انحلال الاشتراكية الواقعية في نهاية القرن، توقف تقدم البشرية نحو المجتمع اللاطبقي. وفي بداية القرن الحادي والعشرين، استمرت حقبة الرجعية التي طبعت البرجوازية بها مسار التاريخ.\nهذه الحقبة الرجعية، وهذا الظلام الذي وقعت فيه البشرية، لا يمكن أن يكونا دائمين. لأن صراع الطبقات مستمر دون توقف. علاوة على ذلك، فإن الرأسمالية بطبيعتها لا يمكنها التخلص من الأزمات، وهي تواصل خلق الظروف التي ستعدّ لنهايتها هي نفسها.\nاليوم يتصارع النظام الرأسمالي العالمي مع أزمة جذرية. ولا تظهر هذه الأزمة فقط في بعدها الاقتصادي الذي تفاقم في العقد الأول من القرن. إنها أزمة عميقة ذات أبعاد سياسية وأيديولوجية وعسكرية. لكن أزمة الرأسمالية، بقدر ما تخلق أرضية مادية لإسقاط سيطرة البرجوازية وتفتح إمكانات سياسية وأيديولوجية يمكن أن تقوّي يد الطبقة العاملة، فإنها تقوّي أيضاً احتمال أن تدمّر طبقة رأس المال التراكم التاريخي للبشرية ومكتسباتها بل والحياة الإنسانية ذاتها.\nإما أن تنتهي هذه الأزمة بتعزيز سيطرة النظام الرأسمالي العالمي فتُدفن البشرية في الظلام بين براثن الهمجية، وإما أن توجه الطبقة العاملة ضربة قاصمة للرأسمالية وتستأنف مسيرتها من جديد نحو الاشتراكية.\nلا سبيل بين هذين الخيارين. الاشتراكية اليوم هي الهدف الحقيقي والملموس الوحيد لكل البشرية في طريقها نحو حياة أفضل وبلد أفضل وعالم أفضل. لا يمكن لأي طرح لا يمسّ الملكية الخاصة لوسائل الإنتاج أن يكسر هذه العجلة المدمرة أو يحمل البشرية إلى الأمام. الاشتراكية ليست خياراً بل ضرورة لمستقبلنا، لأن البشرية لا خيار آخر لديها.\nالحزب الشيوعي التركي يناضل اليوم بوعي هذه الضرورة تحديداً من أجل تقوية الاشتراكية في تركيا. إن عصر الثورات الاشتراكية الذي انفتح في بداية القرن العشرين لم يُغلق فعلياً أبداً، لأن الشروط والتناقضات التي تجعل الثورة الاشتراكية ممكنة ما زالت قائمة.\nفي عصر الثورات المنقول إلى قرن جديد، يحقق الحزب الشيوعي التركي مسعاه في تنظيم الطبقة العاملة، القوة الطليعية للثورة الاشتراكية التركية، وقيادة الثورة.\nستنتهي حقبة الرجعية\nخرجت الاشتراكية منتصرة من الحرب العالمية الثانية، وكانت لها في السنوات التي تلتها هيبة وتأثير كبيران. فالسلطة السوفيتية التي سارت في طريق مختلف كلياً عن التطور الرأسمالي، وحوّلت بلداً فلاحياً متخلفاً إلى عملاق صناعي بخطوات التنمية المخططة، وسخّرت هذه البنية التحتية من أجل حياة اجتماعية أكثر مساواة وحرية، أثبتت جدارتها على الصعيد الدولي أيضاً بقيادتها البشرية في سحق الفاشية في العالم أجمع.\nإن اتحاد الجمهوريات الاشتراكية السوفياتية، بلد العمال، لم يكن يقدّم حياة إنسانية ومتساوية وحرة لسكانه فحسب، بل كان يتحول إلى جغرافيا يزدهر فيها الأمل لكل من يبحث في بقية العالم عن مخرج من الفقر والاستغلال وعدم المساواة التي تفرضها الرأسمالية. لم يكن حلماً بل حقيقة واقعة أن يكون هناك مجتمع يلبّي الاحتياجات الأساسية كالصحة والتعليم والنقل والسكن للجميع بالتساوي، ويحقق تطورات كبرى في الفن والعلم والرياضة لصالح المجتمع، وتشارك فيه النساء في الحياة الاجتماعية والاقتصادية دون أي تمييز، ويستفيد فيه الأطفال من الموارد الاجتماعية بالتساوي وبأقصى قدر وتُكفل فيه حقوقهم. كان العمال، بقيادة الحزب الشيوعي للاتحاد السوفياتي، يبنون حلماً على الأرض بشكل ملموس.\nكانت الفترة نفسها أيضاً مرحلة توسع ونمو مؤقتة بالنسبة للرأسمالية. طبعت الحربُ الباردة المنافسةَ بين الرأسمالية العالمية التي واصلت نموها حتى الأزمة الاقتصادية التي دخلتها في السبعينيات، والاشتراكية المهيبة والمنتصرة. واصلت الاشتراكية تقدمها خلال الحرب الباردة أيضاً. وفيما كانت الاشتراكية تنتشر في ما يقارب ثلث العالم، كانت تكبح الإمبريالية في كل المجالات لصالح البشرية جمعاء عبر إقامة توازن ضد الرأسمالية العالمية. وبفضل هذه القوة للاشتراكية، رجحت كفة الطبقة العاملة في صراع الطبقات ضد الإمبريالية التي لم تستطع التحرك بحرية في المجالين العسكري والسياسي، حتى في البلدان غير الاشتراكية، وحققت مواقع متقدمة. كما ظهرت في هذه الفترة تطبيقات دولة الرفاه في البلدان الرأسمالية المتقدمة، والتنظيمات النقابية الجماهيرية، والحركات اليسارية ذات الثقل المجتمعي.\nعلاوة على ذلك، وضع ميزان القوى في ظروف وجود الاشتراكية حداً للاستعمار في العديد من مناطق العالم. نشأت حركات التحرر الوطني في هذا المناخ. وفي هذه الظروف، تقلصت الفجوة بين نضالات الاستقلال والاشتراكية قدر الإمكان.\nفي هذا السياق الذي كانت الاشتراكية فيه تتقدم والرأسمالية تتراجع، كان المخرج الوحيد أمام طبقة رأس المال التي دخلت أزمة كبرى في السبعينيات هو تصعيد عدوانيتها. ففي نهاية السبعينيات، انتقلت البرجوازية إلى هجوم شامل في كل مكان وفي كل مجال يمكن تصوره. فُككت بنية دولة الرفاه، وبدأ اغتصاب كل الحقوق التي اكتسبتها الطبقة العاملة في ظل الرأسمالية. فُتحت الخدمات العامة كالتعليم والصحة أمام نهب رأس المال، وتُركت المؤسسات العامة لرحمة البرجوازية عبر الخصخصة. وبينما تراجعت الأجور الحقيقية، تنوّعت وتطورت الآليات المالية التي تربط الكادحين بالنظام عبر إغراقهم في الديون.\nكان الهجوم الأيديولوجي والسياسي أيضاً متعدد الأبعاد. وقد شاركت في هذا الهجوم الكبير الذي استهدف قيم الاشتراكية بل قيم البشرية جمعاء، بعض التيارات اليسارية التي دخلت في مجال جذب الليبرالية. وكانت مفاهيم مثل حقوق الإنسان والديمقراطية بل والحرية من العناصر الرئيسية المستخدمة في هذا الهجوم الأيديولوجي بعد تفريغها من مضمونها الطبقي. كما كانت أمركة الفن والرياضة، وتسليع المعرفة، والتدخلات الواعية لإفساد الحياة اليومية للناس، ونشر ثقافة الاستهلاك، كلها أجزاء من هذا الحصار البرجوازي. وقد نالت الطبيعة والقيم التاريخية والثقافية نصيبها من الهجوم أيضاً. وفيما واجهت البشرية عموماً دماراً كبيراً، وانجرفت خطوة خطوة نحو الكارثة في عالم يتجه إلى الهاوية، قُذفت البشرية في بئر لا قرار له من الجهل والتعفن.\nرافقت الهجومَ الاقتصادي والأيديولوجي والسياسي في تركيا وما شابهها من البلدان الرأسمالية المتأخرة تدخلاتٌ فيزيائية مباشرة. تسببت الانقلابات العسكرية والديكتاتوريات الفاشية التي دعمتها أو خططت لها الإمبريالية في تعرض اليساريين والتقدميين في هذه البلدان لعنف غير مسبوق. قُمعت حركات الطبقة العاملة وتراجعت بالقوة.\nوفي هذه الفترة، استُخدمت الرجعية الدينية التي كانت تُغذّى وتُنمّى بشكل منهجي في الحرب الباردة كسلاح فعّال ضد الاشتراكية في العديد من الجغرافيات، ودُفعت مباشرة إلى الجبهة.\nلم تستطع الحركة العمالية الدولية والديناميات التقدمية والثورية الأخرى، وعلى رأسها الحزب الشيوعي للاتحاد السوفياتي، أن تُظهر الإبداع والجرأة الأيديولوجية والسياسية اللازمة لمواجهة هذا الهجوم الكبير، فبقيت في موقع الدفاع وتراجعت. وحين اقترن هذا التراجع بأخطاء وأوجه قصور وخيانات كبرى، انحل النظام الاشتراكي في نهاية الثمانينيات.\nومع الانحلال، دخلت الإمبريالية، التي لم تعد تواجه أي عائق تقريباً، كل مجال أخلته الاشتراكية. وفي هذه الظروف، شرع النظام الرأسمالي العالمي، الذي ادّعى نهاية التاريخ، في محو ما تبقى من الاشتراكية والسعي لطمس الاشتراكية من التاريخ.\nرُفض كل ما له صلة بالاشتراكية أو يذكّر بها. وفي عالم لم يبق فيه من الاشتراكية إلا القليل، ازدادت الإمبريالية عدوانية. انتشر النظام الإمبريالي بسرعة تحت اسم «العولمة»، وأُدمجت في النظام البلدان التي كانت تتحرك في مجال مستقل نسبياً بفضل وجود القطب الاشتراكي، وأُعيدت هيكلة أشكال ارتباط البلدان المتخلفة بالنظام، وبينما أُنعشت حفنة من المتعاونين بمعنى الكلمة الحقيقي، دُفعت قطاعات واسعة جداً إلى الفقر. ولم تتورع الإمبريالية في هذه العملية عن الحرب واستخدام القوة، فأمطرت العديد من البلدان بالقنابل وأرسلت الجنود. وكان استخدام مفاهيم مثل الديمقراطية والحرية كمبررات تُضفي الشرعية على هذا العنف مؤشراً أيضاً على الهزيمة الأيديولوجية لليسار العالمي.\nوأُجبر ملايين من اقتنعوا بأنهم لن يتمكنوا من الخروج من وحل الفقر في بلدانهم، أو ممن شرّدتهم الحرب من ديارهم، على الهجرة إلى البلدان المتقدمة للعمل بشبه وضع العبيد. لم يكن رأس المال الدولي يترك لملايين الكادحين خياراً سوى الاستغلال في البلدان التي حوّلها بحاجته إلى يد عاملة رخيصة، أو ترك أوطانهم. ولم تتردد الرأسمالية في ضم علاقات الإنتاج التي سبقتها إلى النظام من أجل مزيد من الربح، ولا في فرض أشكال حياة أكثر تخلفاً على البشرية.\nومع خروج الاشتراكية من المسرح، فرضت الولايات المتحدة الأمريكية، التي جلست في مقعد قيادة النظام الإمبريالي منذ نهاية الحرب العالمية الثانية، النظامَ الذي صممته لاستمرار قيادتها على كل الجغرافيات، وفي مقدمتها الشرق الأوسط، دون تردد في استخدام السلاح. وسرعان ما تبيّن أن الادعاء بتراجع احتمال الحرب الساخنة بعد انحلال الاتحاد السوفياتي كان كذبة كبرى. فمنذ انحلال الاشتراكية وحتى اليوم، لم يمرّ على العالم يوم واحد دون صراع أو دون سفك دماء. وحاولت الولايات المتحدة، مستخدمة قوتها العسكرية التي لا تُضاهى، ربط سائر البلدان الرأسمالية المتقدمة بهذا النظام الخاضع لهيمنتها.\nوفي الإطار نفسه، تحقق إدماج البلدان غير المتقدمة، والبلدان التي كانت تتحرك في المجال الذي خلقته لنفسها مستفيدة من التوازن بين النظامين في ظل وجود الاشتراكية، في هذا النظام الجديد. وبدعوى انتهاء بنى الدولة القومية، قُيّد مجال حركة السلطات الوطنية وتعززت سلاسل التبعية.\nوفي الجبهة الأيديولوجية لكل هذه العملية السياسية والعسكرية، كانت الليبرالية بنسختيها اليمينية واليسارية في الصدارة. وقد أدّت النسخة اليسارية من الليبرالية بنجاح، في نظر الطبقة العاملة والقطاعات الاجتماعية التي يخاطبها اليسار في العالم أجمع، مهمة تبييض الإمبريالية.\nبطبيعة الحال، لن تسير العملية بهذا الشكل السلس، ولن تدور عجلة التاريخ إلى الوراء دائماً.\nفرغم كل الخطوات التي اتخذها النظام الرأسمالي الدولي للخروج من أزمته والمواقع التي كسبها، لم يتمكن من تجاوز أزمته البنيوية واستمر في تراكم المشكلات. وواجهت الولايات المتحدة وحلفاؤها، الذين أرادوا ملء كل الفراغات التي نشأت في العالم بعد الاشتراكية بتعزيز هيمنتهم، نقاط مقاومة ذات مصادر مختلفة في بلدان وجغرافيات مختلفة، ولم يتمكنوا من التغلب عليها.\nإن الاتحاد الروسي، الذي مرّ بعملية استعادة رأسمالية بعد الثورة المضادة، تحول، بفضل الإرث التاريخي والإمكانات العسكرية والسياسية والأيديولوجية الواسعة التي يستند إليها، رغم نقاط ضعفه الاقتصادية، إلى دينامية أزمة قائمة بذاتها وجزء من التنافس الإمبريالي. وحين رافق صعودَ روسيا في النظام الإمبريالي تقدمُ جمهورية الصين الشعبية بدعم قوتها الاقتصادية الكبرى بخطوات سياسية وعسكرية، تعمقت أزمة الإمبريالية بأبعاد متعددة. وبفعالية كلا البلدين كعنصرين مخربين داخل النظام الرأسمالي العالمي، تطورت الأزمات الاقتصادية والسياسية التي تعيشها المراكز الإمبريالية مع تأثير وتعزيز كل منها للأخرى. وفي السياق نفسه، فيما نقلت نتائج الانتخابات الرئاسية التي جرت في ظروف الأزمة في الولايات المتحدة، البلد الإمبريالي الرئيسي، الأزمة داخل حدود البلد نفسه إلى مرحلة لم يسبق لها مثيل من العمق، وجّهت الجراح الكبرى التي أصابت الاتحاد الأوروبي ضربات قاسية للمراكز الإمبريالية الأوروبية.\nإن وصول النظام إلى نقطة التوقف، وتعطل الخطط الإمبريالية وفشلها في جغرافيات مختلفة، أظهرا للبشرية حدود قوة الإمبريالية. وأصبحت أزمة الرأسمالية وانسدادها لا يمكن إخفاؤهما أمام العالم أجمع.\nوفي ظروف هذه الأزمة، تحاول الإمبريالية القيام بأفضل ما تجيده، وتشدد هجومها على الطبقة العاملة على مستوى العالم. وفيما يحاول النظام مرة أخرى تجاوز الأزمة التي خلقتها ديناميّاته الداخلية بتحميل فاتورة الأزمة للكادحين، يتجه نحو رفع معدلات الاستغلال ويواصل تخريب القوى المنتجة.\nويشتد التنافس الإمبريالي وصراع الهيمنة من أجل حل مشكلات الموارد والأسواق التي جعلتها الأزمة حارقة. ويزداد يوماً بعد يوم احتمال أن تنقل البلدان الرأسمالية المتقدمة في مركز النظام، التي انضمت إليها الآن روسيا الاتحادية وجمهورية الصين الشعبية، تنافسها فيما بينها إلى حرب مدمرة. ومع تعمق التناقضات، تتعزز الأسس المادية لتحوّل الصراعات الإقليمية الحالية إلى حروب واسعة النطاق.\nوفيما تعيش الرأسمالية أزمة على مستوى العالم أجمع، تتأثر البلدان الواقعة أسفل الهرم في الظروف التي تحددها الإمبريالية بهذا الصراع أكثر من غيرها، وتكون معاناة كادحي هذه البلدان من الأزمة أكبر.\nإن التنافس المتصاعد داخل الإمبريالية، والتناقضات المتفاقمة، واحتمال الصراع الساخن المتنامي، تخلق ظروفاً مواتية أيديولوجياً وسياسياً لتقوية التيارات المضادة للثورة، وتبذل البرجوازية جهداً خاصاً لفتح الطريق أمام مثل هذه التيارات. وفيما تتصاعد الرجعية الدينية وكل أنواع القومية والعسكرة والفاشية في العالم أجمع، تصبح الأنظمة أكثر استبداداً وقمعاً.\nوفي ظروف هذه الأزمة، يستمر صراع الطبقات في أرجاء العالم الأربعة، ويستطيع اليسار، وإن لم يكن بالقدر المرغوب بعد، أن يحافظ على بعض المواقع مثل إصرار كوبا على الاشتراكية. وتنبعث من جديد في العديد من البلدان تقاليد المقاومة ضد الإمبريالية وكل الأيديولوجيات الرجعية التي تخلقها الرأسمالية.\nإن الأزمة التي دخلتها الرأسمالية ككل تفتح ثغرات في هيمنة البرجوازية في المجال الأيديولوجي، فلا تستطيع الإمبريالية تسويق الأطروحات الليبرالية، ولا تستطيع الأيديولوجيات الرجعية الصاعدة أن تشمل البشرية عموماً.\nإن الرأسمالية لا تستطيع أن تقدم للبشرية تصوراً لمستقبل، ولا تستطيع أن تمنح أملاً للجماهير الواسعة التي تصارع الفقر والجوع والحرب، فيما تذهب كل الأكاذيب التي استخدمتها البرجوازية طوال عقود، واحدة تلو الأخرى، إلى مزبلة التاريخ. لقد مضى وقت طويل منذ أن تبيّن أن أساطير العولمة والاندماج تعني ربط الإمبريالية للبلدان والأمم الأخرى بالنظام. علاوة على ذلك، تصبح علاقة الرأسمالية بالرجعية والفاشية والعسكرة والأنظمة الاستبدادية القمعية ملموسة ومرئية. وفيما تنهار الحصون الأيديولوجية لطبقة رأس المال، فإن عجزها عن خلق بديل جديد ومنهجي وشامل ومقنع يخلق فراغاً كبيراً في هيمنتها.\nفي هذه الظروف، لا مفرّ من أن تتجه القطاعات الواسعة الخاضعة للاستغلال إلى البحث خارج النظام.\nوالبديل الوحيد الذي يمكن أن يستجيب لهذا البحث في العالم أجمع هو الاشتراكية. الاشتراكية، تماماً كما كانت في بداية القرن الماضي، هي التيار الأيديولوجي الوحيد القادر على تقديم أمل بمستقبل للبشرية، وعلى اقتراح نظام جديد يمكن أن تتخلص فيه من هذه الهمجية.\nولم تشخ الاشتراكية بهذا المعنى أبداً، ولم تفقد صلاحيتها، وظلت جديدة، واستعادت اليوم، في ظروف تتدحرج فيها الرأسمالية إلى الأزمة في كل مجال، إمكانية أن تكون بديلاً حقيقياً للخروج في نظر الجماهير.\nلقد أظهرت الأحداث مدى صواب ما قاله الشيوعيون بشأن هذا النظام وبشأن التحرر منه."},{"title":"مقدمة","text":"لم يُعش القرن العشرون عبثاً، وتسلحت البشرية عموماً والطبقة العاملة خصوصاً بالدروس التي استخلصتها منه. فقد تبيّن أن الرأسمالية، حتى في أفضل أحوالها، ضرب من الهمجية، وتراكمت خبرة فريدة تضيء الطريق نحو المستقبل، سواء من ممارسة الاشتراكية الواقعية أو من النضال التاريخي الذي خاضته الحركة العمالية الدولية في العالم أجمع.\nإن الأزمة العميقة التي يعيشها النظام الرأسمالي العالمي تتيح، في كل جغرافيا دون استثناء، إمكانات هائلة للحركة العمالية. ومن الممكن، بتوظيف هذه الإمكانات، ترك هذه الحقبة
