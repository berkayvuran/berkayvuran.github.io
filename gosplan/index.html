<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gosplan — Giriş</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/theme.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(127,29,29,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(185,28,28,0.08) 0%, transparent 50%),
        var(--bg);
      padding: 1rem;
    }
    .login-wrap { width: 100%; max-width: 420px; }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .star-symbol {
      font-size: 3.5rem; line-height: 1; display: block; margin-bottom: 0.6rem;
      filter: drop-shadow(0 0 12px rgba(220,38,38,0.6));
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(220,38,38,0.5)); }
      50%      { filter: drop-shadow(0 0 20px rgba(239,68,68,0.9)); }
    }
    .login-title {
      font-size: 2.5rem; font-weight: 800; letter-spacing: 0.04em;
      color: var(--red-400);
    }
    .login-subtitle {
      font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.15em;
      text-transform: uppercase; margin-top: 0.3rem;
    }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border-bright);
      border-radius: var(--radius-xl); padding: 1.75rem;
      box-shadow: var(--shadow-lg);
    }
    .manifesto {
      font-size: 0.78rem; color: var(--text-muted); font-style: italic;
      margin-bottom: 1.5rem; line-height: 1.6;
      border-left: 2px solid var(--red-800); padding-left: 0.75rem;
    }
    .error-msg {
      color: var(--red-300); font-size: 0.82rem;
      padding: 0.55rem 0.75rem; background: rgba(127,29,29,0.2);
      border-radius: var(--radius); border: 1px solid var(--red-800);
    }
    .login-footer {
      text-align: center; margin-top: 1.75rem;
      font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.04em;
    }
    .login-footer a {
      color: var(--gold); text-decoration: none; font-weight: 600;
    }
    .login-footer a:hover { color: var(--gold-light); text-decoration: underline; }
    .admin-link {
      display: block; text-align: center; margin-top: 1rem;
      font-size: 0.7rem; color: var(--text-muted); text-decoration: none;
      letter-spacing: 0.05em;
    }
    .admin-link:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <span class="star-symbol">☭</span>
      <div class="login-title">Gosplan</div>
      <div class="login-subtitle">Hane Planlama Komitesi</div>
    </div>

    <div class="login-card">
      <p class="manifesto">
        "Proleterlerin zincirlerinden başka kaybedecekleri bir şeyleri yok. Kazanacakları bir dünya var."
      </p>

      <form id="loginForm" class="flex-col gap-2">
        <div class="form-group" id="tenantWrap">
          <label class="form-label" for="tenant">Hane</label>
          <input type="text" id="tenant" class="form-input" autocapitalize="off" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="username">Kullanıcı Adı</label>
          <input type="text" id="username" class="form-input" autocapitalize="off" autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Parola</label>
          <input type="password" id="password" class="form-input" autocomplete="current-password" required/>
        </div>

        <div id="adminHint" class="hidden mt-1" style="font-size:0.75rem;color:var(--gold);text-align:center;padding:0.4rem;background:rgba(212,160,23,0.08);border-radius:var(--radius);border:1px solid rgba(212,160,23,0.3);">
          ⚙ Admin modu aktif — Hane gerekmiyor
        </div>

        <div id="errorMsg" class="error-msg hidden mt-1"></div>

        <button type="submit" class="btn btn-primary btn-full mt-2" id="loginBtn">
          ☭ &nbsp;Gir
        </button>
      </form>

      <div class="login-footer mt-3">
        Haneye kayıtlı değil misin? <a href="register.html">Kayıt Ol</a>
      </div>
    </div>

    <a href="admin.html" class="admin-link">⚙ Platform Yönetimi</a>
  </div>

  <script type="module">
    import { Auth, Admin, getSession } from './js/db.js';

    if (getSession()) window.location.href = 'app.html';

    const ADMIN_USER = 'gosplanadmin';

    // "gosplanadmin" yazılırsa hane'yi gizle ve admin moduna geç
    function updateMode() {
      const u = document.getElementById('username').value.trim().toLowerCase();
      const isAdmin = u === ADMIN_USER;
      document.getElementById('tenantWrap').classList.toggle('hidden', isAdmin);
      document.getElementById('adminHint').classList.toggle('hidden', !isAdmin);
      const tenantInp = document.getElementById('tenant');
      if (isAdmin) {
        tenantInp.removeAttribute('required');
        tenantInp.value = '';
      }
    }
    document.getElementById('username').addEventListener('input', updateMode);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const tenant   = document.getElementById('tenant').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('errorMsg');
      const btn      = document.getElementById('loginBtn');

      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Doğrulanıyor...';

      // Admin akışı
      if (username.toLowerCase() === ADMIN_USER) {
        try {
          const ok = await Admin.verify(username, password);
          if (!ok) throw new Error('Hatalı admin bilgileri');
          sessionStorage.setItem('gosplan_admin_creds', btoa(JSON.stringify({u: username, p: password})));
          btn.textContent = '✓ Admin paneli açılıyor';
          setTimeout(() => window.location.href = 'admin.html', 300);
        } catch (e) {
          errEl.textContent = e.message;
          errEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = '☭  Gir';
        }
        return;
      }

      // Normal kullanıcı akışı
      if (!tenant) {
        errEl.textContent = 'Hane adı gerekli';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '☭  Gir';
        return;
      }

      try {
        await Auth.login(tenant, username, password);
        btn.textContent = '✓ Giriş başarılı';
        setTimeout(() => window.location.href = 'app.html', 300);
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '☭  Gir';
      }
    });
  </script>
</body>
</html>
