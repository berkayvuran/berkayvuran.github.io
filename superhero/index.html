<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superhero Program</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #f8fafc;
      --line: #334155;
      --accent: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
      --card: #1e293b;
      --card-2: #172033;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }
    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 16px;
    }
    .hidden { display: none !important; }
    .card {
      background: rgba(17,24,39,.95);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .col { flex: 1 1 280px; }
    .title { font-size: 28px; font-weight: 700; margin: 0 0 8px; }
    .subtitle { color: var(--muted); margin: 0 0 16px; line-height: 1.5; }
    .section-title { font-size: 18px; font-weight: 700; margin: 0 0 12px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 600;
    }
    input, select, textarea, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 12px;
      font-size: 14px;
    }
    textarea { min-height: 80px; resize: vertical; }
    button {
      background: var(--accent);
      color: #04130a;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }
    button.secondary {
      background: #334155;
      color: #fff;
    }
    button.warn {
      background: var(--warn);
      color: #1f1300;
    }
    button.danger {
      background: var(--danger);
      color: #fff;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #0b1220;
      border: 1px solid var(--line);
      color: #cbd5e1;
      font-size: 12px;
      margin: 0 6px 6px 0;
    }
    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .nav button {
      width: auto;
      padding: 10px 14px;
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .workout-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .exercise-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .exercise-name {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 18px;
    }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .success { color: #86efac; }
    .warning { color: #fcd34d; }
    .error { color: #fca5a5; }
    .divider {
      height: 1px;
      background: var(--line);
      margin: 12px 0;
    }
    .right { text-align: right; }
    .center { text-align: center; }
    .week-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }
    .week-tab {
      min-width: 90px;
      white-space: nowrap;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #0b1220;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
    }
    .week-tab.active {
      background: var(--accent);
      color: #04130a;
      border-color: transparent;
      font-weight: 700;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    .sticky-actions {
      position: sticky;
      bottom: 0;
      background: rgba(2,6,23,.92);
      backdrop-filter: blur(8px);
      padding: 10px 0 0;
      margin-top: 12px;
    }
    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .summary-box {
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
    }
    .summary-value {
      font-size: 24px;
      font-weight: 800;
      margin-top: 4px;
    }
    .inline-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9999;
    }
    .modal-card {
      width: min(1100px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #111827;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .modal-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .slot-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .slot-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .sticky-top {
      position: sticky;
      top: 0;
      background: rgba(17,24,39,.98);
      z-index: 2;
      padding-bottom: 12px;
    }
    @media (min-width: 900px) {
      .layout {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }
    }
    @media (max-width: 899px) {
      .top-actions button {
        flex: 1 1 auto;
      }
    }
  </style>
</head>

    const TEMPLATE_SLOTS = [
      { slotCode: 'A1', workoutCode: 'A', family: 'chest_press', targetScheme: '4x5+', exerciseFactor: 0.8, incrementKg: 2.5, warmupRuleType: 'main_4x5', progressionType: 'threshold_or_deload', evaluationSetIndex: 4, evaluationRepThreshold: 5, trackEstimated1RM: true },
      { slotCode: 'A2', workoutCode: 'A', family: 'squat', targetScheme: '4x5+', exerciseFactor: 0.7, incrementKg: 5, warmupRuleType: 'main_4x5', progressionType: 'threshold_or_deload', evaluationSetIndex: 4, evaluationRepThreshold: 5, trackEstimated1RM: true },
      { slotCode: 'A3', workoutCode: 'A', family: 'lateral_raise', targetScheme: '3x10-14', exerciseFactor: 0.6, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },

      { slotCode: 'A5', workoutCode: 'A', family: 'triceps', targetScheme: '3x10-14', exerciseFactor: 0.75, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },

      { slotCode: 'B1', workoutCode: 'B', family: 'shoulder_press', targetScheme: '4x5+', exerciseFactor: 0.7, incrementKg: 2.5, warmupRuleType: 'main_4x5', progressionType: 'threshold_or_deload', evaluationSetIndex: 4, evaluationRepThreshold: 5, trackEstimated1RM: true },
      { slotCode: 'B2', workoutCode: 'B', family: 'hinge', targetScheme: '3x8', exerciseFactor: 0.7, incrementKg: 5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 3, evaluationRepThreshold: 8, trackEstimated1RM: false },
      { slotCode: 'B3', workoutCode: 'B', family: 'chest_fly', targetScheme: '3x10-14', exerciseFactor: 0.6, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'B4', workoutCode: 'B', family: 'row', targetScheme: '3x10', exerciseFactor: 0.65, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 3, evaluationRepThreshold: 10, trackEstimated1RM: false },
      { slotCode: 'B5', workoutCode: 'B', family: 'biceps', targetScheme: '3x10-14', exerciseFactor: 0.75, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'B6', workoutCode: 'B', family: 'abs', targetScheme: '3 sets', exerciseFactor: null, incrementKg: null, warmupRuleType: 'bodyweight_passive', progressionType: 'bodyweight_passive', trackEstimated1RM: false },

      { slotCode: 'C1', workoutCode: 'C', family: 'chest_press', targetScheme: '3x10', exerciseFactor: 0.7, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 3, evaluationRepThreshold: 10, trackEstimated1RM: false },
      { slotCode: 'C2', workoutCode: 'C', family: 'leg_accessory', targetScheme: '4x10', exerciseFactor: 0.6, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 4, evaluationRepThreshold: 10, trackEstimated1RM: false },
      { slotCode: 'C3', workoutCode: 'C', family: 'vertical_pull', targetScheme: '3x8-12', exerciseFactor: 0.65, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'total_reps_threshold', totalRepThreshold: 36, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'C4', workoutCode: 'C', family: 'row', targetScheme: '3x10', exerciseFactor: 0.65, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 3, evaluationRepThreshold: 10, trackEstimated1RM: false },
      { slotCode: 'C5', workoutCode: 'C', family: 'triceps', targetScheme: '3x10-14', exerciseFactor: 0.75, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'C6', workoutCode: 'C', family: 'biceps', targetScheme: '3x10-14', exerciseFactor: 0.75, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },

      { slotCode: 'D1_1', workoutCode: 'D1', family: 'squat', targetScheme: '3x5 light', exerciseFactor: null, incrementKg: null, warmupRuleType: 'main_4x5', progressionType: 'deload_only', trackEstimated1RM: false, fromSlot: 'A2' },
      { slotCode: 'D1_2', workoutCode: 'D1', family: 'chest_press', targetScheme: '3x5 light', exerciseFactor: null, incrementKg: null, warmupRuleType: 'main_4x5', progressionType: 'deload_only', trackEstimated1RM: false, fromSlot: 'A1' },
      { slotCode: 'D1_3', workoutCode: 'D1', family: 'row', targetScheme: '3x8 light', exerciseFactor: null, incrementKg: null, warmupRuleType: 'secondary_3set', progressionType: 'deload_only', trackEstimated1RM: false, fromSlot: 'B4' },
      { slotCode: 'D2_1', workoutCode: 'D2', family: 'shoulder_press', targetScheme: '3x5 light', exerciseFactor: null, incrementKg: null, warmupRuleType: 'main_4x5', progressionType: 'deload_only', trackEstimated1RM: false, fromSlot: 'B1' },
      { slotCode: 'D2_2', workoutCode: 'D2', family: 'hinge', targetScheme: '3x8 light', exerciseFactor: null, incrementKg: null, warmupRuleType: 'secondary_3set', progressionType: 'deload_only', trackEstimated1RM: false, fromSlot: 'B2' },
      { slotCode: 'D2_3', workoutCode: 'D2', family: 'vertical_pull', targetScheme: '3 sets easy', exerciseFactor: null, incrementKg: null, warmupRuleType: 'none', progressionType: 'deload_only', trackEstimated1RM: false, fromSlot: 'A4' }
    ];

    function roundToStep(value, step = 2.5) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return null;
      return Math.round(value / step) * step;
    }

    function roundToHalf(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return null;
      return Math.round(value * 2) / 2;
    }

    function estimate1RM(weight, reps) {
      if (!weight || !reps) return null;
      return (Number(weight) * Number(reps) * 0.0333) + Number(weight);
    }

    function initialWorkingWeight(slot, inputWeight, inputReps) {
      if (!slot.exerciseFactor) return null;
      const orm = estimate1RM(inputWeight, inputReps);
      if (!orm) return null;
      return roundToStep(orm * 0.85 * slot.exerciseFactor, 2.5);
    }

    function calculateWarmups(workingWeight, warmupRuleType) {
      if (!workingWeight || warmupRuleType === 'none') return [];
      if (warmupRuleType === 'main_4x5') {
        return [0.6, 0.7, 0.85].map(r => roundToStep(workingWeight * r, 2.5));
      }
      if (warmupRuleType === 'secondary_3set') {
        return [0.6, 0.85].map(r => roundToStep(workingWeight * r, 2.5));
      }
      return [];
    }

    function setsCountFromScheme(scheme) {
      if (!scheme) return 3;
      if (scheme.startsWith('4x')) return 4;
      if (scheme.startsWith('3x')) return 3;
      return 3;
    }

    function weekEstimated1RM(workingWeight, repsArray) {
      const clean = repsArray.map(Number).filter(n => Number.isFinite(n) && n > 0);
      if (!workingWeight || !clean.length) return null;
      const maxReps = Math.max(...clean);
      return roundToHalf((Number(workingWeight) * maxReps * 0.0333) + Number(workingWeight));
    }

    function decideNextWeight(slot, currentWeight, repsArray) {
      if (slot.progressionType === 'bodyweight_passive' || slot.progressionType === 'deload_only') {
        return currentWeight;
      }

      const reps = repsArray.map(v => Number(v || 0));

      if (slot.progressionType === 'threshold_or_deload') {
        const idx = (slot.evaluationSetIndex || 1) - 1;
        const threshold = slot.evaluationRepThreshold || 0;
        if ((reps[idx] || 0) >= threshold) {
          return roundToStep(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5);
        }
        return roundToStep(Number(currentWeight) * 0.9, 2.5);
      }

      if (slot.progressionType === 'total_reps_threshold') {
        const countedSets = slot.countedSets || 3;
        const total = reps.slice(0, countedSets).reduce((a, b) => a + (Number(b) || 0), 0);
        if (total >= Number(slot.totalRepThreshold || 0)) {
          return roundToStep(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5);
        }
        return Number(currentWeight);
      }

      return currentWeight;
    }

    function byWorkout(code) {
      return TEMPLATE_SLOTS.filter(s => s.workoutCode === code);
    }

    function getBaseSlots() {
      return TEMPLATE_SLOTS.filter(s => ['A', 'B', 'C'].includes(s.workoutCode));
    }

    function getSlotSelection(program, slotCode) {
      return program?.setup_data?.selections?.find(s => s.slotCode === slotCode);
    }

    function getLog(username, weekNo, workoutCode, slotCode) {
      return state.logs.find(
        l => l.username === username && l.week_no === weekNo && l.workout_code === workoutCode && l.slot_code === slotCode
      );
    }

    function workoutDone(username, weekNo, workoutCode) {
      const slots = byWorkout(workoutCode);
      return slots.every(s => getLog(username, weekNo, workoutCode, s.slotCode));
    }

    function currentOpenWeek(program) {
      for (let w = 1; w <= 12; w++) {
        if (!['A', 'B', 'C'].every(code => workoutDone(program.username, w, code))) return w;
      }
      if (!['D1', 'D2'].every(code => workoutDone(program.username, 13, code))) return 13;
      return 13;
    }

    function previousWeekWeight(program, slotCode, weekNo) {
      const selection = getSlotSelection(program, slotCode);
      if (!selection) return null;

      let current = selection.initialWorkingWeight ?? null;

      for (let w = 1; w < weekNo; w++) {
        const slot = TEMPLATE_SLOTS.find(s => s.slotCode === slotCode);
        if (!slot) break;
        const log = getLog(program.username, w, slot.workoutCode, slotCode);
        if (!log) break;
        const reps = Array.isArray(log.reps) ? log.reps : [];
        current = decideNextWeight(slot, current, reps);
      }

      return current;
    }

    function computedWeight(program, slotCode, weekNo) {
      if (weekNo === 13) {
        const deloadSlot = TEMPLATE_SLOTS.find(s => s.slotCode === slotCode);
        const sourceSlotCode = deloadSlot?.fromSlot;
        const sourceWeight = previousWeekWeight(program, sourceSlotCode, 13);
        if (sourceWeight == null) return null;
        return roundToStep(sourceWeight * 0.7, 2.5);
      }
      return previousWeekWeight(program, slotCode, weekNo);
    }

    function safeJsonReps(repsArray) {
      return repsArray.map(v => Number(v || 0)).filter(v => Number.isFinite(v));
    }

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setLoading(v) {
      state.loading = v;
      render();
    }

    function getWorkoutDisplayName(code) {
      if (code === 'D1') return 'Dinlenme 1';
      if (code === 'D2') return 'Dinlenme 2';
      return `Workout ${code}`;
    }

    function getExerciseAlternatives(family) {
      return EXERCISE_OPTIONS[family] || [];
    }

    function getSlotOrderInWorkout(slotCode) {
      const slot = TEMPLATE_SLOTS.find(s => s.slotCode === slotCode);
      if (!slot) return '';
      const list = byWorkout(slot.workoutCode);
      const index = list.findIndex(s => s.slotCode === slotCode);
      return index >= 0 ? index + 1 : '';
    }

   function buildProgramSelectionsFromForm(formData) {
  const baseSlots = getBaseSlots();

  const selections = baseSlots.map(slot => {
    const currentSelection = state.program?.setup_data?.selections?.find(s => s.slotCode === slot.slotCode) || null;

    const exerciseName =
      String(formData.get(`${slot.slotCode}_exercise`) || currentSelection?.selectedExercise || '').trim();

    const inputWeightRaw = formData.get(`${slot.slotCode}_input_weight`);
    const inputRepsRaw = formData.get(`${slot.slotCode}_input_reps`);
    const initialRaw = formData.get(`${slot.slotCode}_initial`);
    const isBodyweight = slot.progressionType === 'bodyweight_passive';

    const inputWeight =
      inputWeightRaw !== null && inputWeightRaw !== ''
        ? Number(inputWeightRaw)
        : (currentSelection?.inputWeight ?? null);

    const inputReps =
      inputRepsRaw !== null && inputRepsRaw !== ''
        ? Number(inputRepsRaw)
        : (currentSelection?.inputReps ?? null);

    let initial =
      initialRaw !== null && initialRaw !== ''
        ? Number(initialRaw)
        : (currentSelection?.initialWorkingWeight ?? null);

    if (!exerciseName) {
      throw new Error(`${getWorkoutDisplayName(slot.workoutCode)} içindeki bir egzersiz seçilmemiş.`);
    }

    if (!isBodyweight && initial == null && inputWeight && inputReps) {
      initial = initialWorkingWeight(slot, inputWeight, inputReps);
    }

    return {
      slotCode: slot.slotCode,
      workoutCode: slot.workoutCode,
      family: slot.family,
      selectedExercise: exerciseName,
      inputWeight: isBodyweight ? null : inputWeight,
      inputReps: isBodyweight ? null : inputReps,
      initialWorkingWeight: isBodyweight ? null : initial
    };
  });

  const deloadSelections = TEMPLATE_SLOTS
    .filter(s => ['D1', 'D2'].includes(s.workoutCode))
    .map(slot => {
      const sourceSel = selections.find(x => x.slotCode === slot.fromSlot);
      return {
        slotCode: slot.slotCode,
        workoutCode: slot.workoutCode,
        family: slot.family,
        selectedExercise: sourceSel?.selectedExercise || (EXERCISE_OPTIONS[slot.family]?.[0] || slot.family),
        inputWeight: null,
        inputReps: null,
        initialWorkingWeight: null
      };
    });

  return [...selections, ...deloadSelections];
}

    async function saveSelections(updatedSelections) {
      if (!state.username) return;

      setLoading(true);

      const payload = {
        username: state.username,
        status: 'active',
        setup_data: {
          createdAt: state.program?.setup_data?.createdAt || new Date().toISOString(),
          selections: updatedSelections
        }
      };

      const { error } = await supabase
        .from('programs')
        .upsert(payload, { onConflict: 'username' });

      if (error) {
        setLoading(false);
        throw error;
      }

      await loadProgramAndLogs();
    }

    async function loadProgramAndLogs() {
      if (!state.username) return;
      setLoading(true);

      const { data: program, error: programError } = await supabase
        .from('programs')
        .select('*')
        .eq('username', state.username)
        .maybeSingle();

      if (programError) {
        alert('Program yüklenemedi: ' + programError.message);
        setLoading(false);
        return;
      }

      state.program = program || null;

      const { data: logs, error: logsError } = await supabase
        .from('workout_logs')
        .select('*')
        .eq('username', state.username)
        .order('week_no', { ascending: true });

      if (logsError) {
        alert('Loglar yüklenemedi: ' + logsError.message);
        setLoading(false);
        return;
      }

      state.logs = logs || [];
      if (state.program) {
        state.currentWeek = currentOpenWeek({ ...state.program, username: state.username });
        state.currentWorkout = state.currentWeek === 13 ? 'D1' : 'A';
      }
      setLoading(false);
    }

    function render() {
      if (!state.gatePassed) return renderGate();
      if (!state.username) return renderIdentity();
      if (state.loading) return renderLoading();
      if (!state.program) return renderSetup();
      return renderMain();
    }

    function renderLoading() {
      app.innerHTML = `
        <div class="card center">
          <h1 class="title">Yükleniyor...</h1>
          <p class="subtitle">Supabase verileri getiriliyor.</p>
        </div>
      `;
    }

    function renderGate() {
      app.innerHTML = `
        <div class="card" style="max-width:520px;margin:40px auto;">
          <h1 class="title">Superhero</h1>
          <p class="subtitle">Uygulamaya girmek için master password gir.</p>
          <form id="gateForm">
            <label>Master Password</label>
            <input id="gatePassword" type="password" placeholder="password" />
            <div style="height:12px"></div>
            <button type="submit">Devam Et</button>
          </form>
        </div>
      `;
      document.getElementById('gateForm').onsubmit = (e) => {
        e.preventDefault();
        const value = document.getElementById('gatePassword').value.trim();
        if (value === MASTER_PASSWORD) {
          localStorage.setItem('superhero_gate_passed', 'true');
          state.gatePassed = true;
          render();
        } else {
          alert('Master password yanlış.');
        }
      };
    }

    function renderIdentity() {
      app.innerHTML = `
        <div class="card" style="max-width:520px;margin:40px auto;">
          <h1 class="title">Kullanıcı Seç</h1>
          <p class="subtitle">Yalnızca <b>nakama</b> veya <b>boksimoron</b> kabul edilir.</p>
          <form id="identityForm">
            <label>Kullanıcı</label>
            <select id="usernameSelect">
              <option value="">Seç...</option>
              <option value="nakama">nakama</option>
              <option value="boksimoron">boksimoron</option>
            </select>
            <div style="height:12px"></div>
            <button type="submit">Uygulamaya Gir</button>
          </form>
          <div style="height:12px"></div>
          <button class="secondary" id="backGate">Başa Dön</button>
        </div>
      `;
      document.getElementById('identityForm').onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById('usernameSelect').value.trim().toLowerCase();
        if (!ALLOWED_USERS.includes(username)) {
          alert('Geçersiz kullanıcı.');
          return;
        }
        localStorage.setItem('superhero_username', username);
        state.username = username;
        await loadProgramAndLogs();
      };
      document.getElementById('backGate').onclick = () => {
        localStorage.removeItem('superhero_gate_passed');
        localStorage.removeItem('superhero_username');
        state.gatePassed = false;
        state.username = '';
        render();
      };
    }

    function renderSetup() {
      const baseSlots = getBaseSlots();

      app.innerHTML = `
        <div class="card">
          <div class="row">
            <div class="col">
              <h1 class="title">Program Kurulumu</h1>
              <p class="subtitle">
                ${escapeHtml(state.username)} için başlangıç hareketlerini ve başlangıç çalışma kilolarını gir.
                İstersen kilo + tekrar girip otomatik hesaplatabilir, istersen başlangıç kilosunu direkt yazabilirsin.
              </p>
            </div>
            <div class="col right">
              <button class="secondary" id="logoutBtn">Çıkış</button>
            </div>
          </div>
        </div>

        <form id="setupForm" class="card">
          <div class="grid">
            ${baseSlots.map(slot => {
              const alternatives = getExerciseAlternatives(slot.family);
              const isBodyweight = slot.progressionType === 'bodyweight_passive';
              return `
                <div class="slot-card">
                  <div class="slot-title">${getWorkoutDisplayName(slot.workoutCode)} · Hareket ${getSlotOrderInWorkout(slot.slotCode)}</div>
                  <div class="pill">Hedef: ${escapeHtml(slot.targetScheme)}</div>

                  <label style="margin-top:10px;">Egzersiz</label>
                  <select name="${slot.slotCode}_exercise">
                    ${alternatives.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}
                  </select>

                  <div class="hint" style="margin-top:8px;">
                    Alternatifler: ${alternatives.map(escapeHtml).join(' / ')}
                  </div>

                  ${isBodyweight ? `
                    <div class="pill" style="margin-top:10px;">Bodyweight hareket</div>
                  ` : `
                    <label style="margin-top:10px;">Yaptığın kilo (opsiyonel)</label>
                    <input type="number" step="0.5" min="0" name="${slot.slotCode}_input_weight" placeholder="örn. 50" />

                    <label style="margin-top:10px;">Yaptığın tekrar (opsiyonel)</label>
                    <input type="number" step="1" min="1" name="${slot.slotCode}_input_reps" placeholder="örn. 5" />

                    <label style="margin-top:10px;">Başlangıç çalışma kilosu</label>
                    <input type="number" step="0.5" min="0" name="${slot.slotCode}_initial" placeholder="boşsa otomatik hesaplanır" />
                  `}
                </div>
              `;
            }).join('')}
          </div>

          <div class="sticky-actions">
            <button type="submit">Programı Oluştur</button>
          </div>
        </form>
      `;

      document.getElementById('logoutBtn').onclick = handleLogout;

      document.getElementById('setupForm').onsubmit = async (e) => {
        e.preventDefault();

        try {
          const form = new FormData(e.target);
          const selections = buildProgramSelectionsFromForm(form);
          await saveSelections(selections);
        } catch (err) {
          alert(err.message || 'Program oluşturulamadı.');
          setLoading(false);
        }
      };
    }

    function renderMain() {
      const program = { ...state.program, username: state.username };
      const workoutCodes = state.currentWeek === 13 ? ['D1', 'D2'] : ['A', 'B', 'C'];

      app.innerHTML = `
        <div class="layout">
          <div>
            <div class="card">
              <div class="section-title">Kullanıcı</div>
              <div class="pill">${escapeHtml(state.username)}</div>

              <div class="divider"></div>

              <div class="section-title">Durum</div>
              <div class="pill">Aktif Hafta: ${state.currentWeek === 13 ? 'Dinlenme' : state.currentWeek}</div>
              <div class="pill">Antrenman: ${escapeHtml(getWorkoutDisplayName(state.currentWorkout))}</div>

              <div class="divider"></div>

              <div class="top-actions">
                <button class="secondary" id="openSettingsBtn">Program Ayarları</button>
                <button class="secondary" id="goReset">Programı Sıfırla</button>
                <button class="secondary" id="logoutBtn">Çıkış</button>
              </div>
            </div>

            <div class="card">
              <div class="section-title">Kısa Bilgi</div>
              <div class="summary-box">
                <div class="small muted">Program Yapısı</div>
                <div class="summary-value">12 + 1</div>
                <div class="hint">12 hafta antrenman + 1 dinlenme haftası</div>
              </div>
              <div style="height:10px;"></div>
              <div class="summary-box">
                <div class="small muted">Haftalık Rutin</div>
                <div class="summary-value">${state.currentWeek === 13 ? '2' : '3'}</div>
                <div class="hint">${state.currentWeek === 13 ? 'Dinlenme haftasında 2 antrenman' : 'Her hafta 3 antrenman: A / B / C'}</div>
              </div>
            </div>
          </div>

          <div>
            <div class="card">
              <h1 class="title">Superhero Program</h1>
<p class="subtitle">
  Haftanı seç ve antrenmanını kaydet.
</p>

              <div class="week-tabs">
                ${Array.from({ length: 13 }).map((_, i) => {
                  const week = i + 1;
                  const label = week === 13 ? 'Dinlenme' : `Hafta ${week}`;
                  return `<div class="week-tab ${state.currentWeek === week ? 'active' : ''}" data-week="${week}">${label}</div>`;
                }).join('')}
              </div>

              <div class="nav" id="workoutNav">
                ${workoutCodes.map(code => `
                  <button class="${state.currentWorkout === code ? '' : 'secondary'}" data-workout="${code}">
                    ${escapeHtml(getWorkoutDisplayName(code))}
                  </button>
                `).join('')}
              </div>

              <div id="workoutArea"></div>
            </div>
          </div>
        </div>

        ${state.settingsOpen ? renderSettingsModal(program) : ''}
      `;

      document.getElementById('logoutBtn').onclick = handleLogout;
      document.getElementById('goReset').onclick = handleResetProgram;
      document.getElementById('openSettingsBtn').onclick = () => {
        state.settingsOpen = true;
        renderMain();
      };

      document.querySelectorAll('.week-tab').forEach(el => {
        el.onclick = () => {
          state.currentWeek = Number(el.dataset.week);
          state.currentWorkout = state.currentWeek === 13 ? 'D1' : 'A';
          renderMain();
        };
      });

      document.querySelectorAll('#workoutNav button').forEach(btn => {
        btn.onclick = () => {
          state.currentWorkout = btn.dataset.workout;
          renderWorkoutArea();
        };
      });

      renderWorkoutArea();
      bindSettingsModal(program);

      function renderWorkoutArea() {
        const slots = byWorkout(state.currentWorkout);
        const area = document.getElementById('workoutArea');

        area.innerHTML = `
          <div class="divider"></div>
          <h2 class="section-title">${escapeHtml(getWorkoutDisplayName(state.currentWorkout))}</h2>
          <form id="workoutForm">
            <div class="workout-grid">
              ${slots.map(slot => {
                const selection = getSlotSelection(program, slot.slotCode);
                const exerciseName = selection?.selectedExercise || (EXERCISE_OPTIONS[slot.family]?.[0] || slot.family);
                const startWeight = selection?.initialWorkingWeight ?? null;
                const weight = computedWeight(program, slot.slotCode, state.currentWeek);
                const warmups = calculateWarmups(weight, slot.warmupRuleType);
                const existingLog = getLog(state.username, state.currentWeek, state.currentWorkout, slot.slotCode);
                const reps = Array.isArray(existingLog?.reps) ? existingLog.reps : [];
                const setCount = setsCountFromScheme(slot.targetScheme);
                const alternatives = getExerciseAlternatives(slot.family);

                return `
                  <div class="exercise-card">
                    <div class="exercise-name">${escapeHtml(exerciseName)}</div>

                    <div class="meta-row">
                      <div class="pill">Hedef: ${escapeHtml(slot.targetScheme)}</div>
                      <div class="pill">Bu hafta: ${weight ?? 'BW'}</div>
                      <div class="pill">Başlangıç: ${startWeight ?? 'BW'}</div>
                    </div>

                    <div class="hint">
                      Alternatifler: ${alternatives.map(escapeHtml).join(' / ')}
                    </div>

                    ${warmups.length ? `
                      <div class="divider"></div>
                      <div class="small muted">Isınma: ${warmups.join(' / ')} kg</div>
                    ` : ''}

                    <div class="divider"></div>

                    ${Array.from({ length: setCount }).map((_, i) => `
                      <label>Set ${i + 1} tekrar</label>
                      <input type="number" min="0" step="1" name="${slot.slotCode}_set_${i + 1}" value="${reps[i] ?? ''}" />
                    `).join('')}

                    <label style="margin-top:10px;">Not</label>
                    <textarea name="${slot.slotCode}_notes">${escapeHtml(existingLog?.notes || '')}</textarea>

                    ${slot.trackEstimated1RM ? `
                      <div class="divider"></div>
                      <div class="small success">
                        Tahmini 1RM: ${weekEstimated1RM(weight, reps) ?? '-'}
                      </div>
                    ` : ''}
                  </div>
                `;
              }).join('')}
            </div>

            <div class="sticky-actions">
              <button type="submit">Workout'u Kaydet</button>
            </div>
          </form>
        `;

        document.getElementById('workoutForm').onsubmit = async (e) => {
          e.preventDefault();
          const form = new FormData(e.target);

          try {
            setLoading(true);

            const rows = slots.map(slot => {
              const setCount = setsCountFromScheme(slot.targetScheme);
              const reps = [];
              for (let i = 1; i <= setCount; i++) {
                reps.push(Number(form.get(`${slot.slotCode}_set_${i}`) || 0));
              }

              return {
                username: state.username,
                week_no: state.currentWeek,
                workout_code: state.currentWorkout,
                slot_code: slot.slotCode,
                reps: safeJsonReps(reps),
                notes: form.get(`${slot.slotCode}_notes`) || '',
                completed_at: new Date().toISOString()
              };
            });

            const { error } = await supabase
              .from('workout_logs')
              .upsert(rows, { onConflict: 'username,week_no,workout_code,slot_code' });

            if (error) throw error;

            await loadProgramAndLogs();

            const innerCodes = state.currentWeek === 13 ? ['D1', 'D2'] : ['A', 'B', 'C'];
            const currentIndex = innerCodes.indexOf(state.currentWorkout);

            if (currentIndex < innerCodes.length - 1) {
              state.currentWorkout = innerCodes[currentIndex + 1];
            } else if (state.currentWeek < 13) {
              state.currentWeek = Math.min(13, state.currentWeek + 1);
              state.currentWorkout = state.currentWeek === 13 ? 'D1' : 'A';
            }

            renderMain();
          } catch (err) {
            alert(err.message || 'Workout kaydedilemedi.');
            setLoading(false);
          }
        };
      }
    }

    function renderSettingsModal(program) {
      const baseSlots = getBaseSlots();

      return `
        <div class="modal-backdrop" id="settingsModalBackdrop">
          <div class="modal-card">
            <div class="sticky-top">
              <div class="row">
                <div class="col">
                  <h2 class="title" style="font-size:24px;">Program Ayarları</h2>
                  <p class="subtitle" style="margin-bottom:10px;">
                    Başlangıç egzersizlerini, alternatifleri, input kilo/tekrarlarını ve başlangıç çalışma kilolarını buradan her zaman düzenleyebilirsin.
                  </p>
                </div>
                <div class="col right">
                  <button class="secondary" id="closeSettingsBtn" style="max-width:180px; margin-left:auto;">Kapat</button>
                </div>
              </div>
            </div>

            <form id="settingsForm">
              <div class="modal-grid">
                ${baseSlots.map(slot => {
                  const selection = getSlotSelection(program, slot.slotCode);
                  const alternatives = getExerciseAlternatives(slot.family);
                  const isBodyweight = slot.progressionType === 'bodyweight_passive';

                  return `
                    <div class="slot-card">
                      <div class="slot-title">${getWorkoutDisplayName(slot.workoutCode)} · Hareket ${getSlotOrderInWorkout(slot.slotCode)}</div>
                      <div class="pill">Hedef: ${escapeHtml(slot.targetScheme)}</div>

                      <label style="margin-top:10px;">Egzersiz</label>
                      <select name="${slot.slotCode}_exercise">
                        ${alternatives.map(o => `
                          <option value="${escapeHtml(o)}" ${selection?.selectedExercise === o ? 'selected' : ''}>
                            ${escapeHtml(o)}
                          </option>
                        `).join('')}
                      </select>

                      <div class="hint" style="margin-top:8px;">
                        Alternatifler: ${alternatives.map(escapeHtml).join(' / ')}
                      </div>

                      ${isBodyweight ? `
                        <div class="pill" style="margin-top:10px;">Bodyweight hareket</div>
                      ` : `
                        <label style="margin-top:10px;">Yaptığın kilo</label>
                        <input
                          type="number"
                          step="0.5"
                          min="0"
                          name="${slot.slotCode}_input_weight"
                          value="${selection?.inputWeight ?? ''}"
                        />

                        <label style="margin-top:10px;">Yaptığın tekrar</label>
                        <input
                          type="number"
                          step="1"
                          min="1"
                          name="${slot.slotCode}_input_reps"
                          value="${selection?.inputReps ?? ''}"
                        />

                        <label style="margin-top:10px;">Başlangıç çalışma kilosu</label>
                        <input
                          type="number"
                          step="0.5"
                          min="0"
                          name="${slot.slotCode}_initial"
                          value="${selection?.initialWorkingWeight ?? ''}"
                        />
                      `}
                    </div>
                  `;
                }).join('')}
              </div>

              <div class="sticky-actions">
                <div class="row">
                  <div class="col">
                    <button type="submit">Ayarları Kaydet</button>
                  </div>
                  <div class="col">
                    <button type="button" class="secondary" id="closeSettingsBtnBottom">Kapat</button>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    function bindSettingsModal(program) {
      const closeTop = document.getElementById('closeSettingsBtn');
      const closeBottom = document.getElementById('closeSettingsBtnBottom');
      const backdrop = document.getElementById('settingsModalBackdrop');
      const form = document.getElementById('settingsForm');

      if (!backdrop) return;

      const closeModal = () => {
        state.settingsOpen = false;
        renderMain();
      };

      if (closeTop) closeTop.onclick = closeModal;
      if (closeBottom) closeBottom.onclick = closeModal;

      backdrop.onclick = (e) => {
        if (e.target === backdrop) closeModal;
      };

      if (form) {
        form.onsubmit = async (e) => {
          e.preventDefault();
          try {
            const data = new FormData(form);
            const selections = buildProgramSelectionsFromForm(data);
            await saveSelections(selections);
            state.settingsOpen = false;
            renderMain();
          } catch (err) {
            alert(err.message || 'Program ayarları kaydedilemedi.');
            setLoading(false);
          }
        };
      }
    }

    async function handleResetProgram() {
      const ok = confirm('Bu kullanıcı için program ve tüm loglar silinsin mi?');
      if (!ok) return;

      try {
        setLoading(true);

        const { error: logsErr } = await supabase
          .from('workout_logs')
          .delete()
          .eq('username', state.username);

        if (logsErr) throw logsErr;

        const { error: programErr } = await supabase
          .from('programs')
          .delete()
          .eq('username', state.username);

        if (programErr) throw programErr;

        state.program = null;
        state.logs = [];
        state.settingsOpen = false;
        setLoading(false);
        render();
      } catch (err) {
        alert(err.message || 'Sıfırlama başarısız.');
        setLoading(false);
      }
    }

    function handleLogout() {
      localStorage.removeItem('superhero_username');
      state.username = '';
      state.program = null;
      state.logs = [];
      state.settingsOpen = false;
      render();
    }

    async function init() {
      if (state.gatePassed && state.username) {
        await loadProgramAndLogs();
      } else {
        render();
      }
    }

    init();
  </script>
</body>
</html>
