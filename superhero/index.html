<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Superhero Program</title>
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg:#F2F2F7;--bg-e:#FFFFFF;--label:#000;--label-2:#3C3C43;--label-3:rgba(60,60,67,.6);
      --sep:rgba(60,60,67,.18);--sep-o:#C6C6C8;--fill:rgba(120,120,128,.2);--fill-2:rgba(120,120,128,.16);
      --blue:#007AFF;--blue-bg:rgba(0,122,255,.1);--green:#34C759;--green-bg:rgba(52,199,89,.1);
      --orange:#FF9500;--orange-bg:rgba(255,149,0,.1);--red:#FF3B30;--red-bg:rgba(255,59,48,.1);
      --purple:#AF52DE;--purple-bg:rgba(175,82,222,.1);--yellow:#FFD60A;
      --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
      --tab-h:82px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{height:100%;overflow-x:hidden}
    body{min-height:100%;font-family:var(--font);background:var(--bg);color:var(--label);font-size:15px;line-height:1.47;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    .hidden{display:none!important}
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}

    /* ─── LOADING ─── */
    #loading-overlay{position:fixed;inset:0;background:var(--bg-e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
    #loading-overlay p{color:var(--label-3);font-size:14px}
    .spin{width:28px;height:28px;border:2.5px solid var(--sep);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ─── TOAST ─── */
    #toast{position:fixed;bottom:calc(var(--tab-h) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.82);color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:8888;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ─── LOGIN ─── */
    #screen-login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;background:var(--bg)}
    .login-card{background:var(--bg-e);border-radius:20px;padding:32px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
    .login-icon{width:72px;height:72px;background:linear-gradient(135deg,#007AFF,#5856D6);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:34px;box-shadow:0 8px 24px rgba(0,122,255,.35)}
    .login-card h1{font-size:24px;font-weight:700;text-align:center;letter-spacing:-.5px;margin-bottom:6px}
    .login-card>p{color:var(--label-3);text-align:center;font-size:14px;margin-bottom:28px}
    .fg{margin-bottom:16px}
    .fg label{display:block;font-size:12px;font-weight:600;color:var(--label-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
    .fi{width:100%;padding:13px 14px;border:1.5px solid var(--sep);border-radius:12px;font-size:16px;font-family:var(--font);color:var(--label);background:var(--bg-e);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
    .fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.15)}
    .fi::placeholder{color:var(--label-3)}
    .fi.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(255,59,48,.12)}
    .err-msg{font-size:13px;color:var(--red);text-align:center;margin-top:10px;min-height:20px}

    /* ─── BUTTONS ─── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:12px;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;text-decoration:none;white-space:nowrap;line-height:1;-webkit-user-select:none;user-select:none}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--blue);color:white}
    .btn-primary:hover{background:#0066DD}
    .btn-secondary{background:var(--fill);color:var(--label)}
    .btn-secondary:hover{background:var(--fill-2)}
    .btn-green{background:var(--green);color:white}
    .btn-ghost{background:transparent;color:var(--blue);padding:8px 12px}
    .btn-ghost:hover{background:var(--blue-bg)}
    .btn-full{width:100%}
    .btn-sm{padding:8px 14px;font-size:13px;border-radius:10px}

    /* ─── APP HEADER ─── */
    .app-header{background:rgba(242,242,247,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--sep);position:sticky;top:0;z-index:200}
    .app-header .inner{max-width:680px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;gap:8px}
    .app-header h1{font-size:17px;font-weight:600;letter-spacing:-.3px;flex:1;text-align:center}
    .hdr-btn{background:none;border:none;color:var(--blue);font-size:15px;font-family:var(--font);cursor:pointer;padding:6px 10px;border-radius:8px;transition:background .15s;white-space:nowrap;font-weight:500}
    .hdr-btn:hover{background:var(--blue-bg)}
    .hdr-btn.danger{color:var(--red)}
    .hdr-btn.danger:hover{background:var(--red-bg)}

    /* ─── LAYOUT ─── */
    .wrap{max-width:680px;margin:0 auto;padding:0 16px}
    .content{padding:16px 0 calc(var(--tab-h) + 16px)}

    /* ─── BOTTOM TAB BAR ─── */
    .tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(249,249,249,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep);display:flex;align-items:stretch;z-index:300;height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom)}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;cursor:pointer;font-family:var(--font);color:var(--label-3);transition:color .2s;padding:8px 4px;font-size:10px;font-weight:500;letter-spacing:.2px;-webkit-user-select:none;user-select:none}
    .tab-btn svg{width:24px;height:24px;fill:currentColor;transition:all .2s}
    .tab-btn.active{color:var(--blue)}
    .tab-btn.active svg{transform:scale(1.1)}

    /* ─── CARDS ─── */
    .card{background:var(--bg-e);border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .card+.card{margin-top:8px}
    .card-hdr{padding:14px 16px;border-bottom:1px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
    .card-hdr h3{font-size:12px;font-weight:600;color:var(--label-3);text-transform:uppercase;letter-spacing:.5px}
    .card-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
    .card-row+.card-row{border-top:1px solid var(--sep)}
    .card-row-val{font-size:15px;color:var(--label-3)}

    /* ─── SECTION TITLE ─── */
    .section-title{font-size:20px;font-weight:700;letter-spacing:-.4px;padding:8px 0 10px}
    .section-sub{font-size:13px;color:var(--label-3);margin-top:-6px;margin-bottom:12px}

    /* ─── WEEK GRID ─── */
    .week-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
    @media(min-width:480px){.week-grid{grid-template-columns:repeat(4,1fr)}}
    @media(min-width:680px){.week-grid{grid-template-columns:repeat(6,1fr)}}
    .week-cell{background:var(--bg-e);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.06);border:2px solid transparent;position:relative}
    .week-cell:active{transform:scale(.96)}
    .week-cell.active-week{border-color:var(--blue);background:var(--blue-bg)}
    .week-cell.done{border-color:var(--green);background:var(--green-bg)}
    .week-cell.rest{border-color:var(--orange);background:var(--orange-bg)}
    .week-cell-num{font-size:22px;font-weight:700;letter-spacing:-.5px;display:block}
    .week-cell-lbl{font-size:10px;color:var(--label-3);font-weight:500;display:block;margin-top:2px}
    .week-cell.active-week .week-cell-num{color:var(--blue)}
    .week-cell.done .week-cell-num{color:var(--green)}
    .week-cell.rest .week-cell-num{color:var(--orange)}

    /* ─── HOME WEEK CARD ─── */
    .hero-card{background:linear-gradient(135deg,#007AFF 0%,#5856D6 100%);border-radius:20px;padding:22px;color:white;position:relative;overflow:hidden;margin-bottom:14px}
    .hero-card::before{content:'';position:absolute;top:-50px;right:-30px;width:160px;height:160px;background:rgba(255,255,255,.08);border-radius:50%}
    .hero-card::after{content:'';position:absolute;bottom:-40px;left:20px;width:120px;height:120px;background:rgba(255,255,255,.05);border-radius:50%}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:14px;backdrop-filter:blur(4px)}
    .hero-title{font-size:26px;font-weight:700;letter-spacing:-.6px;position:relative;z-index:1;margin-bottom:4px}
    .hero-sub{font-size:14px;opacity:.8;position:relative;z-index:1;margin-bottom:18px}
    .hero-progress-bar{background:rgba(255,255,255,.25);border-radius:6px;height:6px;margin-bottom:18px;position:relative;z-index:1}
    .hero-progress-fill{background:white;border-radius:6px;height:6px;transition:width .5s ease}
    .hero-progress-label{font-size:12px;opacity:.8;margin-top:4px;position:relative;z-index:1}
    .workout-cards{display:flex;gap:10px;position:relative;z-index:1;margin-top:16px}
    .wo-card{flex:1;background:rgba(255,255,255,.18);border-radius:14px;padding:12px;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,.15)}
    .wo-card:hover{background:rgba(255,255,255,.25)}
    .wo-card:active{transform:scale(.95)}
    .wo-card.done{background:rgba(52,199,89,.25);border-color:rgba(52,199,89,.4)}
    .wo-card-letter{font-size:20px;font-weight:700;display:block;margin-bottom:4px}
    .wo-card-label{font-size:10px;opacity:.8;font-weight:500;display:block}
    .wo-card-check{font-size:14px;display:block;margin-top:4px}

    /* ─── BODY WEIGHT CARD ─── */
    .bw-card{background:var(--bg-e);border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px;display:flex;align-items:center;gap:16px}
    .bw-icon{width:44px;height:44px;background:var(--blue-bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .bw-label{font-size:12px;font-weight:600;color:var(--label-3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
    .bw-input-wrap{display:flex;align-items:center;gap:8px;flex:1}
    .bw-input{border:none;outline:none;font-size:22px;font-weight:700;font-family:var(--font);color:var(--label);width:80px;background:transparent;letter-spacing:-.5px}
    .bw-unit{font-size:16px;color:var(--label-3);font-weight:500}

    /* ─── STATS ROW ─── */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    .stat-card{background:var(--bg-e);border-radius:14px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px}
    .stat-lbl{font-size:11px;color:var(--label-3);font-weight:500;margin-top:2px}

    /* ─── WEEK DETAIL ─── */
    #view-workout{display:none;position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;-webkit-overflow-scrolling:touch}
    #view-workout.open{display:block}
    .workout-tabs{display:flex;gap:8px;padding:12px 16px;max-width:680px;margin:0 auto}
    .workout-tab-btn{flex:1;padding:10px 8px;border:none;background:var(--fill);border-radius:10px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;color:var(--label-3);transition:all .2s}
    .workout-tab-btn.active{background:var(--blue);color:white;box-shadow:0 3px 10px rgba(0,122,255,.3)}
    .workout-tab-btn.done-tab{background:var(--green-bg);color:var(--green)}
    .workout-tab-btn.done-tab.active{background:var(--green);color:white}

    /* ─── EXERCISE CARD ─── */
    .ex-card{background:var(--bg-e);border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:10px}
    .ex-header{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .ex-name{font-size:16px;font-weight:600;letter-spacing:-.2px;line-height:1.3;flex:1}
    .ex-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
    .badge{display:inline-flex;align-items:center;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
    .badge-weight{background:var(--blue-bg);color:var(--blue)}
    .badge-scheme{background:var(--fill);color:var(--label-2)}
    .badge-rpe8{background:var(--orange-bg);color:var(--orange)}
    .badge-rpe9,.badge-rpe10{background:var(--red-bg);color:var(--red)}
    .badge-bw{background:var(--purple-bg);color:var(--purple)}
    .ex-complete-dot{width:10px;height:10px;border-radius:50%;background:var(--sep-o);flex-shrink:0;margin-top:4px;transition:background .3s}
    .ex-complete-dot.done{background:var(--green)}

    /* ─── WARMUP ROW ─── */
    .warmup-row{padding:0 16px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .warmup-label{font-size:11px;font-weight:600;color:var(--label-3);text-transform:uppercase;letter-spacing:.3px;margin-right:2px}
    .warmup-chip{background:var(--fill);border-radius:8px;padding:4px 8px;font-size:12px;font-weight:600;color:var(--label-2)}

    /* ─── SETS GRID ─── */
    .sets-grid{display:grid;gap:8px;padding:12px 16px;border-top:1px solid var(--sep)}
    .sets-grid.sets-4{grid-template-columns:repeat(4,1fr)}
    .sets-grid.sets-3{grid-template-columns:repeat(3,1fr)}
    .set-cell{display:flex;flex-direction:column;align-items:center;gap:4px}
    .set-label{font-size:10px;font-weight:600;color:var(--label-3);text-transform:uppercase;letter-spacing:.3px}
    .set-inp{width:100%;height:52px;border:1.5px solid var(--sep);border-radius:12px;font-size:20px;font-weight:700;font-family:var(--font);color:var(--label);text-align:center;background:var(--bg);outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none;appearance:none}
    .set-inp:focus{border-color:var(--blue);background:var(--bg-e);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
    .set-inp.filled{border-color:var(--green);background:var(--green-bg);color:var(--green)}
    .set-inp:disabled{opacity:.4;cursor:not-allowed}

    /* ─── NOTES ─── */
    .notes-row{padding:10px 16px 14px;border-top:1px solid var(--sep)}
    .notes-inp{width:100%;border:none;outline:none;font-size:14px;font-family:var(--font);color:var(--label);background:transparent;resize:none;min-height:36px;line-height:1.5}
    .notes-inp::placeholder{color:var(--label-3)}

    /* ─── PROGRESS CHARTS ─── */
    .chart-card{background:var(--bg-e);border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:12px}
    .chart-title{font-size:14px;font-weight:600;letter-spacing:-.2px;margin-bottom:14px}
    .chart-wrap{position:relative;height:200px}

    /* ─── EMPTY STATE ─── */
    .empty-state{text-align:center;padding:40px 20px;color:var(--label-3)}
    .empty-state-icon{font-size:48px;margin-bottom:12px}
    .empty-state p{font-size:14px}

    /* ─── SAVE INDICATOR ─── */
    .save-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .3s;margin-left:6px;vertical-align:middle}
    .save-dot.show{opacity:1}

    /* ─── CONFIG SCREEN ─── */
    .config-ex-row{background:var(--bg-e);border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .config-ex-name{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:12px}
    .config-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end}
    .config-calc{font-size:12px;color:var(--label-3);margin-top:10px;padding-top:10px;border-top:1px solid var(--sep)}
    .config-calc span{color:var(--blue);font-weight:700}

    /* ─── RESPONSIVE ─── */
    @media(min-width:680px){
      .hero-card{max-width:680px;margin:0 auto 14px}
      .content{padding-bottom:calc(var(--tab-h) + 24px)}
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spin"></div>
  <p>Yükleniyor...</p>
</div>

<div id="toast"></div>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="screen-login" class="hidden">
  <div class="login-card">
    <div class="login-icon">💪</div>
    <h1>Superhero Program</h1>
    <p>12 haftalık güç antrenmanı takibi</p>
    <div id="login-step1">
      <div class="fg">
        <label for="inp-pass">Şifre</label>
        <input type="password" id="inp-pass" class="fi" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" id="btn-login">Devam Et →</button>
    </div>
    <div id="login-step2" class="hidden">
      <div class="fg">
        <label for="inp-handle">Rumuz</label>
        <input type="text" id="inp-handle" class="fi" placeholder="rumuzunu yaz..." autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
      </div>
      <button class="btn btn-primary btn-full" id="btn-handle">Giriş Yap →</button>
    </div>
    <p class="err-msg" id="login-err"></p>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app" class="hidden">

  <!-- ── MAIN VIEW (tabs) ── -->
  <div id="view-main">
    <header class="app-header">
      <div class="inner">
        <button class="hdr-btn" id="btn-profile" style="font-size:18px;padding:6px 8px">⚙️</button>
        <h1 id="main-title">Superhero</h1>
        <button class="hdr-btn danger" id="btn-logout">Çıkış</button>
      </div>
    </header>

    <!-- HOME TAB -->
    <div id="tab-home" class="wrap content">
      <p class="section-title" id="home-week-title">Bu Hafta</p>
      <div id="home-hero"></div>
      <div id="home-bw"></div>
      <div id="home-stats" class="stats-row"></div>
    </div>

    <!-- HAFTALAR TAB -->
    <div id="tab-haftalar" class="wrap content hidden">
      <p class="section-title">Program</p>
      <p class="section-sub">Haftaya tıkla, antrenmanı seç, logla</p>
      <div id="week-grid" class="week-grid"></div>
      <div id="rest-week-card"></div>
    </div>

    <!-- İLERLEME TAB -->
    <div id="tab-ilerleme" class="wrap content hidden">
      <p class="section-title">İlerleme</p>
      <div id="progress-body"></div>
    </div>

    <!-- BOTTOM TAB BAR -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="home">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Ana Sayfa
      </button>
      <button class="tab-btn" data-tab="haftalar">
        <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        Haftalar
      </button>
      <button class="tab-btn" data-tab="ilerleme">
        <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
        İlerleme
      </button>
    </nav>
  </div>

  <!-- ── WORKOUT DETAIL VIEW ── -->
  <div id="view-workout">
    <header class="app-header">
      <div class="inner">
        <button class="hdr-btn" id="btn-back">← Geri</button>
        <h1 id="workout-view-title">Antrenman</h1>
        <span class="save-dot" id="save-dot"></span>
      </div>

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function logKey(w, wo, ex) { return `${w}|${wo}|${ex}`; }
function getLog(w, wo, ex) { return state.logs[logKey(w,wo,ex)] || {set1:'',set2:'',set3:'',set4:'',notes:''}; }

function numSets(sets_reps) {
  const m = sets_reps.match(/^(\d+)x/);
  return m ? parseInt(m[1]) : 3;
}

function calc1RM(kg, reps) {
  if (!kg || !reps || isNaN(kg) || isNaN(reps) || reps <= 0) return null;
  return Math.round(((kg * reps * 0.0333) + kg) * 10) / 10;
}

function bestSet(log) {
  return Math.max(
    parseInt(log.set1)||0,
    parseInt(log.set2)||0,
    parseInt(log.set3)||0,
    parseInt(log.set4)||0
  );
}

function isWorkoutDone(weekName, workoutName) {
  const wo = activeProgram()[weekName]?.workouts.find(w=>w.name===workoutName);
  if (!wo) return false;
  const filled = wo.exercises.filter(ex => {
    const l = getLog(weekName, workoutName, ex.name);
    return l.set1 !== '';
  });
  return filled.length >= Math.ceil(wo.exercises.length / 2);
}

function isWeekDone(weekName) {
  const wk = activeProgram()[weekName];
  if (!wk) return false;
  return wk.workouts.every(wo => isWorkoutDone(weekName, wo.name));
}

function currentWeek() {
  for (const wk of WEEK_NAMES.slice(0,12)) {
    if (!isWeekDone(wk)) return wk;
  }
  return 'Dinlenme haftası';
}

function completedWeeksCount() {
  return WEEK_NAMES.slice(0,12).filter(isWeekDone).length;
}

function mround(val, multiple) {
  return Math.round(val / multiple) * multiple;
}

function calcStartWeight(kg, reps, factor) {
  const rm = calc1RM(kg, reps);
  if (!rm) return null;
  return mround(rm * 0.85 * factor, 2.5);
}

function getConfigEx(workoutName, exerciseName) {
  return activeConfigExercises().find(e => e.workout === workoutName && e.name === exerciseName) || null;
}

function getUserWeight(workoutName, exerciseName, weekName) {
  if (!state.userConfig || !state.userConfig.config) return null;
  const cfgEx = getConfigEx(workoutName, exerciseName);
  if (!cfgEx) return null;
  const key = `${workoutName}|${exerciseName}`;
  const ec = state.userConfig.config[key];
  if (!ec || !ec.kg || !ec.reps) return null;
  const userStart = calcStartWeight(parseFloat(ec.kg), parseFloat(ec.reps), cfgEx.factor);
  if (!userStart) return null;
  const w1Ex = activeProgram()['Hafta 1']?.workouts.find(w=>w.name===workoutName)?.exercises.find(e=>e.name===exerciseName);
  const wNEx = activeProgram()[weekName]?.workouts.find(w=>w.name===workoutName)?.exercises.find(e=>e.name===exerciseName);
  if (!w1Ex || !wNEx) return userStart;
  const origW1 = parseFloat(w1Ex.kg);
  const origWN = parseFloat(wNEx.kg);
  if (isNaN(origW1) || isNaN(origWN)) return userStart;
  return Math.max(mround(userStart + (origWN - origW1), 2.5), 2.5);
}

function getUserWarmups(userWeight, ex) {
  const origKg = parseFloat(ex.kg);
  if (isNaN(origKg) || origKg <= 0) return [ex.warmup1, ex.warmup2, ex.warmup3];
  const ratio = userWeight / origKg;
  return [ex.warmup1, ex.warmup2, ex.warmup3].map(w => {
    if (!w || w === '-' || w === '') return w;
    const v = parseFloat(w);
    if (isNaN(v)) return w;
    return mround(v * ratio, 2.5).toString();
  });
}

function toast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function showLoading(v) {
  document.getElementById('loading-overlay').style.display = v ? 'flex' : 'none';
}

function showSaveDot() {
  const d = document.getElementById('save-dot');
  if (!d) return;
  d.classList.add('show');
  clearTimeout(d._t);
  d._t = setTimeout(()=>d.classList.remove('show'), 1800);
}

async function initSupabase() {
  sb = supabase.createClient(SB_URL, SB_KEY);
}

async function loadAllLogs() {
  try {
    const {data, error} = await sb.from('workout_logs').select('*').eq('handle', state.handle);
    if (error) throw error;
    state.logs = {};
    (data||[]).forEach(r => {
      state.logs[logKey(r.week_name, r.workout_name, r.exercise_name)] = {
        set1: r.set1||'', set2: r.set2||'', set3: r.set3||'', set4: r.set4||'', notes: r.notes||''
      };
    });
    return true;
  } catch(e) {
    console.error('loadAllLogs:', e);
    return false;
  }
}

async function loadAllBodyWeights() {
  try {
    const {data, error} = await sb.from('body_weights').select('*').eq('handle', state.handle);
    if (error) throw error;
    state.bodyWeights = {};
    (data||[]).forEach(r => { state.bodyWeights[r.week_name] = r.weight; });
    return true;
  } catch(e) {
    console.error('loadAllBodyWeights:', e);
    return false;
  }
}


async function saveLog(weekName, workoutName, exerciseName) {
  const key = logKey(weekName, workoutName, exerciseName);
  const log = state.logs[key] || {set1:'',set2:'',set3:'',set4:'',notes:''};
  try {
    await sb.from('workout_logs').upsert({
      handle: state.handle, week_name: weekName, workout_name: workoutName, exercise_name: exerciseName,
      set1: log.set1, set2: log.set2, set3: log.set3, set4: log.set4, notes: log.notes,
      updated_at: new Date().toISOString()
    }, {onConflict:'handle,week_name,workout_name,exercise_name'});
    showSaveDot();
  } catch(e) { console.error('saveLog:', e); toast('⚠️ Kayıt hatası'); }
}

async function saveBodyWeight(weekName, weight) {
  try {
    await sb.from('body_weights').upsert({
      handle: state.handle, week_name: weekName, weight: weight, logged_at: new Date().toISOString()
    }, {onConflict:'handle,week_name'});
    state.bodyWeights[weekName] = weight;
    showSaveDot();
  } catch(e) { console.error('saveBodyWeight:', e); }
}

async function loadUserConfig() {
  try {
    const {data, error} = await sb.from('user_configs').select('*').eq('handle', state.handle).maybeSingle();
    if (error) throw error;
    state.userConfig = data ? {gender: data.gender, body_weight: data.body_weight, config: data.config || {}} : null;
    return !!data;
  } catch(e) { console.error('loadUserConfig:', e); return false; }
}

async function saveUserConfig(gender, bodyWeight, configData) {
  try {
    const {error} = await sb.from('user_configs').upsert({
      handle: state.handle, gender, body_weight: bodyWeight, config: configData,
      updated_at: new Date().toISOString()
    }, {onConflict:'handle'});
    if (error) throw error;
    state.userConfig = {gender, body_weight: bodyWeight, config: configData};
    return true;
  } catch(e) { console.error('saveUserConfig:', e); return false; }
}

function scheduleSave(weekName, workoutName, exerciseName) {
  const key = logKey(weekName, workoutName, exerciseName);
  clearTimeout(state.saveTimers[key]);
  state.saveTimers[key] = setTimeout(() => saveLog(weekName, workoutName, exerciseName), 800);
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
function loginStep1() {
  const pass = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-err');
  if (pass !== PASSWORD) {
    document.getElementById('inp-pass').classList.add('error');
    errEl.textContent = 'Şifre yanlış.';
    setTimeout(()=>{
      document.getElementById('inp-pass').classList.remove('error');
      errEl.textContent = '';
    }, 2000);
    return;
  }
  document.getElementById('login-step1').classList.add('hidden');
  document.getElementById('login-step2').classList.remove('hidden');
  document.getElementById('inp-handle').focus();
}

async function loginStep2() {
  const handle = document.getElementById('inp-handle').value.trim().toLowerCase();
  const errEl = document.getElementById('login-err');
  if (!handle) {
    document.getElementById('inp-handle').classList.add('error');
    errEl.textContent = 'Rumuz gir.';
    setTimeout(()=>{ document.getElementById('inp-handle').classList.remove('error'); errEl.textContent = ''; }, 2000);
    return;
  }
  if (!ALLOWED_HANDLES.includes(handle)) {
    document.getElementById('inp-handle').classList.add('error');
    errEl.textContent = 'Bu rumuz kayıtlı değil.';
    setTimeout(()=>{ document.getElementById('inp-handle').classList.remove('error'); errEl.textContent = ''; }, 2000);
    return;
  }
  state.handle = handle;
  localStorage.setItem('sh_auth', '1');
  localStorage.setItem('sh_handle', handle);
  await startApp();
}

function logout() {
  localStorage.removeItem('sh_auth');
  localStorage.removeItem('sh_handle');
  state.handle = '';
  state.userConfig = null;
  state.logs = {};
  state.bodyWeights = {};
  document.getElementById('app').classList.add('hidden');
  document.getElementById('screen-login').classList.remove('hidden');
  document.getElementById('login-step1').classList.remove('hidden');
  document.getElementById('login-step2').classList.add('hidden');
  document.getElementById('inp-pass').value = '';
  document.getElementById('inp-handle').value = '';
  document.getElementById('login-err').textContent = '';
}

function switchTab(tab) {
  state.activeTab = tab;
  ['home','haftalar','ilerleme'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  const titles = {home:'Superhero', haftalar:'Program', ilerleme:'İlerleme'};
  document.getElementById('main-title').textContent = titles[tab];
  if (tab === 'ilerleme') renderProgress();
}

function openWorkoutView(weekName, workoutName) {
  state.selectedWeek = weekName;
  state.selectedWorkout = workoutName || activeProgram()[weekName]?.workouts[0]?.name;
  renderWorkoutView();
  document.getElementById('view-workout').classList.add('open');
  document.getElementById('view-main').style.display = 'none';
  window.scrollTo(0,0);
}

function closeWorkoutView() {
  document.getElementById('view-workout').classList.remove('open');
  document.getElementById('view-main').style.display = '';
  renderHome();
  renderWeekGrid();
}

function onBwChange(val, weekName) {
  const num = parseFloat(val);
  if (isNaN(num) || num <= 0) return;
  saveBodyWeight(weekName, num);
  renderHome();
}

function renderWeekGrid() {
  const curWeek = currentWeek();
  let html = '';
  WEEK_NAMES.slice(0,12).forEach((wk,i) => {
    const done = isWeekDone(wk);

    html += `<div class="week-cell ${cls}" onclick="openWorkoutView('${wk}',null)">
      <span class="week-cell-num">${done?'✓':i+1}</span>
      <span class="week-cell-lbl">${done?'Bitti':active?'Aktif':'Hafta'}</span>
    </div>`;

  document.getElementById('rest-week-card').innerHTML = `
    <div class="week-cell rest" style="width:100%;display:flex;flex-direction:row;align-items:center;gap:14px;padding:16px;cursor:pointer;" onclick="openWorkoutView('Dinlenme haftası',null)">

}

// ═══════════════════════════════════════
// RENDER: WORKOUT VIEW
// ═══════════════════════════════════════
function renderWorkoutView() {
  const weekName = state.selectedWeek;
  const wk = activeProgram()[weekName];
  if (!wk) return;

  document.getElementById('workout-view-title').textContent = weekName;

  // Tabs
  const tabsHtml = wk.workouts.map(wo => {
    const done = isWorkoutDone(weekName, wo.name);
    const active = wo.name === state.selectedWorkout;
    const letter = wo.name.includes('WORKOUT') ? wo.name.split(' ')[1] : wo.name.replace('ANTRENMAN ','');
    return `<button class="workout-tab-btn ${active?'active':''} ${done&&!active?'done-tab':''}"
      onclick="selectWorkout('${wo.name}')">${done&&!active?'✓ ':''}${letter}</button>`;
  }).join('');
  document.getElementById('workout-tabs-wrap').innerHTML = tabsHtml;

  // Exercises
  const wo = wk.workouts.find(w=>w.name===state.selectedWorkout);
  if (!wo) return;

  let html = '';
  wo.exercises.forEach(ex => {
    const log = getLog(weekName, state.selectedWorkout, ex.name);
    const n = numSets(ex.sets_reps);
    const isBW = ex.kg === 'vücut a.';
    let kgNum = parseFloat(ex.kg);
    let displayKg = ex.kg;
    let warmupSrc = [ex.warmup1, ex.warmup2, ex.warmup3];

    // Dynamic weights per user config
    if (!isBW && state.userConfig) {
      const userW = getUserWeight(state.selectedWorkout, ex.name, weekName);
      if (userW !== null) {
        kgNum = userW;
        displayKg = userW.toString();
        warmupSrc = getUserWarmups(userW, ex);
      }
    }

    // Completion check
    const setsFilled = [log.set1, log.set2, log.set3, n>=4?log.set4:null]
      .filter((v,i)=>i<n).filter(v=>v!==null&&v!=='').length;
    const isDone = setsFilled >= n;

    // Warmups
    const warmups = warmupSrc.filter(w=>w && w !== '-' && w !== '');
    const warmupHtml = warmups.length ? `
      <div class="warmup-row">
        <span class="warmup-label">Isınma</span>
        ${warmups.map(w=>`<span class="warmup-chip">${w} kg</span>`).join('<span style="color:var(--label-3);font-size:12px">→</span>')}
      </div>
    ` : '';

    // RPE badge
    const rpeHtml = ex.rpe ? `<span class="badge badge-rpe${ex.rpe}">${ex.rpe} RPE</span>` : '';

    // Weight badge
    const kgHtml = isBW
      ? `<span class="badge badge-bw">Vücut A.</span>`
      : `<span class="badge badge-weight">${displayKg} kg</span>`;

    // 1RM estimate (for main lifts with weight)
    let rm1Html = '';
    if (!isBW && !isNaN(kgNum)) {
      const best = bestSet(log);
      if (best > 0) {
        const rm = calc1RM(kgNum, best);
        if (rm) rm1Html = `<span class="badge" style="background:var(--purple-bg);color:var(--purple)">~${rm} kg 1RM</span>`;
      }
    }

    // Set inputs
    const setKeys = ['set1','set2','set3','set4'].slice(0,n);
    const setsHtml = setKeys.map((sk,i)=>`
      <div class="set-cell">
        <span class="set-label">Set ${i+1}</span>
        <input type="number" inputmode="numeric" min="0" max="99" step="1"
          class="set-inp ${log[sk]?'filled':''}"
          value="${log[sk]||''}"
          placeholder="–"
          data-week="${weekName}"
          data-workout="${state.selectedWorkout}"
          data-exercise="${ex.name}"
          data-setkey="${sk}"
          onchange="onSetChange(this)"
          oninput="onSetInput(this)">
      </div>
    `).join('');

    html += `
      <div class="ex-card" id="excard-${encodeURIComponent(ex.name)}">
        <div class="ex-header">
          <div style="flex:1">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-badges">
              ${kgHtml}
              <span class="badge badge-scheme">${ex.sets_reps}</span>
              ${rpeHtml}
              ${rm1Html}
            </div>
          </div>
          <div class="ex-complete-dot ${isDone?'done':''}"></div>
        </div>
        ${warmupHtml}
        <div class="sets-grid sets-${n}">${setsHtml}</div>
        <div class="notes-row">
          <textarea class="notes-inp" rows="1" placeholder="Not ekle..."
            data-week="${weekName}"
            data-workout="${state.selectedWorkout}"
            data-exercise="${ex.name}"
            oninput="onNotesInput(this)">${log.notes||''}</textarea>
        </div>
      </div>
    `;
  });

  document.getElementById('workout-exercises').innerHTML = html;
  autoResizeAll();
}

function selectWorkout(workoutName) {
  state.selectedWorkout = workoutName;
  renderWorkoutView();
}

// ═══════════════════════════════════════
// RENDER: PROGRESS
// ═══════════════════════════════════════
function renderProgress() {
  const el = document.getElementById('progress-body');

  // Collect 1RM data per week for main lifts
  const mainLifts = activeMainLifts();

  const labels = WEEK_NAMES.slice(0,12);
  const datasets = mainLifts.map(lift => {
    const vals = labels.map(wk => {
      const ex = activeProgram()[wk]?.workouts.find(w=>w.name===lift.workout)?.exercises.find(e=>e.name===lift.name);
      if (!ex) return null;
      const log = getLog(wk, lift.workout, lift.name);
      const kg = parseFloat(ex.kg);
      const best = bestSet(log);
      if (!best || isNaN(kg)) return null;
      return calc1RM(kg, best);
    });
    return {label: lift.label, data: vals, borderColor: lift.color, backgroundColor: lift.color+'22',
      tension:.3, pointRadius:5, pointHoverRadius:7, fill:false, spanGaps:true};
  });

  // Body weight data
  const bwVals = labels.map(wk => state.bodyWeights[wk] || null);
  const bwDataset = {label:'Vücut Ağırlığı', data: bwVals, borderColor:'#FF9500', backgroundColor:'#FF950022',
    tension:.3, pointRadius:5, pointHoverRadius:7, fill:true, spanGaps:true};

  // Completion stats
  const totalCompleted = completedWeeksCount();
  const totalWorkouts = WEEK_NAMES.slice(0,12).reduce((acc,wk)=>{
    return acc + (activeProgram()[wk]?.workouts.filter(wo=>isWorkoutDone(wk,wo.name)).length||0);
  }, 0);

  el.innerHTML = `
    <div class="stats-row" style="margin-bottom:14px">
      <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${totalCompleted}/12</div><div class="stat-lbl">Hafta</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">${totalWorkouts}</div><div class="stat-lbl">Antrenman</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--orange)">${Math.round(totalCompleted/12*100)}%</div><div class="stat-lbl">İlerleme</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📈 Tahmini 1RM İlerlemesi (kg)</div>
      <div class="chart-wrap"><canvas id="chart-1rm"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">⚖️ Vücut Ağırlığı (kg)</div>
      <div class="chart-wrap"><canvas id="chart-bw"></canvas></div>
    </div>
  `;

  // Destroy old charts
  ['1rm','bw'].forEach(k => { if (state.charts[k]) { state.charts[k].destroy(); delete state.charts[k]; }});

  const chartDefaults = {
    responsive: true, maintainAspectRatio: false,
    plugins: {legend:{labels:{font:{family:'-apple-system,sans-serif',size:12},boxWidth:12}}},
    scales: {
      x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{family:'-apple-system,sans-serif',size:10}}},
      y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{family:'-apple-system,sans-serif',size:10}}}
    }
  };

  const shortLabels = labels.map((_,i)=>`H${i+1}`);

  state.charts['1rm'] = new Chart(document.getElementById('chart-1rm'), {
    type:'line', data:{labels:shortLabels, datasets},
    options:{...chartDefaults, plugins:{...chartDefaults.plugins, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw} kg`}}}}
  });
  state.charts['bw'] = new Chart(document.getElementById('chart-bw'), {
    type:'line', data:{labels:shortLabels, datasets:[bwDataset]},
    options:{...chartDefaults, plugins:{...chartDefaults.plugins, tooltip:{callbacks:{label:ctx=>`${ctx.raw} kg`}}}}
  });
}

function showConfigScreen(isFirst) {

  if (backBtn) backBtn.style.visibility = isFirst ? 'hidden' : '';

function hideConfigScreen() {
  document.getElementById('screen-config').classList.add('hidden');
}

function renderConfigScreen() {
  const cfg = state.userConfig || {};
  const cfgData = cfg.config || {};
  let html = `
    <p class="section-title" style="padding-top:16px">Profil</p>
    <div class="card" style="margin-bottom:20px">
      <div class="card-row">
        <span style="font-weight:500">Cinsiyet</span>
        <select id="cfg-gender" style="border:none;outline:none;font-size:15px;font-family:var(--font);background:transparent;color:var(--blue);font-weight:600;cursor:pointer">

          <option value="kadın" ${cfg.gender==='kadın'?'selected':''}>Kadın</option>
        </select>
      </div>
      <div class="card-row">
        <span style="font-weight:500">Vücut Ağırlığı</span>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="cfg-bw" inputmode="decimal" step="0.1" min="30" max="300"
            value="${cfg.body_weight||''}" placeholder="–"
            style="border:none;outline:none;font-size:16px;font-weight:700;font-family:var(--font);color:var(--blue);width:64px;background:transparent;text-align:right">
          <span style="color:var(--label-3);font-size:14px">kg</span>
        </div>
      </div>
    </div>
    <p class="section-title">Max Değerler</p>
    <p class="section-sub">Her egzersiz için en iyi 1 setini gir. Başlangıç ağırlıkların otomatik hesaplanır.</p>
  `;
  activeConfigExercises().forEach(ex => {
    const key = `${ex.workout}|${ex.name}`;
    const safeKey = key.replace(/[^a-z0-9]/gi,'_');
    const ec = cfgData[key] || {};
    const hasData = ec.kg && ec.reps;
    const rm = hasData ? calc1RM(parseFloat(ec.kg), parseFloat(ec.reps)) : null;
    const startW = (rm && hasData) ? calcStartWeight(parseFloat(ec.kg), parseFloat(ec.reps), ex.factor) : null;
    html += `
      <div class="config-ex-row" data-cfgkey="${key}">
        <div class="config-ex-name">${ex.label}</div>
        <div class="config-inputs">
          <div>
            <label style="font-size:11px;font-weight:600;color:var(--label-3);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:6px">Max Ağırlık</label>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="number" class="fi cfg-kg-inp" inputmode="decimal" step="0.5" min="0"
                value="${ec.kg||''}" placeholder="kg" data-cfgkey="${key}" oninput="onCfgInput('${safeKey}','${key}')">
              <span style="color:var(--label-3);font-size:13px;white-space:nowrap">kg</span>
            </div>
          </div>
          <div>
            <label style="font-size:11px;font-weight:600;color:var(--label-3);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:6px">Tekrar</label>
            <input type="number" class="fi cfg-reps-inp" inputmode="numeric" step="1" min="1" max="50"
              value="${ec.reps||''}" placeholder="adet" data-cfgkey="${key}" oninput="onCfgInput('${safeKey}','${key}')">
          </div>
        </div>
        <div class="config-calc" id="cfg-calc-${safeKey}">
          ${rm ? `1RM: <span>${rm} kg</span> → Hafta 1 başlangıç: <span>${startW} kg</span>` : 'Ağırlık ve tekrar gir'}
        </div>
      </div>
    `;
  });
  document.getElementById('config-body').innerHTML = html;
}

function onCfgInput(safeKey, key) {
  const row = document.querySelector(`[data-cfgkey="${key}"]`);
  if (!row) return;
  const kg = parseFloat(row.querySelector('.cfg-kg-inp').value);
  const reps = parseFloat(row.querySelector('.cfg-reps-inp').value);
  const calcEl = document.getElementById(`cfg-calc-${safeKey}`);
  if (!calcEl) return;
  const cfgEx = activeConfigExercises().find(e => `${e.workout}|${e.name}` === key);
  if (!cfgEx) return;
  if (kg > 0 && reps > 0) {
    const rm = calc1RM(kg, reps);
    const startW = calcStartWeight(kg, reps, cfgEx.factor);
    calcEl.innerHTML = `1RM: <span>${rm} kg</span> → Hafta 1 başlangıç: <span>${startW} kg</span>`;
  } else {
    calcEl.textContent = 'Ağırlık ve tekrar gir';
  }
}

async function saveConfig() {
  const genderEl = document.getElementById('cfg-gender');
  const bwEl = document.getElementById('cfg-bw');
  const gender = genderEl ? genderEl.value : 'erkek';
  const bodyWeight = bwEl ? (parseFloat(bwEl.value) || 0) : 0;
  const configData = {};
  activeConfigExercises().forEach(ex => {
    const key = `${ex.workout}|${ex.name}`;
    const row = document.querySelector(`[data-cfgkey="${key}"]`);
    if (!row) return;
    const kg = parseFloat(row.querySelector('.cfg-kg-inp').value);
    const reps = parseFloat(row.querySelector('.cfg-reps-inp').value);
    if (kg > 0 && reps > 0) configData[key] = {kg, reps};
  });
  showLoading(true);
  const ok = await saveUserConfig(gender, bodyWeight, configData);
  showLoading(false);
  if (ok) {
    toast('Profil kaydedildi ✓');
    hideConfigScreen();
    renderHome();
    renderWeekGrid();
    switchTab('home');
  } else {
    toast('⚠️ Kayıt hatası');
  }
}

// ═══════════════════════════════════════
// INPUT HANDLERS
// ═══════════════════════════════════════
function onSetInput(el) {
  const {week, workout, exercise, setkey} = el.dataset;
  const key = logKey(week, workout, exercise);
  if (!state.logs[key]) state.logs[key] = {set1:'',set2:'',set3:'',set4:'',notes:''};
  const val = el.value.replace(/[^0-9]/g,'');
  el.value = val;
  state.logs[key][setkey] = val;
  el.classList.toggle('filled', val !== '');
  scheduleSave(week, workout, exercise);
  updateExCardDot(exercise);
  updateTabDoneState(week, workout);
}

function onSetChange(el) {
  onSetInput(el);
  // Recalc 1RM badge
  const {week, workout, exercise} = el.dataset;
  updateRM1Badge(week, workout, exercise);
}

function onNotesInput(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
  const {week, workout, exercise} = el.dataset;
  const key = logKey(week, workout, exercise);
  if (!state.logs[key]) state.logs[key] = {set1:'',set2:'',set3:'',set4:'',notes:''};
  state.logs[key].notes = el.value;
  scheduleSave(week, workout, exercise);
}

function updateExCardDot(exerciseName) {
  const card = document.getElementById(`excard-${encodeURIComponent(exerciseName)}`);
  if (!card) return;
  const log = getLog(state.selectedWeek, state.selectedWorkout, exerciseName);
  const wo = activeProgram()[state.selectedWeek]?.workouts.find(w=>w.name===state.selectedWorkout);
  const ex = wo?.exercises.find(e=>e.name===exerciseName);
  if (!ex) return;
  const n = numSets(ex.sets_reps);
  const filled = ['set1','set2','set3','set4'].slice(0,n).filter(k=>log[k]!=='').length;
  card.querySelector('.ex-complete-dot')?.classList.toggle('done', filled >= n);
}

function updateTabDoneState(weekName, workoutName) {
  const done = isWorkoutDone(weekName, workoutName);
  document.querySelectorAll('.workout-tab-btn').forEach(btn => {
    const letter = workoutName.includes('WORKOUT') ? workoutName.split(' ')[1] : workoutName.replace('ANTRENMAN ','');
    if (btn.textContent.includes(letter) && !btn.classList.contains('active')) {
      btn.classList.toggle('done-tab', done);
    }
  });
}

function updateRM1Badge(weekName, workoutName, exerciseName) {
  const card = document.getElementById(`excard-${encodeURIComponent(exerciseName)}`);
  if (!card) return;
  const wo = activeProgram()[weekName]?.workouts.find(w=>w.name===workoutName);
  const ex = wo?.exercises.find(e=>e.name===exerciseName);
  if (!ex || ex.kg === 'vücut a.') return;
  let kg = parseFloat(ex.kg);
  if (state.userConfig) { const uw = getUserWeight(workoutName, exerciseName, weekName); if (uw !== null) kg = uw; }
  if (isNaN(kg)) return;
  const log = getLog(weekName, workoutName, exerciseName);
  const best = bestSet(log);
  const existing = card.querySelector('.badge[style*="purple"]');
  if (best > 0) {
    const rm = calc1RM(kg, best);
    if (rm) {
      if (existing) existing.textContent = `~${rm} kg 1RM`;
      else card.querySelector('.ex-badges')?.insertAdjacentHTML('beforeend',
        `<span class="badge" style="background:var(--purple-bg);color:var(--purple)">~${rm} kg 1RM</span>`);
    }
  }
}

function autoResizeAll() {
  document.querySelectorAll('.notes-inp').forEach(el => {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  });
}

// ═══════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════
async function startApp() {
  showLoading(true);
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-config').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  if (!sb) await initSupabase();
  await loadAllLogs();
  await loadAllBodyWeights();
  const hasConfig = await loadUserConfig();

  showLoading(false);

  if (!hasConfig) {
    showConfigScreen(true);
  } else {
    renderHome();
    renderWeekGrid();
    switchTab('home');
  }
}

// ═══════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════
document.getElementById('btn-login').addEventListener('click', loginStep1);
document.getElementById('inp-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') loginStep1(); });
document.getElementById('btn-handle').addEventListener('click', loginStep2);
document.getElementById('inp-handle').addEventListener('keydown', e=>{ if(e.key==='Enter') loginStep2(); });
document.getElementById('btn-logout').addEventListener('click', logout);
document.getElementById('btn-back').addEventListener('click', closeWorkoutView);
document.getElementById('btn-profile').addEventListener('click', ()=>showConfigScreen(false));
document.getElementById('btn-config-back').addEventListener('click', hideConfigScreen);
document.getElementById('btn-config-save').addEventListener('click', saveConfig);

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
});

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
(async function boot() {
  await initSupabase();
  const savedHandle = localStorage.getItem('sh_handle');
  if (localStorage.getItem('sh_auth') === '1' && savedHandle) {
    state.handle = savedHandle;
    await startApp();
  } else {
    showLoading(false);
    document.getElementById('screen-login').classList.remove('hidden');
  }
})();
</script>
