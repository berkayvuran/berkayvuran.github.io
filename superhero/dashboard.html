<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superhero Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #f8fafc;
      --line: #334155;
      --accent: #22c55e;
      --card: #1e293b;
      --card2: #172033;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }
    .app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: rgba(17,24,39,.95);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .subtitle {
      color: var(--muted);
      margin: 0 0 16px;
      line-height: 1.5;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--accent);
      color: #04130a;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: #334155;
      color: white;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #0b1220;
      border: 1px solid var(--line);
      color: #cbd5e1;
      font-size: 12px;
      margin: 0 6px 6px 0;
    }
    .summary-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .summary-box {
      background: var(--card2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .summary-label {
      font-size: 12px;
      color: var(--muted);
    }
    .summary-value {
      font-size: 28px;
      font-weight: 800;
      margin-top: 6px;
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }
    .exercise-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .exercise-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .chart-wrap {
      margin-top: 12px;
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 58px 1fr 56px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .bar-track {
      height: 10px;
      background: #111827;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #1f2937;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    .empty {
      color: var(--muted);
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="app"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://vwubvpjidodewzvtqjtf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Pyhx-5-wLHw199bcT6URCA_O2Xu6QQY';
    const MASTER_PASSWORD = 'Nakama123!';
    const ALLOWED_USERS = ['nakama', 'boksimoron'];

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const state = {
      gatePassed: localStorage.getItem('superhero_gate_passed') === 'true',
      username: localStorage.getItem('superhero_username') || '',
      program: null,
      logs: [],
      loading: true
    };

    const app = document.getElementById('app');

    const TEMPLATE_SLOTS = [
      { slotCode: 'A1', workoutCode: 'A', family: 'chest_press', targetScheme: '4x5+', exerciseFactor: 0.8, incrementKg: 2.5, warmupRuleType: 'main_4x5', progressionType: 'threshold_or_deload', evaluationSetIndex: 4, evaluationRepThreshold: 5, trackEstimated1RM: true },
      { slotCode: 'A2', workoutCode: 'A', family: 'squat', targetScheme: '4x5+', exerciseFactor: 0.7, incrementKg: 5, warmupRuleType: 'main_4x5', progressionType: 'threshold_or_deload', evaluationSetIndex: 4, evaluationRepThreshold: 5, trackEstimated1RM: true },
      { slotCode: 'A3', workoutCode: 'A', family: 'lateral_raise', targetScheme: '3x10-14', exerciseFactor: 0.6, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'A4', workoutCode: 'A', family: 'vertical_pull', targetScheme: '3x8-12', exerciseFactor: 0.65, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'total_reps_threshold', totalRepThreshold: 36, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'A5', workoutCode: 'A', family: 'triceps', targetScheme: '3x10-14', exerciseFactor: 0.75, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'A6', workoutCode: 'A', family: 'abs', targetScheme: '3 sets', exerciseFactor: null, incrementKg: null, warmupRuleType: 'none', progressionType: 'bodyweight_passive', trackEstimated1RM: false },

      { slotCode: 'B1', workoutCode: 'B', family: 'shoulder_press', targetScheme: '4x5+', exerciseFactor: 0.7, incrementKg: 2.5, warmupRuleType: 'main_4x5', progressionType: 'threshold_or_deload', evaluationSetIndex: 4, evaluationRepThreshold: 5, trackEstimated1RM: true },
      { slotCode: 'B2', workoutCode: 'B', family: 'hinge', targetScheme: '3x8', exerciseFactor: 0.7, incrementKg: 5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 3, evaluationRepThreshold: 8, trackEstimated1RM: false },
      { slotCode: 'B3', workoutCode: 'B', family: 'chest_fly', targetScheme: '3x10-14', exerciseFactor: 0.6, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'B4', workoutCode: 'B', family: 'row', targetScheme: '3x10', exerciseFactor: 0.65, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 3, evaluationRepThreshold: 10, trackEstimated1RM: false },
      { slotCode: 'B5', workoutCode: 'B', family: 'biceps', targetScheme: '3x10-14', exerciseFactor: 0.75, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'B6', workoutCode: 'B', family: 'abs', targetScheme: '3 sets', exerciseFactor: null, incrementKg: null, warmupRuleType: 'none', progressionType: 'bodyweight_passive', trackEstimated1RM: false },

      { slotCode: 'C1', workoutCode: 'C', family: 'chest_press', targetScheme: '3x10', exerciseFactor: 0.7, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 3, evaluationRepThreshold: 10, trackEstimated1RM: false },
      { slotCode: 'C2', workoutCode: 'C', family: 'leg_accessory', targetScheme: '4x10', exerciseFactor: 0.6, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 4, evaluationRepThreshold: 10, trackEstimated1RM: false },
      { slotCode: 'C3', workoutCode: 'C', family: 'vertical_pull', targetScheme: '3x8-12', exerciseFactor: 0.65, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'total_reps_threshold', totalRepThreshold: 36, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'C4', workoutCode: 'C', family: 'row', targetScheme: '3x10', exerciseFactor: 0.65, incrementKg: 2.5, warmupRuleType: 'secondary_3set', progressionType: 'threshold_or_deload', evaluationSetIndex: 3, evaluationRepThreshold: 10, trackEstimated1RM: false },
      { slotCode: 'C5', workoutCode: 'C', family: 'triceps', targetScheme: '3x10-14', exerciseFactor: 0.75, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false },
      { slotCode: 'C6', workoutCode: 'C', family: 'biceps', targetScheme: '3x10-14', exerciseFactor: 0.75, incrementKg: 2.5, warmupRuleType: 'none', progressionType: 'total_reps_threshold', totalRepThreshold: 42, countedSets: 3, trackEstimated1RM: false }
    ];

    function roundToStep(value, step = 2.5) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return null;
      return Math.round(value / step) * step;
    }

    function roundToHalf(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return null;
      return Math.round(value * 2) / 2;
    }

    function weekEstimated1RM(workingWeight, repsArray) {
      const clean = (repsArray || []).map(Number).filter(n => Number.isFinite(n) && n > 0);
      if (!workingWeight || !clean.length) return null;
      const maxReps = Math.max(...clean);
      return roundToHalf((Number(workingWeight) * maxReps * 0.0333) + Number(workingWeight));
    }

    function decideNextWeight(slot, currentWeight, repsArray) {
      if (slot.progressionType === 'bodyweight_passive' || slot.progressionType === 'deload_only') {
        return currentWeight;
      }

      const reps = (repsArray || []).map(v => Number(v || 0));

      if (slot.progressionType === 'threshold_or_deload') {
        const idx = (slot.evaluationSetIndex || 1) - 1;
        const threshold = slot.evaluationRepThreshold || 0;
        if ((reps[idx] || 0) >= threshold) {
          return roundToStep(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5);
        }
        return roundToStep(Number(currentWeight) * 0.9, 2.5);
      }

      if (slot.progressionType === 'total_reps_threshold') {
        const countedSets = slot.countedSets || 3;
        const total = reps.slice(0, countedSets).reduce((a, b) => a + (Number(b) || 0), 0);
        if (total >= Number(slot.totalRepThreshold || 0)) {
          return roundToStep(Number(currentWeight) + Number(slot.incrementKg || 0), 2.5);
        }
        return Number(currentWeight);
      }

      return currentWeight;
    }

    function getSlotSelection(program, slotCode) {
      return program?.setup_data?.selections?.find(s => s.slotCode === slotCode);
    }

    function getLog(username, weekNo, workoutCode, slotCode) {
      return state.logs.find(
        l => l.username === username && l.week_no === weekNo && l.workout_code === workoutCode && l.slot_code === slotCode
      );
    }

    function previousWeekWeight(program, slotCode, weekNo) {
      const selection = getSlotSelection(program, slotCode);
      if (!selection) return null;

      let current = selection.initialWorkingWeight ?? null;

      for (let w = 1; w < weekNo; w++) {
        const slot = TEMPLATE_SLOTS.find(s => s.slotCode === slotCode);
        if (!slot) break;

        const log = getLog(program.username, w, slot.workoutCode, slotCode);
        if (!log) break;

        const reps = Array.isArray(log.reps) ? log.reps : [];
        current = decideNextWeight(slot, current, reps);
      }

      return current;
    }

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function loadData() {
      const { data: program, error: programError } = await supabase
        .from('programs')
        .select('*')
        .eq('username', state.username)
        .maybeSingle();

      if (programError) throw programError;
      state.program = program || null;

      const { data: logs, error: logsError } = await supabase
        .from('workout_logs')
        .select('*')
        .eq('username', state.username)
        .order('week_no', { ascending: true });

      if (logsError) throw logsError;
      state.logs = logs || [];
    }

    function buildExerciseDashboardRows() {
      if (!state.program?.setup_data?.selections) return [];

      const selections = state.program.setup_data.selections.filter(s => ['A', 'B', 'C'].includes(s.workoutCode));

      return selections.map(selection => {
        const slot = TEMPLATE_SLOTS.find(t => t.slotCode === selection.slotCode);
        const weekly = [];

        for (let week = 1; week <= 12; week++) {
          const weight = previousWeekWeight({ ...state.program, username: state.username }, selection.slotCode, week);
          const log = getLog(state.username, week, selection.workoutCode, selection.slotCode);
          const reps = log?.reps || [];
          const metric = slot?.trackEstimated1RM
            ? weekEstimated1RM(weight, reps)
            : weight;

          weekly.push({
            week,
            weight,
            metric,
            completed: !!log
          });
        }

        return {
          slotCode: selection.slotCode,
          workoutCode: selection.workoutCode,
          exercise: selection.selectedExercise,
          initial: selection.initialWorkingWeight,
          targetScheme: slot?.targetScheme || '-',
          trackEstimated1RM: !!slot?.trackEstimated1RM,
          weekly
        };
      });
    }

    function renderBars(values) {
      const numeric = values.map(v => Number(v)).filter(v => Number.isFinite(v));
      const max = numeric.length ? Math.max(...numeric) : 0;

      return values.map((value, index) => {
        const num = Number(value);
        const width = max > 0 && Number.isFinite(num) ? Math.max(6, (num / max) * 100) : 0;

        return `
          <div class="bar-row">
            <div>H${index + 1}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${width}%"></div>
            </div>
            <div>${Number.isFinite(num) ? num : '-'}</div>
          </div>
        `;
      }).join('');
    }

    function renderDashboard() {
      if (!state.gatePassed || !ALLOWED_USERS.includes(state.username)) {
        window.location.href = 'index.html';
        return;
      }

      if (!state.program) {
        app.innerHTML = `
          <div class="card">
            <h1 class="title">Dashboard</h1>
            <p class="subtitle">Bu kullanıcı için henüz program kurulmamış.</p>
            <div class="top-actions">
              <button onclick="window.location.href='index.html'">Index'e Dön</button>
            </div>
          </div>
        `;
        return;
      }

      const rows = buildExerciseDashboardRows();
      const completedWorkouts = state.logs.length;
      const completedWeeks = new Set(state.logs.map(l => l.week_no)).size;
      const trackedExercises = rows.length;

      app.innerHTML = `
        <div class="card">
          <div class="row" style="justify-content:space-between;align-items:flex-start;">
            <div>
              <h1 class="title">Dashboard</h1>
              <p class="subtitle">
                ${escapeHtml(state.username)} için seçilen hareketlerin hafta hafta gelişimi.
              </p>
              <div class="pill">Kullanıcı: ${escapeHtml(state.username)}</div>
            </div>
            <div class="top-actions">
              <button class="secondary" id="backToIndex">Antrenman Ekranı</button>
              <button class="secondary" id="logoutBtn">Çıkış</button>
            </div>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">Takip Edilen Hareket</div>
            <div class="summary-value">${trackedExercises}</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">Tamamlanan Workout</div>
            <div class="summary-value">${completedWorkouts}</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">Kayıt Girilmiş Hafta</div>
            <div class="summary-value">${completedWeeks}</div>
          </div>
        </div>

        <div style="height:16px;"></div>

        <div class="grid">
          ${rows.map(row => `
            <div class="exercise-card">
              <div class="exercise-name">${escapeHtml(row.exercise)}</div>
              <div class="pill">${escapeHtml(row.workoutCode)}</div>
              <div class="pill">Başlangıç: ${row.initial ?? 'BW'}</div>
              <div class="pill">Hedef: ${escapeHtml(row.targetScheme)}</div>
              <div class="muted">
                ${row.trackEstimated1RM ? 'Grafik değeri: tahmini 1RM' : 'Grafik değeri: çalışma kilosu'}
              </div>

              <div class="chart-wrap">
                ${renderBars(row.weekly.map(w => w.metric))}
              </div>

              <div class="table-wrap" style="margin-top:12px;">
                <table>
                  <thead>
                    <tr>
                      <th>Hafta</th>
                      <th>Bu hafta kilo</th>
                      <th>Gösterilen değer</th>
                      <th>Durum</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${row.weekly.map(w => `
                      <tr>
                        <td>${w.week}</td>
                        <td>${w.weight ?? '-'}</td>
                        <td>${w.metric ?? '-'}</td>
                        <td>${w.completed ? 'Kaydedildi' : '-'}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          `).join('')}
        </div>

        ${rows.length === 0 ? `<div class="card empty">Gösterilecek hareket bulunamadı.</div>` : ''}
      `;

      document.getElementById('backToIndex').onclick = () => {
        window.location.href = 'index.html';
      };

      document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('superhero_username');
        window.location.href = 'index.html';
      };
    }

    async function init() {
      try {
        if (!state.gatePassed || !state.username) {
          window.location.href = 'index.html';
          return;
        }

        await loadData();
        renderDashboard();
      } catch (err) {
        app.innerHTML = `
          <div class="card">
            <h1 class="title">Hata</h1>
            <p class="subtitle">${escapeHtml(err.message || 'Dashboard yüklenemedi.')}</p>
            <button onclick="window.location.href='index.html'">Index'e Dön</button>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
